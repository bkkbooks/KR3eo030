半插陰門中凝神止息閉思想堅牢內外不通風運至泥丸先透頂崑崙搖撼過天衝久久行之須見效黃昏直至五更鐘此是神仙無漏術遇之極者是孩童祕旨鷓鴣天子午工夫養性天龍吟虎嘯送丹田陰陽顛倒靈苗透會得神峰妙更傳金鎖匱鐵牛堅黃河水逆好行船壽年更把金丹助造化長生不老年種子之法夫人生於世一夫一婦古之道也有夫婦則欲子嗣養生送死道之常也書云不孝有三無後為大世人須存夫婦之道不知交合之情種子之法徒然交感故不能成胎凡無子者皆交合不得其道或男情動而精氣過泄緣婦人情未動而陰門未開須陽精至而不納或婦人情先動陰門開張男子興未動而女人興已過矣縱然陽精至陰門固閉不納亦無子也故曰欲要子者以何術也曰男子須先補養丹田真氣壯盛亦要婦人調燮身中血氣均平然後用功交合要兩情俱動無不驗也若陰血先至而陽精後沖則血包精精入骨而成男子若陽精先至而陰血後添則精包血而成女子若陰陽並至則非男非女也夫達者深究此情兩情正美覺精欲泄然後納玉莖於婦人極樂處女則聳睡承接收精入宮男女各不可動待片時同收畢然後抽退玉莖令女人正身仰臥男子仍依前引法黃河水逆流法自己縮脅提腰四十九次方睡凡要男用太陽時要女用太陰時又要女子經脈通淨然後三五日內紅脈未止黃水收之際陰門正開之時下種尤妙主生男血氣壯盛必無疾病越此三五日後陰門閉矣虛文交感又曰日期不等漢鍾離老祖陰陽二仙丹此係無上道人獻於雲南沐府者不論虛損勞怯至危用酒化開七粒灌下立醒老人朔望日服之一粒卻病延年不死一制硫法好硫四兩用好醋四兩煮乾再用黃臘四兩溶化傾入水內去醋取淨硫研碎再用益母草汁煮過再用金星草汁煮三炷香聽用一打靈藥法汞一兩制硫二錢半同炒成青金頭色入罐打火三炷香取出聽用一養砂法每砂先用好醋炒過然後用鉛母養一熏鉛法將砂砍作三四分一塊每兩用鉛四兩煉成先將鉛砍碎鋪底盡頭砂放中間入土釜養二七取出入冷水浸二日夜去火毒聽養過砂汞亦妙一制生砂法好砂三兩用米醋二兩炒乾再用水煮乾一配陽法生砂四錢制砂二錢蘆薈四錢沉香木香各七分靈藥四錢乳香沒藥各五分共為細末紅棗去皮核為丸如梧子大金箔為衣一配陰法生砂二錢制砂五錢靈藥蘆薈各四錢沉香木香各五分乳香沒藥各三分半麝香一分半共為細末煉蜜為丸如梧子大金箔為衣二丹俱有蘆薈煎酒下呂純陽卻病烏須延年仙茶方此係洛陽瞭然禪師祕藏之方有西江月云學得靈丹容易仙傳甘露參成滋陰降火壯神精黑髮烏須影應痰火瘧癆立效肺風積熱難停固齒調胃眼光明久服超凡入聖一製茶法上好牙茶一斤用沉香藝香降香甘草白朮孩兒茶百藥煎甘松桂皮當歸薄荷活石葛粉琥珀柿霜細辛寒水石硼砂砂仁丁香犀角羚羊角硃砂小赤豆上各三錢銼碎每各一錢用水三碗煎一碗傾入磁盆內將茶入湯浸濕就撈起曬乾如此九浸九曬共九日聽用但制此茶務看天色好方可下手一陽火丸用拳雄雞腎子十枚各以銀簪腳鑽孔入麝香如米粒大二粒黃狗脊髓一條黃狗外腎一對各入麝香鹿茸一兩好酒浸一夜蒸熱各陰乾大雄蛤蚧一個鮮羊油炙大雄海馬一對酥炙大石燕一對火煅童便淬七次陽起石二錢制同樟腦三錢當門子一對即麝香一大粒麵裹之煨熱以上俱為細末蜜丸如彈子大用硃砂為衣銀盒盛之勿泄靈氣每丸可用七八年用時閉右鼻將左鼻吸之則沛然興起此藥能壯氣養血返老還童回生延命固精種子助陽扶陰九戰不倒妙難盡述矣一陰水丸以陰藥收陽藥鍾乳粉梅花冰片沉香各三錢雌鱉頭火煅五錢雌蛤蚧有尾者一梅醋炙入麝香一分以上俱為細末蜜丸如彈子大好京墨為衣照前收貯不可安作一處欲退陰時閉左鼻以右鼻吸之則陰回轉二丹效如響應視世間一切洞房祕術不啻天淵也祕之祕之周天再造固本還真膏蛇床子肉蓯蓉巴戟防風人參枸杞子地骨皮細辛草烏川烏麥門冬廣木香茯苓丁香大附子生地黃木鱉子鎖陽乳香桂皮沒藥豆蔻以上各五錢天門冬當歸熟地蒼朮各一兩其法用真正芝麻油一斤四兩將前藥入油內煎至五六滾驗藥枯將夏布漉淨滴油入冷水中成珠不散再入後開藥末麝香雄黃各三錢陽起石二兩如無用鴉片代之虎骨海馬各二兩用酥油煮透慢火焙乾蟾酥紫梢花龍骨各一兩石燕二對雲母石一兩上為末待煎油成珠退溫投入內攪勻收磁罐內冷水浸灌半肚三晝夜退火氣不拘顏色好絹或厚紙表開攤其藥封臍每六十日一換此藥能鎮玉池金精不泄興陽助氣通二十四血脈若欲種子揭去膏藥金精射入子宮百發百中又治下元虛冷五勞七傷膀胱氣風濕痛癢兩腿痠麻陽事不舉婦人赤白帶下血山崩漏能令老弱行路剛健顏發轉變仙丹貼臍餅大附子一個要一兩五錢者佳二兩重者更妙甘遂甘草各二錢五分母丁香七個將附子剮空一孔入三味藥於內用上好細花燒酒半斤將瓦罐貯入附子用棉紙封罐口以米數顆放紙上米熱為度取出去甘遂甘草二味不用搗杵如泥入麝香五釐於內做成一餅貼臍上用絹帛繫住不惟固精興陽兼能防寒御暑妙難盡述玄修篇引道家三百六十二旁門而玄為尚玄門百千萬億其説而煉大還採內藥結嬰兒出神尸解者為真真仙之道匪誣也人自不能為則不及見耳其書為世所苦慕則悟真篇參同契悟真張平叔作也參同稱魏伯陽所為亦如素問陰符七國時之書而托之乎黃呂也特其言有會則已夫人以生死為一致則學至聖賢玄術以足足而不能則以生死為外物而證禪宗其道雖上而虛不近人人以生死為慮者惟斤斤處乎虛實之間憂乎務求當身結果惟是言功不可以不知而世之慕玄功者又安忍靳之一不與言乃謀之一三道人一三道人有祕書未遑畢現其精別取虛白陳仙師所撰規中指南書俾豫附會之是為丹書之第五福先發之繹梨使天下之心此道者且略得其梗概云應圓題新鐫五福萬壽丹書玄修篇五福止念第一精滿不思色氣滿不思食耳目聰明男子身洪鉤賦豫不為貧因探月窟方知物為躡天根始識人乾遇巽時觀月窟地逢雷處是天根天根月窟間來往三十六宮都是春念起即覺覺之即無修行妙門惟在此已此法無多子教人煉念頭一毫如未盡何處覓蹤由夫無念者非同土石草木塊然無情也蓋無念之念謂之正念現前回光返照使神御氣使氣歸神神凝氣結乃成汞鉛牢擒意馬鎖心猿慢著工夫鍊汞鉛大道教人先止念念頭不住亦徒然採藥第二心動則神不入氣默然養心身動則氣不入神凝神忘形夫採藥者採身中之藥物也身中之藥者神氣精也採之之法謂之收拾身心斂藏神氣心不動神氣完乃安爐立鼎烹煉神丹識爐鼎第三玄牝真人潛深淵浮遊守規中夫玄牝其白如綿其連如環縱廣一寸二分包一身之精粹要得穀神長不死須憑玄牝立根基真精既返黃金室一顆明珠永不離入藥起火第四取將坎位中心實點化離宮腹裡陰從此變成乾健體潛藏飛躍盡由心坎離交姤第五追二氣於黃道會三性於元宮鉛龍升汞虎降驅二物勿縱放夫坎離交姤則謂之小周天在立基百日之內見之水火升降於中宮陰陽混合于丹鼎雲收雨散氣結神凝見此驗矣紫陽真人曰龍虎一交相眷戀坎離方姤便成胎溶溶一掬乾坤髓著意求他啜取來乾坤交姤第六泥丸上關黃庭中宮中關水中起火下關大略與別圖同外亦交時內亦交三關通透不須勞丹田直至泥丸頂自在河車幾百遭朗然子曰夾脊雙關透頂門修行徑路此為尊華池神水頻吞咽紫府元君直上奔常使氣衝關節透自然精滿穀神存一朝得到長生路須感當初指教人夫乾坤交姤亦謂之大周天在坎離交姤之後見之蓋藥既生矣於斯出焉又訣曰離從坎下起兌在鼎中生離者火也坎者水也兌者金也金者藥也是説也乃起水中之火以煉鼎中之藥莊子云水中有火乃成大塊玉蟾云一點真陽生坎內填卻離中之闕造化無窮水中起火如在虛危穴丹陽真人云水中火發休心景雪裡花開滅意春其證驗如此夾脊如車輪四肢如山石兩腎如湯煎膀胱如火熱一息之間天機自動輕輕然運默默然舉微以意而定息應造化之樞機則金木自然渾融水火自然升降忽然一點大如黍珠落於黃庭之中此乃採鉛投汞之機一日之內結一日之丹也當此之時身心混熱與虛空等不知身之為我我之為身亦不知神之為氣氣之為神似此造化非存想非作為自然而然亦不知其所以然也覆命篇曰井底泥蛇舞柘枝窗間明月照梅梨夜來混沌攧落地萬象森羅總不知攢簇火候第七乾上柱天下柱地只這個是鼎器既知下手工夫容易子翔復守藏勿用初九潛龍勿用一陽生宜守靜意要誠必要定龍德潛藏勿宜輕進醜醜臨進火得位九二見龍在田鼓巽風運火功剎那間滿鼎紅見龍在田光這虛空寅寅泰加火守成九三終日乾乾天地交陰陽均汞八兩鉛半斤奼女欽袂嬰見抑從卯卯大壯沐浴重淵九四或躍在淵水制火金剋木到斯時宜沐浴或躍在淵存誠謹獨辰辰央九五飛龍在天巳巳乾上九亢龍有悔午午姤初六未未豚六二申申否六三酉酉觀六四汞要飛鉛要走至斯時宜謹守把底囊栝結其化戌戌剝退火復治六五黃裳元吉虛其心實其腹宜守靜待陽復動一剎間周天數足亥亥坤野戰守靜上六龍戰於野群陽剝丹光畢至精凝元氣息收拾居中黃裳元吉養火陰既藏再生陽到這裡要堤防若逢野戰其血玄黃陽神脫胎第八掀倒鼎躍翻爐功滿也産玄珠歸根覆命抱本還虛三百日大一十月胎其神離身忽去忽來回視舊骸一堆糞土十步百步切宜照顧孩兒幼小未成人須藉爺娘養育恩九載三年人事盡縱橫天地不由親忌神臺虛第九身外有神猶未奇特虛空粉粹方露全身太上玄門知者少玄玄元不異如如捉將日月歸元象跳出扶輿見太虛煉到形神俱妙處遂知父母未生初這些消息誰傳授沒口先生説與吾張真人解佩令陽神離體冥冥窈窈剎那間遊遍三島跳出純熟按捺住別尋玄妙合真空虛無事了內丹三要內丹之要有三曰玄牝藥物火候丹經子書列為隱語黃絹幼婦讀者惑之愚今滿口饒舌直為天下説破言雖亂縷意在發明字字真訣肝肺相視漏泄造化之機緘貫串陰陽之骨髓古今不傳之祕盡在是矣鯨吞海水盡露出珊瑚枝一竅真端的妙在師真一句傳見圖混沌會八卦貫尾閭月攢五形雲散碧空山色靜通泥丸鶴歸丹闕月輪孤詩曰混沌生前混沌圓箇中消息不容傳擘開竅內竅中竅踏破天中天外天斗柄逆旋方有象臺光返照始誠仙一朝撈得潭心月覷破胡僧面壁禪汞鉛玄牝共一家從此變成乾健體先天氣後天氣八黃房成至寶性由自悟命假師傳龍虎陰陽同一性潛藏飛躍盡由心見圖詩曰五蘊山頭多白雪白雲深處藥苗榮威音王佛隨時種無始天尊下手耘石女騎龍控雨實木人駕虎摘霜藝不論貧富家家有採得歸來共一斤火候圖縱識硃砂與水銀聖人傳藥不傳火五戒殺生偷盜邪淫多言飲酒閉靜但志誠法自然不刻時中分子午開動盜天地奪造化無爻卦內別乾坤不知火候也如間我今拈出甚分明詩曰無位真人煉大丹倚空長劍逼人寒玉爐火煅天尊髓金鼎湯煎佛祖肝百刻寒溫忙時準六爻文武靜中看有人要問真爐鼎豈離而今赤肉團玄牝真篇云要得穀神長不死須憑玄牝立根基真金既返黃金室一顆明珠永不離夫身中一竅名曰玄牝受氣以生實為神府三元所聚更無分別精神魂魄會於此穴乃金丹返還之根神仙凝結聖胎之地也古人謂之太極之蒂先天之柄虛無之宗混沌之根太虛之谷造化之源歸根竅覆命關戊已門庚辛室甲乙戶西南鄉真一處中黃房丹元府守一罈偃月爐硃砂鼎龍虎穴黃婆舍鉛爐土釜神水華池第一神室靈臺絳宮皆一處也然在身中而求之非口非鼻非心非腎非肝非肺非脾非胃非臍輪非尾閭非膀胱非穀道非兩腎中間一穴非臍下一寸三分非明堂泥丸非關元氣海然則果何處曰我的妙訣名曰規中一意不散結成胎仙契云真人潛深淵浮遊守規中此其所也老子曰多言數窮不知守中正在乾之下坤之上震之西兌之東坎離水火交姤之鄉矣一身天地之正中八脈九竅經絡聯輳虛間一穴空懸一珠不依形而立惟附體以生似有似無若亡若存無內無外中有乾坤易曰黃中通理正位居體書曰惟精惟一允執厥中度人經曰中里五氣混合百神崔公謂之貫尾閭通泥丸純陽謂之窮取生身受氣初平散曰勸君窮取生身處此元氣之所由生真息之所由起故玉蟾又謂之念頭動處修丹之士不明此竅則真息不住神化無基且此一竅先天而生後天而接先後二氣總為混沌杳杳冥冥其中有精恍恍惚惚其中有物物非常物精非常精也天得之以清地得之以寧人得之以靈談真人曰得灝氣之門所以歸其根知元神之囊所以韜其光若蚡內守若石中藏所以為珠玉之房皆直旨也然此一竅亦無邊傍更無內外若以形體色象求之則成大錯謬矣故曰不可執於無為不可形於有為不可泥於存想不可著於持守聖人法象見於丹經或謂之玄中高起狀似蓬壺關閉微密神運其中或謂之狀如雞子黑白相杖縱廣一寸以為始初彌歷十月脫出其胞或謂之其白如練其連如環方廣一寸二分包一身之精粹此明示玄關之要顯露造化之機學者不探其玄不領其奧用工之時便守之以為蓬壺存之以為雞子想之以為連環模樣如此形狀如此執有為有存神入妄豈不大謬耶要知玄關一竅玄牝之門乃神仙聊指造化之基爾玉蟾曰似是而非除卻自身安頓何處去然其中體用權衡本自不殊如以乾坤法天地離坎體日月是也契云混沌處相接權輿樹根基經營養鄞鄂凝神以成軀則神氣有所取魂魄不致散亂回光返照便歸來造穴弗離常在此詩曰經營鄞鄂體虛無便把元神裡面居息往息來無間斷全胎成就合元初玄牝之旨備干斯矣抑又論之杏林雲一孔玄關竅三關要路頭忽然輕運動神水自然流又曰心下腎上處肝西肺左中非腸非胃府一氣自流通今曰玄關一竅玄牝之門在人一身天地之正中造化固吻合乎此愚常審思其説大略精明猶未的為真旨天不愛道流傳人間太上慈悲必不固吝愚敢淨盡漏泄天機指出玄關的的大意冒禁相付使骨肉合修仙之士一見豁然心領神會密而行之句句相應是書在處神明護持若孽重福薄與道無緣自然邂逅斯訣雖及見之忽而不信亦不過瞽之文章聾之鐘鼓耳玄之又玄彼烏知之其密語曰徑寸之質以混三才在腎之上心之下倣佛其內謂之玄關不可以有心守不可以無心求以有心守之終莫之有以無心求之終見其無若何可也蓋用志不分乃凝於神但存心絶慮調息令勻寂然常照勿使昏散候氣安和真人入定於此定中觀照內景才可意到其兆即萌便覺一息從規中起混混續續兀兀騰騰存之以誠聽之以心六根安定胎息凝凝不閉不數任其自如靜極而噓如春肥魚動極而嗡如百蟲蟄氤氳開闔其妙無窮如此少時便須意氣合神一歸混沌致虛之極守信之篤心不動念無來無去不出不入湛然常住是謂真人之息以唾踵者其息深深之意神氣交感此其候也前所謂元氣之所由生真息之所由起此意到處便見造化此息起處便是玄關非高非下非左非右不前不後不偏不倚人一身天地之正中正此處也採取在此交姤在此烹煉在此沐浴在此溫養在此結胎在此脫胎神化無不在此今若不明説破學者必妄意猜度非太過則不及矣紫陽真人曰饒君聰慧過顏關不遇明師莫強猜只為丹經無口訣教君無處結靈胎然此竅陽舒陰慘本無正形意到即開開合有時百日立基養成氣母虛實生白自然見之昔黃帝三月內觀蓋此道也自臍以下腸胃之間謂之酆都地獄九幽都司陰穢積結真陽不居故靈寶鍊度諸法存想此謂幽關豈修煉之所哉學者誠思之藥物古歌曰借問因何是我身不離精氣與元神我今説破生身理一粒玄珠是的親夫神與氣精三品上藥煉精化氣煉氣成神煉神合道此七返七還之要訣也紅鉛黑汞木液金精硃砂水銀白金黑錫金翁黃婆離女坎男蒼龜赤蛇火龍水虎白雪黃芽交黎火棗金烏玉兔乾馬坤牛日精月華天魂地魄水鄉鉛金鼎汞水中金火中木陰中陽陽中陰黑中白雄中雌異名雖多皆闢喻也然則何謂之藥物曰修丹之要在乎玄牝欲立玄牝先固本根本根之本元精是也精即元氣所化故精氣一也以元神居之則三者聚於一矣杏林曰萬物生復死元神死復生以神歸氣內丹造自然成施肩吾曰氣是天年藥心為使氣神若知行氣主便是得仙人若精虛則氣竭氣竭則神遊易曰精氣為物遊魂為變欲復歸根不亦難乎玉溪子曰以元精未化之元氣而點化之至神則神有光明而變化莫測矣名曰神是皆明身中之藥物非假外物而言之也然而産藥有川源採藥有時節製藥有法度入藥有造化煉藥有火功吾囊間之師曰西南之鄉土名黃庭恍惚有物杳冥有精分明一味水中金但向華池著意尋此産藥之川源也垂簾塞兌窒韻調息離形去智幾於坐忘勸君終日默如愚煉成一顆如意珠此採藥之時節也天地之先無根靈草一意制度産成至寶大道不離方寸地工夫細密有行持此製藥之法度也心中無心念中無念注意規中渾融一氣又云息息綿綿無間斷行行坐坐轉分明此入藥之造化也清淨藥材密意為丸十二時中無念火煎金鼎常令湯用暖玉爐不要火教寒此煉藥之火功也大抵玄牝為陰陽之原神氣之宅神氣為性命之藥胎息之根平女之祖深根固蒂之道胎者藏神之府息者化胎之源胎因息生息因胎住胎不得息不成息不得神無主若夫人之未生漠然太虛父母媾精其兆始見一點初凝純是性命混沌三月玄牝立焉玄牝既立系如瓜蒂嬰兒在胎暗注母氣母呼一呼母吸一吸凡百動蕩內外相感何識何知何明何曉天之氣混混地之氣沌沌但有一息存焉反其而育天地翻覆人驚胞破如行大山顛失足之狀頭懸足撑而出之大叫一聲其息即忘故隨性情不可供也況亂以沃其心巧以玩其目愛以率其情欲以化其性渾然天真散之而為萬物者皆是矣胎之一息無復再守神仙教人煉精必欲返其本復其初重生五臟再立形骸無質生質結成聖胎其訣曰專氣至柔能如嬰兒手除姤止念靜心守一外想不入內想不出終日混沌如在母腹神定以會乎氣氣和以合乎神神即氣而凝氣即神而往於寂然休歇之場恍今無何有之鄉天心冥冥注意一竅如雞抱卵似魚在水呼至於根吸至於蒂綿綿若存再守胎中之一息也守無所守真息自住泯然若無雖心於心無所存住杳冥之內但覺太虛之中一靈為造化之主宰時即若至妙理自彰輕輕然運默默然舉微以意而定氣運造化之樞機則金木自混融水火自然升降忽然一點大如黍珠落於黃庭之中此採鉛投汞之機為一日之內結一日之丹覆命篇曰夜中混沌攧落地萬象森羅總不知當此之時身中混融與虛空等亦不知神之為氣亦不知氣之為神似此造化亦非存想皆是自然之道吾亦不知其所以然而然藥即生矣火斯出焉大抵藥之生也小則配坎離之造化大則可同乾坤之運用金丹之旨可謂無餘蘊矣豈傍門小術所可同言語哉若不吾信舍玄牝而立根基外神氣而求藥物不知自然之胎息而妄行火候棄本逐末趨妄迷真失太祖録吾未如之何也已矣火候古歌云聖人傳藥不傳火從來火候少人知夫何謂不傳非祕而不傳也採時謂之藥藥之中有火焉煉時謂之火煉中有藥焉能知藥而取火則定里之丹成自有不待傳而知者已詩曰藥物陽內陰火候陰內陽會得陰陽旨火候一處詳此其義也後人惑于丹書不能頓悟聞有二十四氣七十二候二十八宿六十四卦十二分野日月合壁海潮升降長生三昧陽文陰武等説必欲窮究何者為火何者為候及心一生種種著相雖得藥物之真懵然不敢烹煉殊不知真火本無候大藥不計升玉蟾云火本南方屬心心者神也神即火也氣即藥也以火煉藥而成丹者即是以神馭氣而成道也其説如此分明如此直捷夙與仙骨誦為虛言當面蹉過深可嘆惜然火候口訣之要當於真息中求之蓋息從心起心靜息調息息歸根金丹之母心印經曰西風混合百日功靈者此寶者此也海蟾翁所謂開闔乾坤造化機煅煉一爐真日月者此也何謂真人潛深淵浮遊守規中必以神馭氣以氣定息橐籥之天闔陰陽之升降呼吸出入任其息然專氣致柔含光默默行住坐臥綿綿若存如婦人之懷孕如小龍之養珠漸採漸煉漸凝漸結功夫純粹打成一片動靜之間更宜消息念不可起念起則火炎意不可散意散則火冷但使其無過不及操捨得中神抱於氣氣抱於神一意沖和包裹混沌斯謂火種相續丹鼎常溫無一息之間斷無毫髮之差殊如是煉之一刻一刻之周天也如是煉之一時一時之周天也如是煉之一日一日之周天也煉之百日謂這立基煉之十月謂之胎仙以至元海陽生水中火起天地循環乾坤反復亦皆不離一息況所謂沐浴溫養進退抽添其中密合天機潛符造化而不容吾力焉故曰火須有候不須時眥子機關我自知無子午卯西之法無晦明弦朔之節無冬至夏至之分無陰火陽符之別無十二時中只一時之説無三百日內在半日之訣亦不在攢簇年月日時之説若言其時則十二辰意所到皆可為若言其妙則一刻之工夫自有一年之節候但安晨息任天然此先師之的説也晝夜屯蒙法自然何用孜孜看火候此先師之確論也噫聖人傳藥不傳火之旨盡於斯矣若謂藥自藥而火自火則吾不知矣詩曰學人何必苦求師泄漏天機只此書踏破鐵鞋無覓處得來全不費工夫後附修丹摘要玉溪李真人修丹祕訣心凝曰神凝凝神歸氣以煉丹精復乎性攝性歸根以養命還丹之本真鉛汞而以元精為命之根保元精而真鉛自生神乃性之宗嗇元神固而真汞自産是故固精以養氣氣以養神鉛有時而相投石住調息綿綿而為火候神氣頃刻無不相聚忘意久己而成金丹若真鉛走而真汞枯元精散而神元涸欲求還丹不亦難乎此修真者要識養還丹之本知精氣神所依歸依法次第行之而自得夫修之術矣三教一元太極這一圈生生無名象帝光悟得此中真妙訣始知大道祖根源若此者本乎太初其名有三其理則一故儒曰太極所以窮理儘性以至於命釋曰圓覺所以明心見性證性圓通道曰金丹所以修真養性入聖超凡此為三教之分言實乃一體之宗説皆由一誠而能皈一然後各致其功也歟大道正宗祖印知元神之囊所以韜其光雞能抱卵心常聽得顯氣之門所以歸其根坦到成形名自分偈曰此竅非凡竅中中復一中萬神從此出真土與天同次曰心下腎上處肝西肺在東非腸非胃腑一氣自流通又云此竅非凡竅乾坤共合形名為神氣穴內有坎離精括云虛無一竅號玄關正在人生天地間八萬四千分上下九三二八立循環大包宇宙渾無數渾入微塵不見顏真個懸胎金鼎器分明指出在形山訣曰其地到天八萬四千里之由旬蓋人與大地同體以心至腎八寸四分所以喻也故經云天上三十六地下三十六正謂此也則中餘一十二氣而為玄關一竅中黃之府黃庭之宮此乃注意之所念頭起落之地是為安身立命之處元神所居之位也亦為之鄞鄂名為神室又名金鼎玉爐又名玄牝又名土釜則人未生此身先有此竅其修仙之士知此一竅採藥在此配合在此火候在此沐浴在此結胎在此了托在此若世修道希仙非此一竅終不可成功既知此竅自能靜則金丹動則霹壢是一身之樞紐也萬神之宗垣耶勿為無根之談而輕其道則幾矣玄關問答師問曰父母未生之前汝在何處安生立命答曰父母未生之前胎在太虛安生立命師問曰汝即今在何處安身立命答曰胎即今在虛無安身立命師問曰虛無在何處答曰虛無不離方寸師問曰方寸在何處坤之上乾之下中間一寶難酬價師曰除了方寸又何如答曰一點靈光照破大千沙世界師問曰有何憑據答曰耳目口三寶閉息勿發通真潛於深滿浮遊守規中師曰汝既知切當緘口以誠而入以然而守勤而行之其功自有入聖超凡天長地久一體玄關外三寶耳目口是也內三寶精氣神是也外三關上玉枕關中夾脊關下尾閭關其名有數儒名九曲明珠釋名九重鐵鼓道名九竅又名九曲黃河此乃化氣上鼎之正路凡修仙道先須開闢尾閭此關若不開通則陰陽何由而升降神氣何由而周流欲證仙真終不能達其造化而去道遠矣三丹田上泥丸宮中黃庭下水晶宮是也若臍下一寸三分間乃下丹田也一寸五分為氣海即混元海也頂為須彌上有九宮眼為青女口為丹池嗌咽管氣為一二樓心竅為絳宮臍孔為生門腰眼為密戶又為內腎糞門為穀道前有玉爐穴彼門為金闕又為玄門我命凡為外腎腎柄為靈根足心為湧泉穴脊骨二十四節為銀河又為上鵲橋下鵲橋曹溪路根溪路天根月窟任督二脈非口口相傳不得其旨矣三寶分煉上丹田煉元神中丹田煉元氣下丹田煉元精任督二脈醫書所載任督二脈者出於奇經八脈之數不拘於十二經絡乃人身之陰陽一脈也蓋此任脈者乃為陰脈總陰脈之海也起以會陰終以人中穴上髮際循乎腹裡則婦人得此脈為妊娠故龜納鼻息鶴養胎息而致於身之壽所以通通此脈也其督脈者乃為陽脈督領陽之海也起於齦交承漿穴終於長強穴循乎膚表則男子得此脈可長生故鹿運尾閭還精補腦而致於上上之壽所以通通此脈也世人修行須要明此二脈自然水火升降八脈歸源源源運行即登仙道倘或不能明此二脈則二氣何以運徙費功矣成道難也矧夫鹿運尾閭而能煉精龜納鼻息而能煉氣鶴養胎息而能煉神愚夫不悟修煉之機深可惜也先天納屬或二十五以前先天至精即元精乃精中之精也虛無空氣即元氣乃身中之氣也不壞元神即元神乃神中之神也後天外屬或二十五以後交感之精呼吸之氣思慮之神此乃世人日用之間動作之物也修仙之士若外藥不知制煉內藥何由與念合哉丹祖四真金會即真鉛即先天一氣即元始祖氣即混元祖氣即白虎初弦之氣乃真性命也黃婆即真土即戊巳土即煤娉人即鐵牛郎泥牛郎情念乃意也嬰兒自己元神即主人公即一點靈光即本面目乃真性也奼女即是真汞即青龍弦氣乃真性也一身四氣精為青龍氣為白虎腎水為黑龜心火為赤蛇外丹藥真土硫黃真汞水銀真鉛黑鉛內丹藥元神元氣元精陰陽二氣坎宮有戊土即腎中之陽精離宮有巳土乃心中之陰氣蓋修仙之祕妙在即傳先須流戊就已取坎填離故得二五會合自成刀圭圭者丹也是為真丹真藥材身中一陽生時先天一氣為真藥物也真火候後天調息綿綿應數之火候又云以神御氣自為煉以息合符為行火候溫養也真沐浴一念俱忘萬緣放息洗心滌慮定中極靜為沐浴體道心真心即性為體又內藥為體用人心即性心性為用用外藥為用賓主先天命為主自性為賓後天命為賓身性為主也又一念為配自性為主情為賓若念動時則情為賓自性為主也動靜靜則主中覓則主為其體動則賓內其賓見其用若動靜而忘深然氣涵是微顯之道也三乘妙用下乘煉精化氣中乘煉氣化神上乘煉氣還虛是三花聚鼎自然五氣朝元所以精能生氣氣能生神神能合道返本還原鼎入太虛方為證果詎不成真人也哉經云神是性兮氣是命神不外馳氣自定本來三物更誰親失卻將何為本柄又云大藥三般精氣神天然子母互相推滷風混合為真本煅煉工夫日日親故中庸之惟精惟一允執厥中者是以致和天地位焉萬物育焉又云致廣大而盡精微極高明而道中庸所以天君泰然百體從令故祖老子云多言數窮不如守中斯其盡矣右共一身造化今以聊題二三以語同門各宜警省凡修真之士急宜修講玄機真真噹噹若念生死事火速持行功成立見自然神凝氣結益壽延年定登仙聖若見不明造化洞曉機關體用不分難以造其妙欲求仙位何可得矣今既欲口授心傳當執得放心僅守在念勉自修煉自得超凡入聖之境也陰海陽海二圖內丹要訣云坎卦外昏內明離卦外明內暗任督二脈為一身陰陽要世人罕知之至人嗽煉惟服此藥仙經云一物含五彩永作世人祿言其備五行英華總二脈之交會自古真人祕此一穴訣在於口不傳文字仙經曰若人恆腹空平心閉目掐圖澄神啄齒漱煉口中玉液滿口咽之令人耳目聰明又訣唇齒不相合則氣不過尾閭夾脊舌不抵齶則氣不升玉枕泥丸不忍便則氣不行不吸鼻則氣不升人生太和元氣在太和也氣血者陰陽也太極者人生之主也陰陽者一身之榮衛也五臟者五行之符也六腑者穀氣出納之庫也日有常數失其常數則災禍至焉是以人有病安壽夭之不齊蓋元氣即真土也太和即理氣也元氣與穀氣相為體用元氣即穀氣之本體穀氣即元氣之妙用相符生生不已人之神如君君良則國治所以神靜則身安氣如民民聚則國強所以氣服則身健精如財寶財足則國富所以精滿則身肥津液如雨露雨露降則國豐所以津液生則津潤夫修行人道用與世法並行以道用隱世法以世法而全道用是為性命兼修心動則覺應物莫迷恆修三業謹固四門太上端居太極先本於父母未生前度人須要真經度若問真經癸是鉛經體道而行道因經而用借道説經國富民安後修成體屬乾凝神歸妙道抱一守丹田去處渾無礙升騰任自然九年功滿日獨步大羅仙天一生水在人為腎臟其清氣化為精濁氣結成唾精之清者養精精之濁者養骨精壯人多巧有智慧地二生火成心臟清氣化為神濁氣結成汗神之清者化為血濁者養脈君主之官神明出焉天三生木成肝臟成膽腑清氣化養於血濁氣結為淚膜膽氣為魂氣壯有謀慮有果決地四生金成肺臟清者化為氣濁者結成涕養皮氣壯人多節度肺氣為魄天五生土成脾臟成胃腑清者化榮衛濁者結痰涎養肌肉膚腠倉廩之官五味藏焉黃庭經心之神丹英字守靈肝之神龍煙自合明脾之神常在字魂停肺之神皓華字虛成腎之神玄冥字育嬰也太上老君築基作用基址丹田之總名謹守真汞謂之築基貴乎守雌而不雄築基惟在守其雌其雄不動能牢固牢固陰精是築基牢固陰精莫外遊巍然靜坐十旬休幽明不睡常存守心腎相交得自由氣血周流方是美形神俱妙始為優紅黑相交是築基龍虎相併結希夷只將四氣和為一指日丹成不用疑紅黑水火也以水制火火滅為土土者基也一味水中金便是先天藥號曰真鉛又云真土用此制汞橐籥吹噓起巽風一陽初動用神功黃婆引入丹室內虎嘯龍吟氣自沖日會月交明塑望水深火降合屯蒙璇璣運轉擊周天火立見丹砂滿鼎紅三百六十日為一周天之數每日取子午卯酉四時四九三十六數十日共三百六十為周天一串金鈴響向來三關九竅一齊開陰精滴滴排中府陽氣騰騰布滿懷七返金液配奼女九還真津育嬰孩先把乾元根本固次向江湖販藥材神太用則傷於心心既受傷則神氣虛乏心火虛乏不能生脾土脾土失養不能散精於肺肺無所養則元氣衰弱不能生腎腎精不固無以滋水五行之道思火也生宜靜以養其神則能保長久矣五臟有病先於天君怡養天君則疾病不作天君失養則百病生焉修真詩閉息工夫不可無不能閉息盡成誣若還久久功純熟便是修真大丈夫自憤詩自家精氣自家神何必叨叨問別人下手急修猶道晚勸君努力莫因循道本無為無不為得來猶似未聞時誰知男子能成孕龍養明珠雞抱兒純陽詩歷劫修來心作身幾回出沒幾回存此身不向今生度更向何時度此身有等愚人好亂傳閉精淫婦作抽添若將此藥為丹藥笑殺大羅天上仙以心觀心詩以心觀心覓本心心心俱絶見真心真心既絶歸三境外道大魔不能侵又詩靈臺湛湛土如無只許元神裡面居若向此中留一物不能契道合清虛通玄詩偃月爐中一點明玄關深處最通靈學仙不遇真師指枉在皮膚裡面尋悟道詩真鉛真汞結金丹簡易工夫不在繁道在悟真真易悟悟真何用許多言玄牝歌玄牝之門號金母先天先地藏真土含光默默本虛無一氣生成亙今古華池神水天地根煉之餌之命長生自古神仙無別説皆因玄牧入真門借問如何是玄牝嬰兒未先生兩腎兩腎中間一點明逆則成丹順成人一陽起處便下手黑中取無中有一時辰內長黃芽九載三年徒自守世人若識真玄牝不在心兮不在腎窮取生身受氣初莫怪天機輕泄盡若非夙生慶幸宿有善緣心慕真風不能遭遇祖師云謹守謹守莫言莫言自然而然玄之又玄清樂篇引聞之有仙骨者必有仙風有仙風者必有仙術何則神明峻法體氣孤高如石之臞泉之冷凜凜然逼人以超凡之想者此仙骨也丰標縹眇意度清間如山之幽梅之韻飄飄然使人有凌雲之思者此仙風也具此風骨則入世難於偕俗而出世又虞離群是以市廛問卜或寄迹於君平廬山採藥或潛蹤於康子仙術因隨之矣應圓龔師靈根自負慧性夙成所稱仙鳳仙骨者非耶束髮沉酣帖括博覽諸家其於舉子策可謂枯髯嘔吐獨其山水情深兼亦津梁念重乃棄去時藝究心於岐黃盧扁之間遇病輒藥遇藥輒愈救人功德行將圓滿室尼稱博施濟衆堯舜猶病而龔師顧以韋布補唐虞之不逮非有仙術又胡以至此間居喜著丹書並附清樂一篇泉石煙霞以至騷人逸士之致莫不供其筆端之舒嘯日積月纍不覺成秩有矜慎不傳自娛如己之意二三友人從而請之以付剞劂龔師始有難色既而慨然曰與其藏之枕中熟若廣之海內因盡探其祕而出之校仇之事友人實司職之增補之役僑也與有力焉同志者試置此編於案頭自覺風骨珊珊欲仙矣昔東方生以歲星日侍殿廷而英敏如漢武尚未能識其為何許人讀是書者毋為漢武之於東方生可也門人廣惠子鄭之僑謹述新鐫五福萬壽丹書清樂篇六壽四景調調春小門深所巧安排沒有塵埃卻有莓苔然瀟灑勝蓬萊山也悠哉水也悠哉東風昨夜送春來才是梅開又見桃開十分相稱主人懷詩是生涯酒是生涯調夏一生風月且隨緣窮也悠然達也悠然日高三丈我猶眠不是神仙誰是神仙緑陰深里晝鳴蟬捲起珠簾放出爐煙芙蓉池館晚涼天恰好談禪又好談禪調秋扶輿清氣屬吾曹莫怪粗豪莫笑風騷算來名利也徒勞何外為高間處為高一庭松竹間芭蕉風不瀟蕭雨便瀟瀟木樨香里臥吹蕭且度今朝莫問來朝調冬如今揮手謝平生非不間爭是不間爭扁舟湖上放歌行漁也知名牧也知名歸來幽興逼人清雪可中庭月可中庭眼前何物遣吾情不看棋經便看茶經調春我愛春春色好山嘴吐晴煙牆頭帶芳草黃鸝罵杏花惹得遊蜂惱海棠零落牡丹開只恐韶華容易老調夏我愛夏夏日長玉擊棋聲碎羅幡扇影涼薰風賣奇華滿路芰荷香蟬在緑楊深處噪也須回首顧螳螂調秋我愛秋秋思苦籬菊憶陶潛徵鴻叫蘇武黃葉落將來無風自家舞紛紛社燕報歸期舊巢留待來年補調冬我愛冬冬日間烹茶溶雪水拄杖看冰山莫唱征衣曲將軍夜渡關若個漁翁堪人畫一蓑披得凍云還山舍樂山舍肆優遊喜堯蓂一葉抽春盤細菜供椒酒千瓢百卣群相勸酬一年好事今為首祝千秋數聲爆竹驚發歲華流山舍肆優遊似羲皇無別憂男婚女嫁生涯就官租早勾私租薄收粗衣淡飯堪消受度春秋俗情消盡鎮日展眉頭山舍肆優遊到春來萬物稠新松嫩柳羅園囿松花餅柔蕨箕粉柔韭芽菜甲般般茂泛瓷甌山肴野蔌羅列當珍羞山舍肆優遊一枰棋了百憂眼前黑白紛如糾贏時不丟輸時不休橘中之樂偏長久漫相仇人榮人辱何處割鴻溝山舍肆優遊放牛羊在隴頭山田有水堪耕褥黏紅幾丘光紅幾丘黃香早糯堪成酒葛和裘花開花謝誰記晉春秋山舍肆優遊臥松蔭枕石頭蒼苔軟襯如鋪繡雲屏不收花簾不鉤華胥好夢來清晝睡齁茶爐煙起鶴唳豁雙眸山舍肆優遊傲新封藐故侯階除馴雀來相就東鄰殺牛西鄰賣酒忘貧忘富忘機彀每回頭應人呼馬還復應呼牛山舍肆優遊拉高僧訪舊遊無干世事不開口箬笠在頭枯藤在手陰崖絶壑經行透步夷猶石門斜日猶自到松丘山舍肆優遊果園成勝沃州葡萄滿架懸星斗藤梨似甌山榴似球橙黃橘緑渾如繡喜深秋簷垂烏桕結子壓成油山舍肆優遊坐良霄望女牛銀河清淺旋珠鬥梧桐報秋金風戰秋涼生枕菌山容瘦火西流數聲孤雁嘹嚦過高樓山舍肆優遊日高春未裹頭案前亂帙間拈手詩筒手投書筒懶酬深山鹿豕廝相守復何求遽遽一夢蝴蝶即慶周山舍肆優遊傍岩阿架小樓重重疊疊簷相湊山泉暗流山云漫收新篁掩映遮前後灌松楸栟櫚玉樹聊且當封侯山舍肆優遊種田窩喜有秋澆淪熟美新炊就蠶綿早收蜂糖晚收雨茶新筍茅柴酒客堪留陶然一醉明月上高樓山舍肆優遊稱鉤蘆種滿丘開花緑芋沿笆豆溪魚上鉤田蝦上兜黃雞白飯真堪口婦如鳩緝麻為布膏沐若為仇山舍肆優遊九秋霜紅葉稠農家作苦偏多酒茱萸泛甌菊花滿手東籬雅興山翁有醉方休多情破帽固固戀人頭山舍肆優遊到隆冬趣更幽爐煨榾柮瓶煨酒山童飯牛山妻制裘耽間正值間時候棹孤舟歸來興盡立雪釣溪頭山舍肆優遊課兒孫作遠猷晨昏紡織不停手書聲這樓機聲那樓良田美宅何須有倦雙眸懶看人喜亦懶看人愁山舍肆優遊掩松扉獨冥搜浮雲止水皆吾友勞形可羞勞神可憂呆呆不被聰明誘泛虛舟無端世事總不上心頭山舍肆優遊秀孤松在嶺頭東郭穿履人知否緑蓑當裘青黎當舟沿溪踏雪尋梅嗅笑回頭數間茅屋改作玉京樓山舍肆優遊石為梯洞作樓天然藤蔓堪扶手明蟾當油重云作裘鳥啼花放知春晝趁魚舟莫教桃謝怕逐水東流山舍肆優遊荷長烏著敝裘芒鞋席帽攜干糗尋僧仸州尋仙石樓採芝採木穿岩岫到遐陬雲南云北村酒緑如油山舍肆優遊接山泉日夜流乾柴燥炭尋常有賓為不憂賓行不留世間俗態消磨久趣悠悠無牽無絆平地即丹丘山舍肆優遊筍穿籬樹罨樓松棚滿月云封牖攤書不收攤棋不收稽康性懶還依舊鬢蕭颼無多歲月肯為子孫謀山舍肆優遊對青銅覺素秋少年豪俠今安有逢場袖手當歌閉口竿頭一任翻跟斗得前籌百忙蕩里早把擔兒丟山舍肆優遊撫孤桐度抄秋歸鴻目送弦揮手喧虎赳悽清鬼喲高山流水因心奏勝吳謳梅花三弄白鶴下汀洲山舍肆優遊案頭書懶著眸鄴侯萬軸憑他有玄經已丟離騷也勾懷沙投閣皆僝僽厭搜求但逢難字掩卷便搔頭山舍肆優遊想當初著甚由龍陽隊里分妍醜前魚漸丟後魚漸收如今鶴髮雞皮皺不須羞葫蘆一笑都付水東流山舍肆優遊舊行頭一筆勾皂靴底綻衣衫垢塵來閉眸風來抱頭腳根滑塌難馳驟逞風流當場出醜空惹這場羞山舍肆優遊竹皮冠勝冕旒深衣方履雞膯袖黑貂漫遊狐白漫偷縵袍雖敝心無疚泛漁舟不圖徵聘何必著羊裘山舍肆優遊笑奔忙似蹴球誰知萬物皆芻狗榮華水漚功名贅疣電光石火焉能久謾懷憂郭郎才罷終沒下稍頭山舍肆優遊立高岡送遠眸亭亭物表誰堪偶棄瓢許由奪牛伯休逃名惱殺名先漏免追求桃花春水一葉釣漁舟山舍肆優遊竹籬邊茅屋頭泉聲雲影時時有看云翠浮聽泉玉流箇中好景天生就最宜秋紅黃碧緑點染小瀛洲山舍肆優遊懶謀生好傳搜宣和圖譜家藏久尊形似牛鉤形似虯先秦小璽蟠螭紐夏商周千年尤物堪玩不堪留山舍肆優遊日臨池塌史籀芭蕉柿葉皆書透王家子猷唐朝老歐腕中有鬼臨難就莫多求蘭亭碧落一字足千秋山舍肆優遊學修真急轉頭穀神不死玄為母黃河逆流丹田早收稜稜仙骨何嫌瘦住丹丘它年鶴背揮手謝神州山舍肆優遊轉輪王免去求窮通貴賤憑他授跳圈是猴拖犁是牛蝶尋香氣蛆鑽臭摸心頭未嘗為惡不怕帖來勾山舍肆優遊弄虛頭沒盡頭線牽傀儡難停手這根用抽那根用丟悲歡離合般般有枉風流酒闌人散收拾衆骷髏山舍肆優遊走天涯有盡頭流沙弱水難行透陰山雪愁陽山浪愁中尿如掌囂塵厚息掩留深山靜坐一日勝三秋山舍肆優遊山餉遼陽苦建酋時危祇合潛初九山多可憂田多可憂盧同破屋渾如舊免徵求只愁浪大無處可眠鷗山舍肆優遊紫薇垣王氣浮如何哀詔頻頻有宮妝早休宮車晏遊青宮一月遭陽九喜神州金甌無缺正笏可安劉齋中詠掃徑風雨撼竹樹階除饒落葉只恐破苔封短慧輕自攝拭幾朝來盥櫛罷揮塵拂纖塵玄素本不滓藉以滌吾神展圖花繞一溪遠云擁孤峰高疑向山陰道天風灑苧袍洗硯有磯懶垂綸洗硯墨為沼紫端發新光書興應不少焚香細細蘭舒馥英英山吐云端居娛鼻觀不為禮元君移榻明月滿前軒涼風生北牖所在愜孤吟不厭坐來久彈棋枯棋多危機慮變苦不早袖手局外觀無貪終自保煮茗午枕夢魂清松濤忽盈耳七碗三春芽聊試山前水清談唇吻非名理冥搜時一證頽然各忘言仰視長天靜浮白醇醪堪藥仙興到時自斟叩門來知己論文足賞心呼盧雄心發清歡援瓊佐長嘯挾策亦亡羊齷齪慚同調浩欹抱膝坐蘚石永言吐清商採芝行相和與爾以徜徉分韻共欣景物奇寫懷寄千載大雅嗟久沉誰能矜彩檢書直須破萬卷誰謂足三冬糟粕即神髓輪扁見何庸鼓琴援琴弄中夜心耳湛同情水沉凝不散幽窗孤月明散步林風動天籟行吟忽披襟前溪新水長激石生好音飼魚盆池升斗水具有江湖適魚樂心自領遊泳共昕夕種樹扶疏初蔭席夭喬欲參天匠石非所期矧為計十年養蒲卷石儼巉巖天泉飛瀑布當此值靈根緑髮滋湛露灌花小圃不盈畝山花隨意開抱甕時自汲無勞羯鼓催摘蔬素抱寄黃齏太羹調六玉朝雨採春畦喜見生意足放鶴間階顧影舞清唳徹寥天凌風一振翩遙帶孤雲還卷幔何物共幽常花月映窗虛布幔便高臥固時作卷舒高臥偃仰遊羲皇萬營都屏息任客憩蒲團覺來日已晐花所詠元郊草長元郊生草草生煙留得凼詞白日懸江漢偶羈青瑣客千年復和邀遊篇洪池蓮開夏半嬌蓮映水開輕紅朵朵契入懷幽人載酒池邊飲帶得清香滿袖回菊圃霜垂萬卉經霜葉盡黃英英菊蕊始含芳村沽白酒和英泛醉讀陶詩興愈長梅堂雪映數樹寒梅葉室傍千枝潔白散清香天風一夜飄瓊絮並作瓊枝映講堂梅花賦江南地暖獨冠先春蘊姿而豔秉潔而純托根泉沼不汙世塵冰痕結密煙影含新苔封鶴膝雪裹龍身一枝秀髮玉粒精神珠裳縞袂瓊珮素巾或顯兮翰苑玉堂之側或隱兮空山流水之濱清風良友明月故人特立物表絶類離倫其德之清也如鄭子貞其氣之和也如程伯淳至若藏春之塢碎錦之坊蘭稱國色桂號天香嬌容麗質異態殊妝終近於豔烏足表揚何如茲卉高壓衆芳雅淡依乎山澤幽絶占乎林塘處富貴而不移其性居歲寒而不變其常妹水仙兮弟山礬壻芍藥兮妃海棠桃李奴僕得借恩光佳實宜調於商鼎奇材足充乎禹梁觀夫體先天之妙含至陽之精風韻古淡晉之淵明必腸鐵石唐之廣平每巡簷而索笑乃引鶴而隨行怡間以寫琴島之趣放逸以吟詩外之情四海負於英望千古馳其香名走也坐東閣呼管城假此植物遙致長生漆園椿樹八千齊齡修竹賦猗猗修竹不卉不蔓非草非木操挺持以高世姿瀟灑以拔俗葉深翠羽干森碧玉孤生太山之阿千畝渭川之曲來清焱於遠岑娛家人於空谷觀夫臨曲檻俯清流色侵雲漢影動漣漪蒼云夏集緑霧朝霏蕭蕭雨沐嫋嫋風披露鶴長歌秋蟬獨嘶金石間作笙竽誰吹若乃良夜明月窮冬積雪掃石上之陰聽林間之折意參太古聲沉寂寥耳目為之開滌神情為之怡悅蓋其媲秀碧梧托友青松蒲柳慚弱桃李羞容歌籰籰於衛女淇奧奧於國風故子猷吟嘯於其下仲宣宴息乎其中七賢同調六逸齊迹良有以也又況鳴嶰山之風化葛陂之龍者哉至於虛其心實其節貫四時而不改柯易葉則吾以是觀君子之德夜讀賦繄惟志士之徵邁兮乃篝燈熒而夜讀爰發亡書之三篋兮蓋羡張安世之目用宏夙儲於五車兮欲如邊孝先之腹惟時群器屏而宴息兮將余棼拿之已就肅但瞻戶外之三星兮止聞天坡之一騖燒寶鼎氤氳之若雯兮剔銀缸清瑩之如浴疊廣文青氈之半榻兮下馬融絳帳於高束酌春茗之蓓蕾兮咽晚糜以苜蓿下應氏之五行兮披鄴侯之萬軸訝皮編之敝於欲斷兮何牙籤之新而不觸隨開洛誦之殷殷兮不減伊吾之謖謖幸分江上處女之餘明兮略耿耿而若毣陽氣時滿乎大宅兮炯炯雙眸而逾矚惟熠耀之霄行兮又睹望舒之餘於缺屋況蛩聲秋秋於四壁兮若助余呻吟之碌碌時齁齁鼾睡在余這臥側兮輒不容而詈僕披夕秀固無間於帖席兮然猶每借警於圓木即旦日萹什之已陳兮中霄無妨乎更熟不嫌引錐以自刺兮光雖竭而更丐鄰之壁煜矧復中壘之抽玄兮老人之藜輝可續苟達人真覺之自採兮即廢膏油而問心之亦足縮萬匯之華於眉端兮抉千古之祕於衰曲我思古人之矻矻窮年兮夜黽勉固無分乎寒燠春罷犁而課經兮夏囊螢而代燭秋聽聲而下睫兮冬映雪以三復抑聞焚膏以繼晷兮用成韓公之宏蓄爰有聞雞而起舞兮誰步祖生之芳躅對玄雞於處宗兮吐白鳳於天祿阿素王之足馳兮仍不寢而自勗雖元聖而未寧兮每坐旦以式谷嗚呼余誠有憎於寸陰兮何暇就安於枕褥讀書樂春山光照檻水繞廊舞雩歸詠春風香好鳥枝頭亦朋友落花水面皆文章蹉跎莫遣韶華老人生惟有讀書好讀書之樂樂何如緑滿窗前草不除夏新竹壓簷桑四圍小齋幽廠明朱曦晝長吟罷蟬鳴樹夜深燼落螢入幃北窗高臥羲皇侶只因素得讀書趣讀書之樂樂無窮瑤琴一曲來薰風秋昨夜窗前葉有聲籬豆花開蟠蟀吟不覺商意滿林薄蕭然萬籟涵虛清床頭賴有短檠在對此讀書功更倍讀書之樂樂陶陶起弄明月霜天高冬水盡木落千崖枯回然吾亦見真吾坐對遺編燈動璧高歌夜半雪壓廬地爐茶鼎烹活水心清足稱讀書者讀書之樂何處尋數點梅花天地心警悟選松齋自題非老亦非少年過三紀余非賤亦非貴朝登一命初才小分易足心寬體長舒克腸皆美食容膝即安居況此松齋下一琴數帙書書不求甚解琴聊以自娛夜直入吾門晚歸臥吾廬形骸委順動方寸同空虛持此將過日自然多宴如昏昏復默默非智亦非愚遣懷寓心身體中寓性方寸內此身是外物何足苦憂愛況有假飾者華簪及高蓋此又疏於身覆在外物外操之多惴栗失之又悲悔可知名與利得喪空為害頽然環堵客蘿惠為巾帶自得此道來身窮心甚太春眠新浴肢體暢獨寢神魂安況因夜深坐遂成日高眠秋被薄亦暖朝窗深且間卻忘人間事似得枕上仙至適無夢想大和難名言全勝彭澤醉欲敵曹溪禪何物呼我覺百勞聲關關起來妻子笑生計春茫然間居空腹一盞粥飢食有餘味南簷半床日暖臥因成睡綿袍擁兩膝竹几支雙臂從旦直至昏身心一無事心足即為富身間乃當貴富貴在此中何必居高位君看裴相國金紫光照地心苦頭盡白才年四十四乃知高年蓋乘者多憂畏睡起晏坐後亭晝眠足起生春景暮新覺眼猶昏無思心正住淡寂歸一性虛間遺萬慮瞭然此時心無物可譬喻本是無有鄉亦各不用處行禪與坐志同歸無異路晏坐鳥嗚庭樹上日照屋簷時老去慵轉極寒來起尤遲厚簿被適性高低枕得宜神安體穩暖此味何人知睡足仰頭坐兀然無所思如未鑿七竅若都遺四肢緬想長安客早朝霜滿衣彼此各自便不知誰是非逍遙詠亦莫戀此身亦莫厭此身此身何足戀萬劫煩惱根此身何足厭一聚虛空塵無戀亦無厭始是逍遙人遺懷羲和走馭趁年光不許人間日月長遂使四時都似電爭教兩鬢不成霜榮銷枯去無非命壯盡衰來亦是常已共身心要約定窮通生死不驚忙偶題閣下廳靜愛青苔院深宜白髮翁貌將松共瘦心與竹俱同暖有低簷日春多揚幕鳳平生間境界盡在五言中自詠朝亦隨群動幕亦隨群動榮華瞬息間求得將何用形骸與冠蓋假合相戲弄何異睡著人不知夢是夢和知非因君知非間詮較天下事第一莫若禪第二無如醉禪能泯人我醉可忘榮淬與君次第言為我少留意儒教重禮法道家養神氣重禮足滋彰養神多避忌不如學禪定中有甚深味曠廓瞭如空澄凝勝於睡屏除默默念銷盡悠悠思春無傷春心秋無感秋淚坐成真諦樂如受空玉賜既得脫塵勞兼應離慚愧除禪其次醉此説非無謂一酌機即忘三杯性咸遂逐臣去室婦降虜敗軍帥思若膏火煎憂深扃煉祕須憑百杯沃莫惜千金費便似罩中魚脫飛生兩翅勸君雖老大逢酒莫回避不然即學禪兩途同一致嗟發澆朝亦嗟發落暮亦嗟發落落盡誠可嗟盡來亦不惡既不勞洗沐亦不煩梳掠最宜濕暑天頭輕無害縛脫置垢巾幘解去塵纓絡銀瓶貯寒泉當頭傾一杓有如醍醐灌坐受清涼樂因覺自在僧亦資於剃削安穩眠家雖日漸貧猶未苦飢凍身雖日漸老幸無急病痛眼逢鬧處合心向間時用既得安穩眠亦無顛倒夢不與老為期不與老為期因何兩鬢絲才應兔天促便已及衰贏昨夜夢何在明朝身不知百憂非我所三樂是吾師閉目常間坐低頭每靜思存神機慮少養氣語言遲行亦攜詩卷眠多枕酒厄自慚無一事少有不安時間詠步月憐清景眠松愛緑陰早年詩思苦晚歲道情深夜學禪多坐秋牽興漸吟悠然兩事外無處更留心自詠隨宜飲食聊充腹取次衣裳亦暖身未必得年非瘦薄無妨長福是單貧老龜豈羡犧牲飽蟠木寧淨桃李春隨分自安心自斷是非何用問間人即事重裘暖帽寬氈履小閣低窗深地爐身穩心安眠未起西京朝士得知無不出門彌月不出門永日無來賓食飽更拂床睡覺一頻伸輕箑白鳥羽新菌青箭筠方寸方丈室空然兩無塵披衣腰不帶散發頭不巾袒洗北窗下葛天之遺民一日亦自足況得以終身不知天壤內目我為何人詠隱相對蒲團睡味長主人與客兩相忘須臾客去主人睡一枕西窗對夕陽自詠堪憐心窄難容懶為恨眉松不繫愁萬蕊腔花憑酒放一枝心繭任詩抽醒世語君看葉里花能得幾時好今日畏人攀明朝待誰掃可憐嬌豔情年多轉成老將世比於花紅顏豈長保昨見河邊樹摧殘不可論二三餘蕊卉千萬斧斤痕霜剝萎黃葉波沖枯樹根生處當如此何用怨乾坤重岩我卜居鳥道絶人迹庭際何所有白雲抱幽石住茲凡幾年屢見春冬易寄語鐘鼎家虛名定何益畫棟非吾宅青林是我家一生俄爾過萬事莫言賒渡濟不造筏漂淪為採花善根若不種何處見生芽何以長惆悵人生似朝菌那堪數千年新舊凋零盡以此思自哀哀情不可忍奈何當奈何脫體歸山隱聞道愁難遣斯言謂不真昨朝才知卻今日又纏身月盡愁難盡年新愁更新誰知席帽下元是昔愁人死生原有命富貴本在天此是古人語吾茲豈謬傳聰明好短命癡蠢卻長年鈍物豐財寶惺惺漢無錢醒迷歌醒迷人甘淡薄茅屋布衣心自足布衣不破勝羅衣茅屋不漏如華屋不求榮不近辱平生隨分隨時足遠近人間是與非逢場作戲相歡逐也若癡也若朴一生正直無私曲終朝睡到日三竿起來幾碗黃齏粥吃一飽唱一曲自歌自笑無拘束客來相顧遣情談客去還將猿馬縛或彈絲或品竹常笑他人徒碌碌南北奔馳為利名為誰辛苦為誰蓄夫妻圓兒女育雨里鮮花風裡燭多少烏頭送白頭多少老人為少哭滿籝金滿堂玉何能滿兔無常捉臨鋮漸覺一場空只有孤身無伴僕厚木棺堅石諄此身也向黃沙伏世上固無再活人何須苦苦多勞碌識得破萬事足惟有衣糧為己祿甘羅十二受皇恩子牙八十食天祿嘆秦公笑金谷古今興廢如棋局我今打破醒迷關迷者欲醒須常讀至寶歌見美女時做虎狼看見黃金時做糞土看這個中間享了多少清福讓他説話我只閉口讓他指點我只袖手這個中間省了多少間氣我施有恩不求他報他結有怨不與他交這個中間寬了多少懷抱忍不過時著力再忍受不得處耐心且受這個中間除了多少煩惱世情濃釅處淡得下塵俗牽纏處斬得下這個中間息了多少妄想緩步當車晚食當肉寡營是智無病是福這個中間討了多少受用收得放心戒得忿怒薄得世味遠得嗜欲這個中間養了多少精神既不作誦亦不好事既不損人亦不利己這個中間消了多少災危炎涼歌世態輕人情惡冷暖相交非古學古人結義吐心胸今人交口言捉縛無公直惟刻剝面如竹紙囂且薄終日銜杯花月前明朝落阱顏非昨當面奉背後矗一塊磚頭兩邊丟從今再世沒雷陳人情遍地俱梟惡貧自守甘淡薄世重輕浮不重朴安如自適自心田富貴浮雲都避卻侵豪勢見其炎低頭掬背意拳拳遠奔趨迎深作揖手與心齊聽語傳不呼喚捱上前掇臀捧屁許多端將沒作有來承應獻子出妻皆奉炎疏貧士見淒涼好友至親參與商斜目視他相擲路不因轉巷且回廊不若見他衣貌醜惟慮其人借短長他拱手我假揚恐非體面少增光欲要逢迎幽徑處躲閃崎嶇只避涼兄輕弟弟薄兄只緣貧富不相同共父母生分吳越不憐手足只嫌窮妯娌訕疏弟兄背後搬唆惡語攻提攜惟恐為常襲親近酸丁辱面容遠骨血識異宗轟轟卻使一帆風同胞陌路如仇隙惡薄炎涼也為窮歸家裡自嘆傷時乖運蹇被人坑世情冷暖人輕薄將言譬説與妻房遭潑悍沒商量朴臺朴凳數詞長姊邊富豪多受用妹歸仕宦稱夫良我從你不顯揚當初錯嫁怨爹娘放聲哭把媒人罵賺奴虛度少年芳張田宅趙園莊錢家巨富米盈倉撇了甜桃隨苦李誰知半世不風光昏昏守夢一場終身耽擱自伊妨不如還我了當去割斷沙腸兩下忘各自去趁早強別圖良配過時光夫妻貧窘疏緣法室內操戈也為涼捧兒女哭斷腸抱定親生意慘傷問言兒欲歸何所不隨窮父只隨娘全天性莫思量養身那養志和腸你非交本為商賈休想三餐我飯嘗本缺少討孔方無錢安得做爹娘心高氣硬不啾啋子父逆倫也為涼妻妾奉奴僕良親朋接踵笑高堂兄愛弟敬相和睦皆是趨炎不畏涼貧自適知止強人情反覆甚炎涼妻兒面且多冷暖何怪傍人效此狂嘗世味遍覓方不知退隱避山岡今朝昨日顏千變你我他年過莫忘朝耕隴幕車塘母為牛後死田莊休行險道圖僥幸飲啄前生定主張妻兒聚冤債堂割開縈絆劈炎涼孽城打破逃身外明目肩挑不著忙一笑歌寒山拾得笑呵呵恰遇彌勒來渡河仙笑布袋癡和尚佛笑邋遢二癡待仙笑和尚離彼岸和尚笑仙脫愛河和尚笑仙仙笑佛佛仙拍手笑呵呵不笑世人歡共樂笑人羈絆被鬼魔換臉改頭來待伴笑人誰識破森羅兒孫嘗食爹娘肉笑人滋味識如何媳婦常抱公婆哭笑人懷內孰誰阿笑人霸占張三屋李四搬來後又他笑人倉積皇家米爾去徵收卻自何笑人庫內儲金玉堆積如山卻自何笑己肉身還自偽做千年鋽卻如何笑隨車馬多如簇一朝氣斷用誰駝嬌妻美妾都成笑誰人同去見閻羅我等笑人人笑我笑遍天涯總孽魔我今見人只是笑笑人夢不醒南柯堪笑黃梁猶未熟人生一世覺來呵笑人拴縛業城內笑人迷障在煙波將身逃出無邊界看破人情只是笑呵呵百忍歌百忍歌歌百忍忍是修齊之樞機忍是治平之綱領能忍貧而樂能忍壽而永不忍貴則傾不忍富則窘不忍小事變為大不忍善性成凶狠百忍歌歌百忍夷齊餓首陽乃為義而忍閔子守單衣乃為孝而忍相如屈廉頗乃為忠而忍蘇武老胸奴乃為節而忍劉伶非端士乃為酒不忍桀紂失天下乃為過不忍石崇忘其家乃為財不忍項羽喪其元乃為氣不忍百忍歌歌百忍文王薑里忍周興七國不忍干戈逞勾踐嘗膽忍復仇燕丹不忍速身殞顏回陋巷忍簞瓢子路不忍夫子曬子房取履忍成名田橫不忍徒就刎師德唾面忍自乾德昭不忍真愚蠢百忍歌歌百忍絶纓出燭全此忍攘馬賜酒施此忍終身讓路行且忍食範吞蛭充此忍不罪吐茵推此忍不辭飲醯味此忍不發盜惡含此忍不問朝士得此忍與馬不爭間此忍射牛不較守此忍持燭烯須明此忍翻羹汙袍甘此忍六院同袍充此忍懲忿室欲忍之方執雌守下忍之準忍字可以作聖基忍字可以為善本忍字可以行蠻貂忍字可以制強梗如金忍煉精益精如松忍寒徑益徑如海忍汙深益深如山忍垢峻益峻須知忍即量中天莫嫌忍為心上忍一忍七情皆中和再忍五福皆軿臻忍到百忍滿腔春熙熙宇宙都是境作百忍歌歌不盡銘心世世忍百忍養心歌得歲月忘歲月得歡悅且歡悅萬事乘除總在天何必愁腸千萬緒放心寬莫膽窄古今興廢言可徹金谷繁華眼裡塵淮陰事業鋒頭血陶潛籬畔菊花黃范蠡湖邊蘆月白臨潼會上膽氣雄丹陽縣裡蕭聲絶時來頑鐵有光輝運去良金無豔色逍遙且學聖賢心到此方知滋味別粗衣淡飯足家常養得浮生一世拙長恨歌月落更殘漏聲斷續萬事經心眠不熟仰首望天天未明側耳聽雞雞正宿千愁萬恨少人知剔起銀燈訴衷曲少年胸襟天地寬一心直想超凡俗百工技藝不肯學萬卷詩書勤苦讀讀書望登天子堂誰知讀書成勞碌連年流落在江湖江湖風景多瀟索一生去住由主人三餐遲蚤由奴僕俏眠孤枕夢魂多冷落書齋形影獨身如有罪人坐在無罪獄利覓蠅頭且莫言弟子愚頑難輔育輔育規模嚴護短不容加鞭朴輸育無成功又責先生才不足此情此情訴向誰長嘆一聲自藏蓄我思家有數畝田勤儉足以供饘粥我思家有數株桑養蠶足以供衣服有池可養化龍魚有地可栽雙鳳竹牆東一枝林甫梅雪裡花開香馥郁窗前數莖濂溪草兩間茂葉齊腰緑夏有六郎蓮秋有淵明菊更有一斗破書房又有兩間小茅屋堂上母親壽可祝室中有女顏如玉醒時酒一壺間來棋一局散散淡淡過一生何必衣金腰紫食天祿思我功名心性酷未肯飄然然退林麓丈夫有志事竟成窮途何必吞聲哭蘇秦未封侯曾被嫂辱大舜未登庸深山伴麋鹿曾聞韓李儔出入身為僕又聞百里奚將身自秦鬻我有筆鑽天我有書滿腹文章壓倒呂東菜詩才不讓黃山谷孑孑獸中麟琅琅石中璞海底神龍不久潛廄中良馬豈長伏馮歡長鋏不須彈郭隗之臺終見築興來揮筆寫長歌掃盡如天紙一幅我歌我歌非逞才吐出胸中愁萬斜長歌寫罷膽氣豪叮嚀重為主人囑嚀主人為我囑叮嚀古來窮達如轉軸冷地傳臚第一名天下英才盡割目誰鼓歌幾更幾點聽我歌孝親順長萃天和睦鄰教子安生理毋作非為罹網羅幾更幾點聽我歌忍性含情受益多薰陶德性成賢聖父訓師傳謹切磨譙鼓初更睡未多各人檢點自心麼善惡一毫都有報分明天道不差訛譙鼓二更醒也麼蓄思姦巧欲如何你要弄人人弄你幾曾跳出惡巢窠譙鼓三更夜半過天心中正影森羅人心若比天心正家自昌兮體自和譙鼓四更睡夢多不知終日亦南柯喚你醒時須急醒等間歲月易消磨誰鼓五更天若何靈臺初覺善心多願將此念同池水任是風波也不波我今歌罷五更歌端為諸人卻睡魔若得大家開醒眼乾坤依舊禹山河放生文蓋聞天下至重者生命世間最慘者殺傷是故逢擒則奔蟣蝨猶知避死將雨而徒螻蟻尚且貪生何乃網于山罟於淵多方掩取曲而釣直而矢百計搜羅使其膽落魂飛母離子散或囚籠檻則如處囹圄或被刀砧則同臨剮戮憐兒之鹿舐瘡痍而寸斷柔腸畏死之猿望弓影而雙垂悲淚恃我強而凌彼弱理恐非宜食他肉而相己身心將安忍由是吳天垂憫古聖行仁解網著於成湯畜魚興於子産聖哉流水潤枯稿以囊泉悲矣釋氏代危亡而割肉天台智者鑿放生之池大樹仙人護棲身之鳥贖鱗蟲而得度壽禪師之遺愛猶存救龍子而傳方孫真人之慈風未泯一放龜也毛寶以臨危而脫難孔愈以微職而封侯一活蟻也沙彌易短命而長年書生易早名而上第屈師縱鯉於元村壽增一紀隋侯濟蛇於齊野珠報千金拯已溺之蠅酒匠之死刑免矣舍將烹之鱉廚婢之篤疾瘳焉貿死命於屠家張提刑魂超天界易餘生於釣艇李景文毒解丹砂孫良嗣解贈繳之危卜葬而羽蟲交助潘縣令設江湖之禁去任而水族悲號信老免愚民之牲祥符甘雨曹溪守獵人之網道播神州雀解銜環報恩狐能臨井授術乃至殘軀得命垂白壁以聞經難地求生現黃衣而入夢施皆有報事匪無徵載在簡編昭乎耳目普願隨所見物發慈悲心捐不堅財行方便事或恩周多命則大積陰功若惠及一蟲亦何非善事苟日增而月纍自行廣而福崇慈滿人寰名通天府蕩空障多祉萃於今生培積善根餘慶及於他世倘更助稱佛號加諷經文為其回向西方令彼永離惡道則存心愈大植德彌深通業資之速成蓮臺生其勝品矣勸世文粗衣淡飯足矣村民陋巷何妨謹言慎行禮從常反復人心難量驕奢起而敗壞勤儉守而榮昌骨肉貧者莫相忘都是自家身上本分循乎天理前程管取久長他非我量莫爭強忍耐些兒為尚禮樂詩書勤學酒色財氣少狂間中檢點日思詳都是自家身上作善必為慶澤作惡終有災殃憐貧愛老效忠良何用躬誠俯仰運去黃金失色時來鐵也生光眼前得失與存亡都是自家身上凡事有成有敗任他誰弱誰強身安飽暖足家常富貴貧賤天降得意濃時便罷受恩深處休忘遠之愚謬近賢良都是自家身上樂志論蹰躇畦苑遊戲平林濯清泉追涼風釣遊鯉戈高鴻風乾舞雩之下詠歸高堂之上安神閨房思老氏之玄虛呼吸精和求至人之倣佛與達者數子論道講書府仰二儀錯綜人物彈南風之雅操發清商之妙曲逍遙一世之上脾睨天地之間不受當時之責永保性命之期如是則可以凌霄漢出宇宙之外矣自樂詞閬苑瀛洲金谷陵樓美不如茅舍清幽野花繡地莫也風流也宜春也宜夏也宜秋酒熟堪客至須留更無榮無辱無憂退間一步著甚來由但倦時眠渴時飲醉時謳短短橫牆矮矮疏窗忔兒小小池塘高低疊峰緑水邊傍也有些風有些月有些涼日用家常竹几黎床靠眼前水色山光客來無酒清話何妨但細烹茶熱烘盞淺澆湯水竹之居吾愛吾廬石磷磷床砌階除軒窗隨意小巧規模卻也清幽也滯灑也寬舒懶散無拘此等何如倚闌干臨水觀魚風花雪月贏得工夫好炷心香説此話讀些書淨掃塵埃惜耳蒼苔任門前紅葉鋪階也堪圖畫還也奇哉有數株松數枝竹數枝梅花木栽培取次教開明朝事天自安排知他富貴幾時來且優遊且隨分且開懷色戎針若耶溪女千古姝色倘有達人名之尤物今人相方避謝千百佳麗既徵云何則惑一味癡淫不辨菽麥汁泄樹枯脂於燈滅飲劇尊空汲頻水竭物理如斯匪云妄説常見瘵人纖腰一捻譬彼杜鵑所吐皆血喘若吳牛枯如涸徹直至髓干一縷斯絶此輩閻羅何曾拘攝粉黏髏者無乃勾牒打算及茲毛寒心冽補漏收韁懼猶弗獲膽若彌天請蹈覆轍否則淫根東流急撇匪直全軀兼以蓄德厥有人倫詩稱琴瑟反目固乖嘻嘻豈得舉案近迂畫眉可輟漢之長卿才寧不傑購一淫孀消渴斯烈豫也軀命豈供人悅若不回顧百分癡拙夢覺酒闌大笑口裂自撫肝腸一寸一鐵枯木寒岩孤雲積雪作如是觀庶幾了徹究竟堅固以保明哲清語摘奇人物自處超然處人藹然無事澄然有事斬然得意歇然失意泰然非盛養者不能與於此燕居獨入汨汨然群居類聚施施然沒理沒會轇轇然臨境上彀倀倀然志得意滿揚揚然困窮拂鬱戚戚然是皆不學之故人物程伊川嘗言今農夫祈寒暑雨深耕易播種五彀吾得而食之百工技藝作為器物吾得而用之介胄之士披堅執鋭以守土字吾得而安之無功澤及人而浪度歲月晏然為天地間一蠹人物山棲是勝事稍一縈戀則亦市朝書畫賞鑑是雅事稍一貪癡則亦商賈杯酒是樂事稍一徇人則亦地獄好客是豁達事一為俗子所撓則亦苦海人物武士無刀兵氣書生無寒酸氣女郎無脂粉氣山人無煙霞氣僧家無香火氣換出一番世界俱世上不可少之人人物口中不説雌黃眉端不挂煩惱可稱煙火神仙隨宜而栽花竹適性以養禽魚此是山林經濟山水山翠繞湖容態百逞獨春朝最佳或霧截山腰或霞橫樹杪或淡煙隱隱搖蕩晴輝或巒氣浮浮掩映曙色峰含旭日明媚高彰風散溪云林皋爽朗更見遙岑迥抹柔藍遠岫忽生濕翠變幻天呈頃刻萬狀奈此景時值酣夢恐市門未易知也山水松聲竹韻不濃不淡傾耳聽之頓長聲價春色豔冶如笑夏山蒼翠如滴秋水明淨如妝冬山慘淡如睡郭熙此語分明畫出四時出色野人識此真是取之無禁用之不竭花木六橋桃花人爭豔賞其幽趣有六未易領會其一在曉煙初被霞彩影紅微露輕勻風姿瀟灑若美人初起嬌怯新妝其二明月浮花影籠香霧色態嫣然夜容芳潤若美人步月豐致幽間其三夕陽在山紅影花豔酣看力倦嫵媚不勝若美人微醉風度羞澀其四細雨濕花粉容紅膩鮮潔華滋色更煙潤若美人浴罷暖豔融酥其五高燒庭燎把酒看花瓣影紅綃爭妍弄也若美人晚妝容冶波俏其六花事將闌殘紅零落辭條未晚半落半留兼之封家姨無情高下陡作使萬點殘紅紛紛飄泊撲面撩人浮樽沾席意況蕭騷若美人病怯鉛華消減又若芳草留春翠栶堆錦我當醉眠席地放歌詠懷使花片歷亂滿衣殘香隱隱朴鼻夢與花神攜手思逐彩雲飛動幽歡流暢此樂何極花木以境論花神氣絶肖桂花天宮蓮花佛國梅花仙界隔絶人世凡境已脫至若水仙梨花一切清韻則素士之明窗也夭桃紅杏一切濃豔則公子之華堂也海棠為靚女之妝樓玉蘭為高人之傑閣盤郎宮殿而以牡丹芍藥比觀隱逸茅茨而以紅蓼白蘋較寂或似維摩之室或似庚麼之樓或似金谷之園或似琅環之洞若山茶山樊秋葵秋菊石榴如火丁香如星由此而推一一配合擬境得神自是花中快論耳撰讀讀書宜樓其快有五無剝啄之驚一快也可遠眺二快也無濕氣浸床三快也木末竹顛與鳥交語四快也雲霞宿高簷五快也撰讀書堂中修行法心間手懶則觀法帖以其逐字放置也手閉心懶則治迂事以其可作可止也心手俱間則寫字作詩以其可以兼濟也心手俱懶則坐睡以其不強役於神也心不甚定宜看雜短故事以其易於見意不滯於久也心間無事宜看長篇文字或經注或史傳或古人文集此又甚於風雨之際及寒夜也又曰手冗心間則臥心手俱間則著作書字心手俱冗則思早畢其事以寧吾神撰讀讀史宜映雪以瑩玄鑑讀子宜伴月以寄遠神讀佛書宜對美人以晚墮空讀山海經叢書小史宜看疏花瘦竹冷石寒苔以收無垠之遊而約縹眇之論讀忠烈傳宜吹笙鼓瑟以揚芳讀姦佞論宜擊劍捉酒以消憤讀騷宜空山悲號可以驚壑讀賦宜縱飲狂呼可以旋風讀詩詞宜歌童按拍讀神鬼雜録宜燒燭破幽他則遇境既殊標韻不一若眉公消夏闢寒可喻適志雖然何時非散帙之會何處當掩卷之場無使叔夜之懶托為口實也撰讀美風研露輕舟飛閣山雨來溪云聲美人分香高士訪竹鳥幽啼花冷笑釣徒帶煙水相邀老衲問倡奚奴弄柔翰林頭甕云邊鶴試茗掃落葉跌坐散步展古迹調鸚鵡乘其興之所適無致神情太枯馮開之太史云讀書太樂則漫太苦則澀三復此言深得我趣時賞春夜行湖水間稍入近市過一酒家索飲數杯陶然就醉乘月縱遊至一洞壑歇馬石梁籍草少休不覺遂成鼾睡及醒已深林啼鳥疏柳搖煙峭壁蒼崖巃嵸列秀不知復有人世也而朝霞散採青天一闢墟里人闉亦略可辨時賞初夏濃陰橙花郁烈淡月疏煙桃堤柳岸掉歌輕揚帖清吹湖挂魚罾橋斜鶴影而修竹紗窗之間依微讀書之聲若出林表故是幽絶之致正如身處畫圖人自不覺也時賞秋來霜紅霧紫點綴成林影醉夕陽鮮豔奪目時得新句取紅葉書之臨風擲水泛泛隨流不知飄泊何所幽人耿耿撩人更於月夜相對霧溫紅新朝煙凝望明霞豔目豈值勝於二月花也西風起處一葉飛向尊前意似秋色憐人令我翻然神爽時賞冬日之陽夏日之陰良辰美景負杖躡履逍遙自樂臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之樂庶幾居常以待終棲遁客過草堂問是何感慨而甘棲遁曰得間多事外知足少年中問是何功課而能遣日曰種花春掃雪看籙夜焚香問是何知養而獲終老曰研田無惡歲酒國有長春問是何往還而破寂寥曰有客來相訪通名是伏羲棲遁箕踞於班竹林中徙於青石几上不有道笈梵書或校仇四五字或參諷一兩章茶不甚精壺亦不燥香不甚良灰亦不死短琴無曲而有弦長謳無腔而有音激氣發於林樾好風送之水涯若非羲皇以上定亦稽阮兄弟之間煮茶煮茶得宜而飲非其人猶汲乳泉以灌蒿蕕罪莫大焉飲之者一吸而盡不暇辨味俗莫甚焉茶之為飲最宜精行修德之人兼以白石清泉烹煮如法不時廢而時興能熟習而深味神融心醉覺與醍醐甘露抗衡斯善賞鑑者矣嗜酒釋法常性嗜酒無寒暑風雨常醉醉即熟寢覺即朗吟謂人云酒天虛無酒地綿貌酒國安恬無君臣貴賤之拘無財利之圖無刑罰之避淘淘焉蕩蕩焉樂其可得而量也轉而入于飛蝶都則又蒙騰浩渺而不思覺也焚香香之為用其切最博物以高隱坐語道德焚之可以清心悅神四更殘月興味蕭騷焚之可以暢懷舒嘯晴窗拓帖揮塵間吟篝燈夜讀焚以遠闢睡魔謂伴月可也紅袖在側密語談心執手擁爐焚以熏蒸熱意謂助情可也坐雨間窗午睡初足就案學書啜茗味淡一爐初熟香靄馥馥撩人更宜醉筵醒客皓月清宵冰弦戛拍長嘯空樓蒼山極目未殘爐蒸香霧隱隱繞簾又可祛邪辟穢隨其所適無施不可品其最優者伽南止矣第購之甚難非山家所能卒辨其次莫若沉香沉香有三等上者氣大厚而反嫌於竦下者質大枯而又涉於煙惟中者最滋潤而幽甜可以稱妙品煮茗之餘即乘茶爐火便取人香鼎徐而蒸之當斯會心境界嚴若太清宮與上真遊不復知有人世矣五簋約吳初生曰司馬溫公真率會品不得過五子瞻減而為三命名三養曰安分養福寬胃養氣省費養財獨謂多費者多取養德尤切焉然五為數之中奉養於溫公可也過此禮憂其繼矣況觸目飢寒形如神蕊而必遺芳射越終歸溫噦恐亦鬼神所吐耳故玄育曰物力已殫俗性日奢延賓一席動至數十品昔人云高堂一席酒貧寒半年糧又曰珍羞百味無非一飽何為以有限之財作無益之費良奇嘆息今敢為五品之約亦崇雅還淳意也詩云每食四簋以隆賢也雅有陳饋八簋惟天子敦友生飧舅父行之易又不曰二簋可用享乎今吾儕式以五數足矣總之令主可辦客亦可安弗失古人真率之意矧有古今名人之訓言在願同志者共遵之未可與胡紘輩通也遂刻之且以風於裡率真銘吾齋之中勿尚虛禮不迎客來不送客去賓主相忘座列無序有茶且飲無茶莫罪間談古今靜玩山水勿論是非勿言官事行往坐臥以適幽趣道義之交如斯而已讀臟腑紀事龔子應圓初習儒嘗欲師豫而不得且未嘗一面今年夏忽相遇於建南公署一見歡然卻道萬曆丁未戊申間事似以弗獲受業為憾也者已各牽率匆匆別去去三月復來來則竟夕長談不覺前席應圓夙遊金陵往來建陽書林聲名藉藉達官貴人多下榻投轄奚囊甚富難以更僕廉憲桂公心折焉業論次其大端獨丹書中臟腑一篇應圓更揭示以示余余讀之大略根抵於素問難經靈樞玉函諸書折衷以己意其間虛實生克救療調養之法無不具備理精微而詞顯豁若飲池水照秦匝國手玄宗兩家兼利故人不自信其臟腑而爭信應圓之論臟腑者誠有味乎其言之也雖然能如元化破胸裂鬲變易其腸胃不為宿垢祟乎能如省躬邀取劉妹心肝蠕蠕安置袖中不為夜叉食乎天地大矣臟腑細矣權輿自山崩川竭日食雷震翻雲覆雨之變莫不於是乎出為病巨而下藥難即應圓且若之何逞有贏鶴求療於裴生云必三世人血乃可嗟嗟遍觀倫疇為三世而人其臟腑者莽操懿溫之流匪鬼域則犬彘其臟腑殆未易測豫雖慨然欲行將惡乎之乎請以是質之應圓乃嗒然若默而不答崇禎庚午一陽月之朔旦客星居士周懋文謾書新鐫萬壽丹書臟腑篇臟腑論古之聖人若見垣若內照神靈莫測不爽絲毫豈真有異人之目可以洞徹皮毛映見臟腑哉亦惟是望外以知內耳黃帝藏象諸篇揭臟腑以開來無殊對鑑而學者未別未彰往往託言微於脈理而昧顯察於當機尚得謂之識者乎經曰皮有分部脈有經紀筋有結絡骨有度量別其分部左右上下陰陽所在表裡虛實可得可見又曰治之要極無失色脈用之不忒治之大則彼望齊侯之色者望此而已矣後世遂豔傳其奇以為絶世抑熟知顯而可徵有如是乎苟未辨臟腑之故而第曰指下能得之則心色合脈之説其謂之何故云不誦十二經絡開口動手便錯良有以也圖説數則搜掇成篇王啓玄所謂將升岱嶽非徑奚為欲詣扶桑無舟莫適此蓋師其意云手少陰心經丁火心者君主之官也神明出焉心者生之本神之變也為陽中之太陽通於夏氣主明則下安以此養生則壽主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃心以膻中為腑此小腸為表裡其母肝木其子脾土其克肺金其賊腎水其象火其藏神其旺夏其絶冬其色赤其位南其卦離其惡熱其性禮其音徵其數七其味苦其臭焦其華面其候舌其充血其液汗其聲哭其氣呼其不足則憂其有餘則笑不休其平脈洪其賊脈沉其死壬癸日其畜羊其谷黍上為熒或星其見症也消渴兩腎內痛後廉腰背痛浸淫善笑善驚善忘上咳吐下氣泄眩僕身熱腹痛而悲手少陰氣絶則脈不通脈不通則血不流血不流則色澤去故面黑如黧此血先死心絶一日死心至懸絶九日死赤欲如帛裹朱不欲如赭赤如雞冠者生赤如衃血者死憂愁思慮則傷心實則夢憂驚恐怖虛則夢煙火焰明喜傷心恐勝喜熱傷氣寒勝熱苦傷氣酸勝苦苦走血血病母多食苦多食鹹則脈凝泣而變色心欲軟急食鹹以軟之以咸補之以甘瀉之心苦緩急食酸以收之犬肉麻仁李韭皆酸手少陰心之脈起於心中出屬心系下膈絡小腸其支者從心系挾系目其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內廉循臂內後廉抵掌後兌骨之端入掌內後廉循小指之內出其端多血少氣午時氣血注此東垣報使引經獨活細辛心臟之圖心形如未敷蓮花重十二兩中有七孔三毛盛精汁三合附脊第五椎爾雅曰心纖也靈纖細微無物不貫卮言曰深也深居高拱相火代之行事也見圖心虛忌升散苦寒辛燥破氣升麻柴胡細辛川芎防風以上升散山梔黃連黃芩香茗以上苦寒乾薑吳萸生薑薑黃半夏南星以上辛燥青皮枳實枳殼厚朴檳榔牽牛以上破氣宜補血酸斂佐以鹹寒生地黃龍眼肉五味子上人參白茯苓金石斛酸棗仁石菖蒲柏子仁丹參白茯神遠志肉大甘草丹砂炒鹽心實即實火實熱讝語舌破煩燥自哭發狂忌補斂升熱溫燥人參黃耆人胞鹿茸肉桂五味以上補斂升麻柴胡以上升天雄附子蘆巴桂枝麻黃仙茅硫黃胡椒乾薑吳萸川椒燒酒大蒜以上熱半夏南星白朮蒼朮防風藁本細辛蓽撥草豆蔻肉豆蔻白豆蔻以上溫燥宜降火清熱苦寒以折之辛寒以散之甘寒以緩之鹹寒以潤之川黃連真犀角白石膏真丹砂牡丹皮澄滑石生甘草麥門冬淡竹葉童便便結燥加芒硝大黃發狂亦如之手太陰肺經辛金肺者相傳之官泊節出焉肺者氣之本魄之處也為陽中之太陽通於秋氣肺配胸中與大腸為表裡其母脾土其子腎水其克肝木其賊心火其象金其藏魄其旺秋其絶夏其色白其位西其卦乾其惡寒其性義其音商其數九其味辛其臭腥其華毛其候鼻其充皮其液涕其聲哭其氣咽其不足則太息其有餘則喘嗽其平脈浮短其賊脈洪其死丙丁日其畜馬其谷稻上為太白星其見症也善嚏悲愁欲哭灑浙寒熱缺盆中痛腹痛肩背痛臍右少腹脹痛小便數溏泄皮膚痛及麻木喘少氣頰上氣見手太陰氣絶則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死肺絶三日死肺至懸絶十二日死白欲如白壁之澤不欲如堊白如承膏者生白如枯骨者死形寒飲冷則傷肺實則夢兵戈競擾虛則夢田野平原憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛辛走氣氣病母多食辛多食苦則皮膚稿而毛拔肺欲收急食酸以服之以酸補之以辛瀉之肺苦氣上逆急食苦以泄之小麥羊肉杏薤皆苦手太脈肺之脈起於中焦下絡大腸遠循胃口上膈屬肺從肺系橫出腋下循臑內行少陰心主之前循臂內上骨下廉入寸口上魚際循魚際出大指端其支者從腕後直出次指內廉出其端多氣少血寅時氣血注此東垣報使引經白芷升麻蔥白肺臟之圖見圖肺重三斤三兩六葉兩耳凡八葉附脊第三椎卮言曰肺者茷也茷然居乎上為五臟之華蓋醫旨緒餘曰肺者勃也言其氣勃鬱也肺虛忌補氣升散辛燥溫熱人參黃耆以上補氣麻黃紫蘇前胡柴胡升麻以上升散半夏南星白朮蒼朮以上辛燥官桂附子天雄胡椒蒜薑以上溫熱宜清熱降氣酸斂潤燥天門冬麥門冬川貝母新百合川百部桑白皮家蘇子枇杷葉五味子肥杏仁五倍子蜜梨柿肺虛無熱有寒者宜服乾薑五味子胡桃肉好人參陳麻黃肥杏仁白前胡廣陳皮大半夏紫菀肉桂心鍾乳粉生薑肺實忌斂澀補氣升燥熱酸咸五味烏梅訶子粟殼白果以上斂澀人參白朮蒼朮黃耆以上補氣升麻柴胡以上升半夏南星烏藥香附防風豬苓澤瀉以上燥官桂附子天雄乾薑吳萸以上熱醋鹽二味酸鹹宜降氣潤甘寒苦寒佐以辛散柴蘇子枇杷葉桑白皮栝蔞根肥杏仁香前胡白前胡鮮知母車前子白石膏枯黃芩川貝母天門冬桑黃足厥陰肝經乙木肝者將軍之官謀慮出焉肝者罷極之本魂之居也為陽中之少陽通於春氣肝以膽為腑其母腎水其子心火其克脾土其賊肺金其象木其藏魂其旺春其絶秋其色青其位東其卦巽其惡風其性仁其音角其數八其味酸其臭膻其華瓜其候目其充筋其液泣其聲呼其氣噓其不足則悲其有餘則怒其平脈弦其賊脈澀其死庚辛日其畜雞其穀麥上為歲星其見症也頭痛脫色善潔耳無聞頰腫肝逆面青目赤腫痛兩脅下痛引小腹胸痛脅腫婦人小腹腫腰痛不可俯仰四肢滿悶挺長熱嘔逆睪疝暴癢足逆寒胻善瘛遺溺淋溲便難痕狐疝癩冒眩轉筋陰縮筋攣善恐胸中喘罵詈血在脅下喘足厥陰氣絶則筋縮引卯與舌卷筋者聚於陰器而絡於舌本故脈不榮即筋縮急筋縮急即引卯與舌故舌卷卯縮此筋先死肝絶八日死肝至懸絶十八日死青欲如蒼壁之澤不欲如藍青如翠羽者生青如草茲者死恚怒氣逆上而不下則傷肝實則夢山林大樹虛則夢細草苔蘚怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸酸走筋筋病母多食酸多食辛則筋攣急而爪枯肝欲散急食辛以散之以辛補之以酸瀉之肝苦急食甘以緩之粳米牛肉棗梨皆甘足厥陰肝之脈起於大指聚毛之上循足跗上廉去內踝一寸上踝三寸交出太陰之後上膕內廉循股入陰中環陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頑顙連目繫上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝則貫鬲上注肺多血少氣丑時氣血注此東垣報使引經柴胡本經青皮行下川芎行上肝臟這圖見圖肝重四斤四兩左三葉右四葉凡七葉附脊第九椎卮言曰肝者干也屬木象木枝幹也肝虛忌收斂破氣升散苦寒下烏梅五味芍藥醋黃耆白朮蒼朮以上收斂青皮枳實枳殼厚朴檳榔牽牛蓬莪荗以上破氣升麻柴胡以上升散黃芩黃連黃柏山梔膽草以上苦寒大黃芒硝以上下宜辛散甘緩大當歸淮地黃甘菊花大甘草胡麻仁穀精草決明子白蒺藜羊牛兔肝因鬱而虛者宜北細辛南木香決明子縮砂蜜沉木香大川芎廣陳皮香附米生薑牛羊兔肝肝實忌補氣升酸斂辛熱辛溫燥黃耆鹿茸人胞人參白朮蒼朮以上補氣升麻防風以上升五味烏梅醋以上酸斂麻黃硫黃藁本官桂附子天雄燒酒蒜胡椒以上辛熱乾薑生薑當歸細辛桂枝以上辛溫半夏南星天麻以上辛燥宜清熱降氣苦寒辛寒甘寒酸寒廣橘皮花青皮川黃連龍膽草北柴胡白芍藥枯黃芩紫蘇子生甘草真青黛甘菊花胡黃連車前草生地黃羚羊角足太陰脾經乙土脾者倉凜之官五味出焉脾者倉廩之本營之居也此至陰之類通於土氣脾以胃為腑其母心火其子肺金其克腎水其賊肝木其象土其藏意其旺長夏及四季之末其絶春其色黃其位中央其卦坤其惡濕其性信其音宮其數五其味甘其臭香其華在唇四白其候口其充肉其液涎其聲歌其氣呵其不足利少氣其有餘脹演其平脈緩其賊脈弦其死甲乙日其畜牛其谷稷上為鎮星其見症也五泄注下五色大小便不通面黃舌本強痛口甘食即吐食不下咽怠惰嗜臥搶心善飢善詠不嗜食不化食尻陰膝臑胻足背痛煩悶心下急痛有動痛按之若牢當臍痛心下痞腹脹腸鳴飧泄不化足不收行善瘛腳下痛九竅不通溏泄水下後出餘氣則快飲食中滿食減善噫形醉皮膚潤而短氣肉痛身體不能動搖足胻腫若水足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不潤澤則肉滿肉滿則唇反唇反則肉先死脾絶十二日死脾至懸絶四日死黃欲如羅裹雄黃不欲如黃土黃如蟹腹者生黃如枳實者死飲食勞倦則傷脾實則夢歡歌快樂虛則夢飲食相爭思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘甘走肉肉病母多食甘多食酸則肉胝䐢而唇揭脾欲緩急食甘以緩之以甘補之以苦瀉之脾苦濕急食鹹以燥之大豆豕肉栗藿皆咸足太陰脾之脈起於大指之端循指內側白肉際過竅骨後上內踝前廉上腨內循胻骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支別者復從胃別上膈注心中少血多氣巳時氣血注此東垣報使引經白芍升麻脾臟之圖見圖脾重二斤二兩扁廣三寸長五寸有散膏半斤中梓曰脾胃屬土故俱從田字田者土也胃居正中故田字居正中脾屬於右故田字亦偏右脾虛忌下降泄大忌破氣苦寒復忌燥大黃山梔知母巴豆牽牛薑黃芒硝礞石商陸烏桕根皮以上下天冬花粉石膏滑石葶藶瞿麥生地以上降泄青皮枳實枳殼厚朴檳榔三稜蓬荗以上破氣黃芩黃連黃蘖槐花以上苦寒半夏南星豬苓澤瀉木通以上燥宜甘溫甘辛好人參大棗肉酸棗仁白芍藥山薯蕷炙甘草蓮子肉白茯苓白扁豆芡實肉佐以縮砂仁橘紅白豆蔻脾實即濕熱邪忌濕潤收澀滯膩熱咸甘當歸蓯蓉天冬面糟酒以上濕潤烏梅五味白果肉蔻粟殼亞芙蓉訶子以上收澀豬脂羊肉以上滯膩天雄附子乾薑肉桂吳萸蓽撥胡巴以上熱鹿茸食鹽以上咸人參黃耆甘草飴糖蜂蜜大棗以上甘宜除濕清熱利便辛散風燥苦寒川黃連製蒼朮山梔仁結豬苓新澤瀉白滑石車前子赤茯苓舊枳實白豆蔻防風肉乾葛粉玄明粉豆豉足太陰腎經癸水腎者作強之官伎巧出焉腎者主蟄封藏之本精之處也為陰中之少陰通於冬氣腎以膀胱為腑其母肺金其子肝木其克心火其賊脾土其象水其藏志其旺冬其絶長夏及四季之末其色黑其位北其卦坎其惡燥其性智其音羽其數六其味鹹其臭腐其華在發其候耳其充骨其液津其聲呷其氣吹其不足則厥其有餘則腸泄其平脈沉其賊脈緩其死戊已日其畜彘其谷豆上為辰星其見症也面如漆眇中清面黑如炭口渴咳嗽多血胸中滿大小腹痛大便難臍左脅下背肩髀間痛飢不欲食心懸如飢腹大脛腫咳嗽脊臀股後痛臍下氣逆小腹急痛泄足痿厥下腫足胻寒而逆腸癖陰下濕四指黑手指青厥足下熱嗜臥坐而欲起凍瘡下痢善思善恐四肢不收四肢不舉足少陰氣絶則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫即肉不著骨骨肉不相親即肉濡而卻肉濡而卻故齒老而枯發無潤澤者骨先死腎絶四日死腎至懸絶七日死黑欲如重黑漆不欲如炭色黑如烏羽者生黑如炱者死入坐濕地強力入水則傷腎實則夢腰脊解軟虛則夢涉水恐懼恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸咸走骨骨病母多食鹹多食甘則骨疼痛而齒落腎欲堅急食苦堅之以苦補之以咸瀉之腎苦燥急食辛以潤之黃黍雞肉桃蔥皆辛足少陰腎之脈起於足小指之下斜趨足心出然谷之下循內踝之後別入跟中上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中多血少氣酉時氣血注此東垣報使獨活肉桂腎臟之圖見圖父母媾精未有形象先結河車中間透起一莖如蓮蕊初生乃臍帶也蕊中一點實生身立命之原即命門也自此天一生水先結兩腎夫命處於中兩腎左右開闔正如門中棖故靜而闔涵養乎一陰之真水動而開鼓舞乎龍雷之相少水為常而火為變可謂深得其旨甲乙經曰腎者引也能引氣通於骨髓卮言曰腎者神也妙萬物而為言也腎有兩枚形如豇豆重一斤一兩附脊十四椎當胃下兩傍前後分臍平直腎虛即腎水真陰不足忌升破氣辛燥利水溫熱補命門火升麻柴胡以上升青皮枳殼枳實厚朴檳榔牽牛以上破氣半夏南星二術豬苓澤瀉瞿麥滑石以上辛燥利水生薑乾薑吳萸附子天雄硫黃官桂以上溫熱仙茅巴戟葫芭人參故芷鹿茸人胞以上補命門相火宜滋陰潤生精補血除熱甘寒酸寒苦寒鹹寒熟地黃胡桃肉炒黃柏牡丹皮枸杞子五味子人乳汁肉蓯蓉清河參有肺熱者忌之地骨皮炒知母金石斛牛膝肉嫩鹿茸山茱萸柏子仁車前子青蒿子麥門冬淮山藥白膠香虎頭骨菟絲子真丹參五加皮川續斷厚杜仲川萆薢補骨脂沉香水沙苑蒺藜芡實肉牡蠣粉桑螵蛸敗龜板海狗腎狗脊真瑣陽腎無實故無瀉法命門虛即元陽真火不足忌泄下辛寒苦寒淡滲發散燥破氣補腎水苦寒大黃巴豆芒硝以上泄下石膏山梔以上辛寒苦寒豬苓澤瀉瞿麥木通以上淡滲麻黃紫蘇柴胡前胡防風荊芥以上發散二術南星半夏以上燥青皮枳殼枳實厚朴檳榔牽牛以上破氣黃柏知母生地天冬以上補腎水苦寒藥宜益真陽之氣甘溫鹹溫佐以甘熱酸斂嫩鹿茸白膠香山茱萸女紅鉛肉蓯蓉兔絲子枸杞子覆盆子清河參五味子巴戟天大附子真仙茅陽起石海狗腎蛇床子手厥陰心包絡經丙火膻中者臣使之官喜樂出焉其見症也哭不休毛心熱心中大熱面黃目赤心中動手厥陰心胞絡之脈起於胸中出屬心胞下膈歷絡二焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下臂行兩筋之間人掌中循中指出其端其支別者從掌中循小指次指出其端多血少氣戌時氣血注此東垣報使引經柴胡行上川芎行上青皮行下心胞絡無圖胞絡者胞絡其心也即膻中也為心之腑心胞絡獨無圖者以其在心下橫膜之上豎膜之下與橫膜相黏而黃脂裹者心也其脂膜之外有細筋膜如系與心肺相連者心胞絡也觀其命名即可思義乃叔和配諸尺中因其為臣使之官應心主而為相火故誤耳參玩內經昭然可辨其補則宜地黃瀉則宜枳殼烏藥溫則宜肉桂涼則宜梔子之類手陽明大腸經庚金大腸者傳道之官變化出焉其見症也大指次指難用耳聾輝之焞之耳嗚嘈嘈耳後肩臑肘臂外皆痛氣滿皮膚堅而不痛手陽明大腸之脈起於大指次指之端循指上廉出合谷兩骨之間上人兩筋之中循臂上廉入肘外廉循臑外前廉上肩出髑骨之前廉上出柱骨之會於大椎下入缺盆絡肺下膈屬大腸其支別者從缺盆上頸貫頰入下齒縫中還從俠口交人中左之右右之左上俠鼻孔氣血俱多卯時氣血注此東垣報使使引經葛根白芷升麻行上石膏行下大腸腑之圖見圖大腸重二斤十二兩長二丈一尺廣四寸徑一寸當臍右回疊積十六曲盛谷一斗水七升半卮言曰腸者暢也貴通暢也大腸上口小腸下口大腸下接直腸下為肛門穀道大腸虛忌破氣下燥熱青皮枳殼枳實檳榔厚朴薑黃以上破氣大黃烏臼樹根皮玄明粉芒硝礞石巴豆牽牛以上下半夏南星二術防風豬苓澤瀉羌活獨活防己以上燥附子乾薑肉桂吳萸以上熱宜補氣潤燥甘溫澀斂清河參軟黃耆麥門冬五味子白芍藥炙甘草蓮子肉肉豆蔻訶梨勒五倍子罌粟殼大腸實忌補斂燥熱白朮蒼朮人參黃耆烏梅五味以上補斂半夏南星以上燥桂枝麻黃附子天雄胡椒火酒大蒜以上熱宜潤下苦寒辛寒生地黃二麻仁板桃仁川黃連條黃芩淨槐花川大黃白石膏鮮知母舊枳殼郁李仁足少陽膽經甲木膽者中正之官決斷出焉其見症也口苦馬刀挾癭足外熱寢寒憎風體無膏澤胸中脅肋髀膝外至胻絶骨外踝前諸節痛善太息足少陽膽之脈起於目鋭眥上抵頭循角下耳後循頸行手少陽之前至肩上卻交出少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別目鋭眥下大迎合手少陽於頰下臨頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀外出膝外廉下外輔骨之外直下抵絶骨之端下出外踝之前循足跗上入小指次之間其支者跗上入大指循岐骨內出其端還貫入爪甲出三毛毛多少血子時氣血注此東垣報使引經川芎行上柴胡本經青皮行下膽腑之圖見圖膽在肝之短葉間重三兩三銖藏精汁三合狀如瓶卮言曰膽者沾也清淨之府無所受輸淡淡然者也中梓曰膽者擔也中正之官決斷出焉言有擔當也膽虛忌汗吐下苦寒破氣過燥麻黃桂枝生薑前胡紫蘇以上汗山梔瓜蒂參蘆鹽湯以上吐大黃芒硝巴豆牽牛以上下知母黃芩黃連黃柏以上苦寒青皮枳殼枳實厚朴檳榔以上破氣南星二術以上過燥宜甘溫甘平酸斂佐以微辛酸棗仁白芍藥穀精草決明子木賊草大甘草淡竹葉白竹茹好人參當歸身廣陳皮膽實忌汗吐下麻黃桂枝羌活獨活生薑以上汗梔子參蘆蝦汁瓜蒂以上吐大黃芒硝枳實以上下宜和解辛寒甘寒苦寒辛溫北柴胡條黃芩大半夏老生薑生甘草廣橘皮龍膽草足陽明胃經戊土胃者亦倉廩之官五味出焉其見症也惡煙火聞木音則驚狂上登而歌棄衣而走顏黑不能言唇疹嘔呵欠消穀善飢頸腫膺乳沖股伏兔胻外廉足跗皆痛胸旁過乳痛口渴腹大水腫奔響腹脹胻內廉跗痛髀不可轉膕如結腨如裂膝臏腫痛遺溺失氣善伸數欠癩疾濕浸心欲動則閉戶獨處驚粟身前熱身後熱足陽明胃之脈起於鼻交頞中旁約大腸之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支別者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街其支者起胃口下循腹裡下至氣街而合以下髀關抵伏兔下入膝臏中下循胻外廉下足跗入中指內間其支者下膝三寸而別以下入中指外間其支者別跗上入大指間出其端多血多氣辰時氣血注此東垣報使引經葛根白芷升麻升上石膏行下胃腑之圖見圖胃重二斤十四兩紆屈伸長二尺六寸大一尺五寸徑五寸容谷二升水一斗五升卮言曰胃者匯也號為都市五味匯聚何所不容萬物歸土之義胃虛忌下破氣泄降苦寒燥熱大黃芒硝巴豆牽牛玄明粉以上下青皮枳殼枳實檳榔厚朴薑黃以上破氣山梔黃芩黃連黃蘖知母天冬花粉百部栝蔞仁槐花茗以上泄降苦寒羌活獨活防己半夏南星防風豬苓澤瀉以上燥天雄附子肉桂麻黃以上熱宜益氣甘淡甘平好人參白茯苓金石斛宣木瓜麥門冬廣橘皮云白木白扁豆兼寒加老生薑白豆蔻縮砂蜜兼熱加白竹茹枇杷葉薏苡仁家蓮肉甘蔗漿蘆柴根胃實忌升補斂辛溫燥熱溫熱升麻柴胡防風以上升人參黃耆白朮蒼朮五味肉蔻烏梅醋以上補斂穹藭白芷生薑以上辛溫半夏南星以上燥桂枝麻黃附子天雄硫黃以上熱蓯蓉南面糟酒犬羊豬鵝等肉以上濕熱宜下如邪未結宜清熱發散苦寒辛寒甘寒川大黃舊枳實鮮知母白石膏麥門冬生甘草淡竹葉乾葛根大青小青青黛苧根鹽連翹足太陽膀胱經壬水膀胱者州都之官津液藏焉氣化則能出矣其見症也頭苦痛目似脫頭兩邊痛淚出臍反出下腫便膿血肌肉痿項似拔小腹脹痛按之欲小便不得足太陽膀胱之脈起於目內眥上額交巔上其支別者從巔至耳上角其直行者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支別者從腰中下貫臀入膕中其支別從膊內左右別下貫髀挾脊內過髀樞循髀外後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側端多血少氣申時氣血注此東垣報使引經藁本行上羌活行上黃柏行下膀胱腑之圖見圖膀胱重九兩二銖縱廣九寸盛溺九升九合廣二寸通身虛松可以畜水漸漬而滲入胞中胞滿而溺出也形與綿球相似甲乙經曰膀者橫也胱者廣也言其體橫廣而短也膀胱上下俱有口上口絡於闌陰下口裹胞乃胞外脂膏也膀胱虛忌破氣燥又忌利小便藥青皮枳殼枳實檳榔牽牛以上破氣半夏南星豬苓澤瀉二術防風羌獨活以上燥宜補氣酸斂清河參五味子山茱萸益智仁金櫻子川續斷膀胱實忌燥熱收澀半夏南星二術以上燥桂枝麻黃附子吳萸椒蒜火酒以上熱龍骨益智金櫻子以上收澀宜潤淡滲鮮知母川黃柏車前子川木通澄滑石瞿麥赤茯苓新澤瀉手太陽小腸經小腸者受盛之官化物出焉其見症也面白耳前熱苦寒額頷腫不可轉腰似折肩臑肘臂外後廉腫痛臑臂內前廉痛手太陽小腸之脈起於小指之端循手外側上腕出踝中直上循臂骨下連出肘內側兩筋之間上循臑外廉出肩解繞肩髀交肩上入缺盆絡心循咽下膈抵胃屬小腸其支別者從缺盆循頸上頰至目鋭眥卻入耳中其支者別循頰上頷抵鼻至目內眥多血少氣未時氣血注此卮言曰沁清別濁小液分於膀胱滓穢分開大腸東垣報使引經藁本行上羌活行上黃柏行下小腸腑之圖見圖小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲容谷二斗四升水六升三合合之大半小腸虛忌破氣辛散燥熱青皮枳殼枳實厚朴檳榔以上破氣麻黃紫蘇柴胡前胡防風荊芥以上辛散半夏南星白朮蒼朮以上燥官桂吳萸附子乾薑天雄以上熱宜補氣甘溫酸溫好人參軟黃耆五味子山茱萸麥門冬金石斛若氣虛遺尿加牡蠣粉益智子金櫻子白龍骨小腸實忌斂澀補氣五味烏梅龍骨牡礪訶子益智以上斂澀人參白朮蒼朮黃耆以上補氣宜通利淡滲苦寒甘寒鹹寒車前子白茯苓川木通生甘草川黃蘖鮮知母條黃芩牛膝肉麥門冬生地黃川黃連童溺手太陽三焦經三焦者決瀆之官水道出焉其見症也耳鳴喉痹腫痛耳後連目鋭眥痛汗自出肩臑痛內外皆疼小指次指如廢手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆交膻中散絡心包下膈偏屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至頒其支者從耳後入耳中卻出至目鋭眥多血少氣亥時氣血注此經曰水穀之道路氣之所終始也上焦在胃上口其治在膻中中焦在胃中脘其治在臍旁下焦當膀胱上口其治在臍下一寸東垣報使上引經柴胡行上川芎行上青皮行下三焦無圖三焦獨無圖者上焦如霧中焦如瀝下焦如瀆有象無質即上中下三部臟腑空處是也三焦虛忌破氣降復忌升發苦寒青皮枳殼枳實厚朴檳榔以上破氣石膏知母蘇子鬱金降香以上降升麻柴胡前胡紫蘇麻黃以上升發山梔黃芩黃連黃蘖以上苦寒宜補中益氣佐以辛溫好人參軟黃耆云白朮益智子黑沉香五味子炙甘草三焦實忌補斂升燥熱人參黃耆白朮蒼朮五味烏梅益智訶子以上補斂升麻柴胡防風以上升半夏南星麻黃桂枝附子以上燥熱宜降清熱調氣甘寒苦寒鹹寒真蘇子白石膏麥門冬地骨皮黑玄參鮮知母川黃蘖童便附常用諸藥製法白朮去皮梗去濕利水用麩炒微黃色補胃用淨土炒黃色補脾用浙術其味甘而氣厚利水燥濕宜用各處山術其味淡而能滲用者不可不審也蒼朮去皮用米泔水浸一宿切片曬乾淡淡鹽水微炒黃色再曬乾貯之久而不吐霜汁可羡鹽水制過其剽燥之裂性頗純不傷真液出茅山緊小沉重為佳陳皮消痰理氣用福州紅色者謂之橘紅其味辛而性燥要去白穰淨而力愈大若和中補脾胃不必去白惟去粗穰而已用廣州者宜其味甘辛而性溫和所以善和中而益脾也今觀廣皮厚而軟潤福皮薄而剛燥從可知矣炒則氣耗用力微青皮溫水浸一時去攘切忌用麩炒疏肝氣積滯用醋炒燥枳殼熱水浸一時取起晾乾慢火煨透熱即取起切片用破至高之氣消食去積滯用麩炒不爾氣剛恐傷元氣半夏用滾水入明礬或皮硝同泡泡之時勿得動一時湯冷又易滾湯泡之泡五七次者為佳切片仍以生薑搗汁拌微炒過用去風痰濕痰皆用此若理脾止瀉如六君子湯中用者宜半夏曲曲之性不甚燥而得中和故也南星用陳久者滾湯明礬同泡如半夏例亦以薑汁拌和其驚風風痰方中用者以泡過者為末裝入臘月黃牛膽汁中透風處陰乾待用之人參去蘆其蘆能上湧吐痰無制用黃亮結實者其力大鬆放輕虛者無力黃耆北地如箭桿者佳削皮劈開用蜜水塗之慢火灸過用補中益氣如是若實腠理以固表須酒炒當歸去土劈開用酒浸洗曬乾切片生地用無灰酒洗過曬乾用鮮地黃搗汁熬膏用木石臼忌鐵器胃弱者用薑汁炒脾氣滯而膈間痞悶不能服陰藥者須用之以砂仁水濕同生地黃炒則皆無礙也熟地用無灰酒洗曬乾用若作丸以酒浸爛木石臼中搗如泥若蜜丸先以和蜜勻然後入衆藥則不患不均矣芍藥熱水泡半日切片酒炒過則不患酸寒伐生氣行血分得酒製尤力大脾胃不足嘔噦者有用薑炒茯苓無制惟揀雲南結實而雪白者為佳去皮淨若消腫病不必去皮五皮散單用茯苓皮是也四君子湯中用必須南苓五苓散中用必須西苓方可論淡滲西苓尤速也豬苓鋒刀削去黑皮滾水泡透用捶打實切之成片澤瀉削去毛熱水浸半時切片黃連酒炒去頭目之火薑汁炒去痰火胃火不傷脾胃去實火三黃解毒湯中用不必制只要去毛淨黃芩治頭目疾須酒炒去肺火生用去虛痰火薑汁炒治上病用片芩治下病用條芩黃柏酒炒腎家用鹽水炒梔子破微炒去浮火連殼用瀉小腸火獨用仁炒過研破煎得味出凡仁入煎俱要研碎知母去毛皮淨治嗽酒炒入腎鹽水炒杜仲去粗皮切薑汁炒斷絲其絲不斷又復炒孕婦用糯米同炒之牛膝去蘆酒洗干切故紙微炒香巴載熱水泡透以木捶打碎孽去心小茴微炒入煎藥研碎滑石擇細膩者研為細末水飛入藥粗者無效石膏研極細調入藥尤效作散者煅熟入煎劑者半生半熟麥冬熱水泡一時透去心用如不去心服反令人煩躁悶塞天冬制同麥門冬入丸藥酒浸極爛搗如泥調和衆藥厚朴去粗皮切片薑汁炒扁豆炒熟去殼微搗碎用薏苡微炒黃色桃仁泡去皮尖及雙仁者雙仁有毒恐能殺人杏仁泡去皮尖入煎劑研如泥用或去油用者瓜蔞仁去殼取仁研碎入煎大黃陝西莊浪衛者有力不作腹痛川者力遲而痛瀉實者生用虛弱者酒蒸熟用朴硝冬天度一次者尤妙未度擇定分兩入盞以熱藥泡之同入煎衆藥渣中滲去而力不全葶藶紙炒研碎入煎車前子微炒研碎入煎如用葉搗汁海藻海帶海粉昆布俱去須微曬乾青鹽溫水洗淨曬乾入藥木香不得見火搗為末入煎磨汁內熟湯中服沉香檀香俱同上法丁香砂仁白豆蔻俱宜為末調入湯煎劑必待煎半熟方入可也不爾香氣皆泄散去所以不作效三稜熱水泡浸一時慢火煨透切莪朮制同上或以醋煮白蒺藜炒研去刺研碎入煎沙苑蒺藜取淨布四方一片以水洗濕略扭將蒺藜包中揉擦隨即放下又將布入水洗淨如前略扭包擦數次以無灰土潔淨為度即將蒺藜入大桌上揀去沙石等即入石碾碾之則外皮得水不碎內仁成末篩去皮取淨末何首烏乾者米泔水浸三日竹刀刮去皮切片用黑豆以水浸透同何首烏蒸之豆熟為度如此九次者佳山茱萸熱湯泡軟剝去核吳茱萸熱湯泡去頭水曬乾用巴豆去油淨本草云生溫有毒熟寒無毒今之去油生用為避寒也殊不知寒不足避當闢其大毒況本經全無去油之製法陶氏煮令黃黑然亦太過不如去其心膜者五度換水各煮一沸為佳局方化滯丸而巴豆不去油只以巴豆煮熟用之深得其性牽牛微炒搗取頭末有力斑蝥去頭足同糯米炒令黃有以牡蠣同炒之穿山甲同蛤粉炒黃色或炒成珠研末調入藥蜈蚣慢火炙去頭足研末入湯桑螵蛸當中破慢火炙之甘遂麵包煨熟去面阿膠打碎如豆大用蛤粉同炒成珠用入湯藥不可與衆藥同煎必藥熟取起去渣復以阿膠入淨藥湯中化清服膃肭臍內滾水泡去毛淨切片新瓦上下慢火炕干入藥紫華車用熱米泔水洗淨然後用麝香湯洗上下新瓦炕干入藥有鮮煮食必用椒薑使君子慢火煨香熟用肉豆蔻麵包煨去油熟切入藥茯神去木研細水飛過用陽起石用火煅透紅研極細入藥硫黃用芭蕉搗汁煮之後以甘草湯煮之大無毒有用豆腐同煮者牡蠣火煅淬醋盤中又煅又草五七次為佳蠶白微炒研末入藥皂角去皮弦慢火炙黃色用藿香洗去土淨曬乾用乾漆用新瓦上下合定火煅黑煙盡方可用以其性氣大悍服之大傷血氣若去煙而用之止破淤血而不傷元血若血暈不醒人事者即燒煙燻之立蘇足可以見其悍也砒霜凡入藥劑如鼾喘丸斬鬼丹及治梅毒亦不能棄之不用也用之者不知制度其不殺人者幾希每將砒石一兩打碎用明礬一兩為末蓋砒上貯罐中入明火一煅以枯礬為度砒之悍氣隨煙而去駐形於礬中者庶幾無大毒用之不傷也用砒霜即用礬霜是也黃丹凡用丹入藥如生肌膏生肌散皆必用之緑丹性寒得火煉形而陰中之陽有坎離之火集之生肌去毒者也今市肆售利牽假河沙混之其不飛澄沙石用之必然無效凡丹須淨器以水飛過仍炒乾丹入劑桑白皮刮去紅皮切碎用酒炒微黃色為度常山用酒浸過宿切用則不吐大腹皮孽去垢黑用溫水洗淨又用酒洗用有用大豆汁洗方可用孫真云鳩鳥多棲此樹遺屎在皮上不淨恐有毒今人用之不制曾有人服之而致死者其可忽諸蛤蚧用酒洗溫淨慢火炙熟研入藥硼砂用口含過得溫用蘆甘石用傾銀罐煅紅傾出在三黃湯內三五次尤佳然後用三黃湯懸飴煮乾露一夜焙乾用珍珠豆腐內蒸過鐵臼內搗末研用有用火煅非其制也一説入目貴乎生用瑪瑙犬肉內煮之火煅紅醋淬用琥柏用細布包內豆腐鍋中煮之然後灰火略煨過一云安心神俱宜生搗入目制過用血結用燈草同研則成粉磁石火煅淬過硇砂成塊者捶碎乳汁浸二宿瓦器烙干焙用石蟹火煅醋淬過白丁香入目者三黃湯煮乾熔用針粉用隔紙炒有用火煅黃色石燕火煅醋淬用石決明火煅童便淬熊膽水華開點目焙乾研為末入散用龍骨火煅海螵蛸用濕紙包煨碾碎用鷹條用三黃湯飛甘草湯煮一次培乾用罌粟殼用熱水泡軟擘去筋膜切成絲用蜜水微炒曬乾用忌蒜醋胡椒蕤仁去衣錦紙包研去油花蜘蛛醋浸死瓦上烙干去足用翠白用傾銀罐煅如膏醋中淬焙乾玄參用酒洗去塵土切片曬乾用玄參行表治浮遊無根之火得西氣而力愈健連翹擇去枝根及心研淬入入煎香附子春去毛用淨米童便浸一宿取起用淨水洗過炒乾用婦科以醋復燥之蔓荊子破以酒炒過入煎今人往往不研不炒而用之多不見效決明子蘿蔔子芥子蘇子青葙子韭子凡藥中用子者俱要炒過研碎入煎方得味出若不碎如米之在谷雖煮之終日米豈能出哉乾薑生用發表汗炒過溫脾而守中胃間熱虛甚者如補中益氣湯加之當慢火煨焦黑紫苑茸用酒洗去土曬乾用桂皮有謂肉桂則厚桂以滋腎者也當刮去粗皮惟存其肉而用之故曰肉桂其餘行血循經止用薄桂遠志熱水泡浸一時破肉去梗和甘草煮半伏時去草不用枇杷葉治咳嗽去毛不淨反令人嗽本草云四月採葉暴乾用時須火炙以布拭去毛去毛不淨以粟稈作刷刷之令盡有用甘草湯洗有用薑湯洗有以酥塗炙用初採濕者一葉重一兩干則三錢重一葉方好石斛用酒洗炙乾或蒸過焙乾用俱可甘草涼藥中生用溫以補脾必須炙熟仙茅糯米泔水浸二宿用竹刀刮去皮木砧上切碎陰乾用續斷酒浸一宿捶碎去筋曬乾用松香用明淨者名滴青入滾水煮三炷香撈起放於涼水缸中拔之一時復入鍋煮三炷香又入涼水拔如此七次微入灰湯並酒量水一石入灰湯酒各一斗煮之再拔便曬乾聽用此藥最要製法極精稍有不精服之殺人續醫説有人制造不精服之腸塞而死然則製藥之法可不慎哉祝養生家五則凡人疾病皆由多生不惜衆生身命竭用人力好殺鳥獸昆蟲好捶楚下賤甚則枉用毒刑加諸無罪種種業因感此苦報業作養生之主為人司命見諸苦惱當興悲憫詳檢方書精求藥通謗察深思務期協中常自思惟藥不對病病不對機二旨或乖則下咽不返性命須臾噬臍莫及戒之哉宜慎不宜忽也凡為養生家當先讀書凡欲讀書當先識字字者文化始也不識字義寧解文理文理不通動成窒礙雖詩書滿目於神不契觸途成滯何由省入譬諸面牆亦同木偶望其保固自己之精神拯救生民之疾苦顧不難哉必讀書窮理本之身心驗之事物戰戰兢兢求中於道造次之際罔敢或肆者可也凡為養生家亦須識藥藥之所産方隅不同則精粗頓異收採不時則力用全乖又或市肆飾偽足以混真苟非確忍形質精嘗氣味鮮有不為其所誤者譬諸將不知兵立功何自既識藥矣宜飛修事雷公炮炙固為大法或有未盡可以意通必期躬親勿圖苟且譬諸飲食烹調失度尚不益人反能增害何況藥物關乎軀命者耶可不慎諸凡為養生家宜先虛懷靈知空洞本無一物苟執我見便無物對我見堅固勢必輕大我是人非與境角立一靈虛竅動為所塞雖日親至人終不獲益白首放吾良可悲已執而不化害己損人清夜深思宜生愧恥況人之才識自非生知必假問學問學之益廣博難量脫不虛懷何由納受不恥無學而恥下問師心自聖於道何益苟非至愚寧不做省乎凡為養生家當深心暮道毋為利欲所誘傍門所惑富貴貧賤等心救濟縱有功效任其自酬勿責其報如此則德植厥躬鬼神幽贊自爾直超圓頓而登太極之哉矣上來所祝五條皆關切養生家才品道術利濟功過即願來學俯從吾祝則迸乎道而不囿於技矣詎非生人之至幸養生家之大光也哉
