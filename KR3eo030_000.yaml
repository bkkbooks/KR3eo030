body:
  text: 安養篇引蓋聞儒者之論有曰人生實難則有生不可全之又道家者言有曰患在有生然既有生又安得不全之故養重己世自離道知生之為患而愈人於患知生之難而不自護其為難於是近者溺於日用飲食之中茫不思性命之謂何其遠者又脫焉日用飲食之外以語玄論虛一無當耳夫日用飲食之中道之流存也就日用飲食之中適其宜慎其動節其用以求合於至人之修即為道之所榷也乃上之富貴豔腴精神銷於酒色視聽惑於歌舞其財力有餘可以自養而不欲為養式之中處饒乏事畜勞其外豐美旋其內雖財力僅可以自養而不暇為養下之凍餓相迫疲形竭慮歲月耗蕩頃刻無息便欲自養而不能矣能不痛哉夫雖高達人士超出世味獨憂性命在富貴可瞥爾遺棄自取恬適在營逐可劃然中止別求生活在貧困可隨寓自得不復念境以求於物則人人可至於道而為道之法刻刻可行百凡病患亦可預邪而不至於患是以取今昔賢達所論日用動息之際衛生之論葆持之術萃而為篇以安養名應圓題新鐫五福萬壽丹書安養篇一福居處如虛子曰山林深遠固是佳境獨處則勢孤人稠則喧雜必在人野相近心遠地偏背山臨流氣候高爽土地良沃泉水清美如此得十畝平坦處便可構居若有人力可二十畝更不得廣廣則營為關心或似産業尤為煩也若得左右映帶岡巒形勝最為上地地勢好則居之安廣惠子曰看地形向背擇取好處立正堂三間為寢室梁長柱高椽上著棧棧上著泥俟泥干以瓦蓋之若無瓦草蓋令厚三尺則冬溫夏涼四面築牆不然塹壘務令堅厚斷風隙屋西作一格子房以待客客至引坐勿令人寢房及見藥室恐外來者有穢氣損人壞藥故也堂後立屋兩間每間為一房門令牢固一房著藥物更造一立匱高腳為之天陰霧氣匱下一少火若江北則不須火也一房著藥器地上安厚板板上安器著地土氣恐損正屋東去屋十步造房三間南間作廚北間作庫庫內東牆施一棚兩層高八尺長一丈闊四尺以安食物必不近正屋近正屋則恐煙氣及人兼慮火燭尤宜防慎於廚東作屋二間為弟子家人寢處於正屋西北立屋二間通之前作格子充料理曬曝藥物以籬院隔之又於正屋後三十步外立屋二間椽梁長壯柱高間闊以安藥爐更以籬院隔之處人不可至也西屋之南立精屋一間安功德克念誦人靜之處中門外水作一池可半畝余深二尺水長會滿種芙蕖菱芡繞池岸種某菊花既堪採食兼可閲目怡間也如虛子曰雞鳴時起就臥中導引導引訖櫛漱即巾巾後正坐量時候寒溫吃點心飯若粥等若服藥者先飯食復吃藥酒消息訖入靜燒香靜念不服氣者亦可念誦洗雪心源息其煩慮良久事訖即出徐徐步庭院間散氣地濕則勿行但屋下東西步令氣散家事付與兒子不得關心所營退居去家百里五十里但時知平安而已應緣居所要並令子弟支料頓送勿令數數往往來憒鬧也一物不得在意營之平居不得嗔不得大語大叫大用力飲酒至醉併為大忌四時氣候和暢之日量其時節寒溫出門行三里二里及三百二百步為佳量力行但勿令氣乏氣喘而已親故鄰里來相訪問攜手出遊百步或坐量和宜談笑簡約其趣才得歡適不可過度人性非合道者焉能無悶悶則何以遣之還須畜數百卷書易老莊等悶來閲之誰勝間坐衣服但粗縵可禦寒暑而已第一勤洗浣以香沾之身數沐浴務令潔淨則神安道勝也所將左右供使之人或得清淨弟子精選小心少過謙謹者自然事間無物相惱令人氣和心平也凡人不能絶嗔得無理之人易生嗔喜妨人道性如虛子曰屋宇宅院成後不因崩損雖有修造乃妄動土二尺以下即有土氣慎之為佳初造屋成恐有土木氣待泥干後於庭中醮祭訖然後擇良日入居居後明日燒香結果發願願心不退轉早悟道法成就功德藥無敗壞結果後平旦以清水漱口後東南方左轉誦言緊沙迦羅又到西南角言你自受殃一一如是滿七遍盜賊皆息心不為豁也或入山野亦宜作此法或在道路逢小賊作障難即定心作降伏之意咒言緊沙迦羅緊沙迦羅一氣盡為度亦自散也此法是釋門深祕可以救護衆生大慈悲故不用令孝子戈獵魚捕之人入宅不用輒大叫喚每種樹木量其便利不須等間漫種無益柴炭等並年支不用每日令人出入門巷惟務寂然一三道人曰凡居常獨臥欲為性命之學以生死為憂者須每未旦雞未鳴鳥未噪人未動之先陽氣清盛即宜起坐衾中收此氣以自養中者壽上者仙即不獲玄功者亦於死後帶得去東坡集載老人曰惟五更早起可以勾當自家事蓋謂此清介子曰凡人居止之室必須用密勿令有細隙致有風氣得入小覺有風勿強忍久坐必須急急避之久居不覺使人中風古來忽得偏風四肢不遂或角弓反張或失音不語者皆由於此是以大須用密無得輕之慎焉慎焉所居之室勿塞井及水瀆令人聾盲如虛子曰若虛勞火病金傷之體實猶敝室陋巷倘若無趨避之策風狂而驟其何以御之耶蓋肺主皮毛司腠理闔闢金受火賊則衛護斂固之令失權六淫之邪易乎侵襲輕則入於皮膚但為嚏唾涕咳諸候惟以身表溫暖腠理疏豁不幹真氣或可消散甚則入於經絡表有頭疼發熱身痛脊強不即發汗則必入里而為潮汗閉澀滿渴譫等症不即下之邪何以越然以尪贏之軀幾微之氣而復任此猖狂虛虛之禍豈旋踵而至哉噫倘不慎起居而或犯之是亦促命之殺車錘也慎之一三道人曰居家常欲小勞但不可自強所不堪耳流水不腐戶樞不蛀運動故也飲食如虛子日食噉須識罪福不可為口腹損命所有資身在藥菜而已料理如法殊蓋於人枸杞甘菊朮牛膝苜蓿商陸白蒿五加服石者不宜吃商陸以上藥三月以前苗嫩時採食之或煮或齏或炒或醃悉用土蘇咸豉汁加米等色為之下飯甚良蔓菁作齏最佳不斷五辛者春秋嫩韭四時採薤甚益面雖擁熱甚益氣力但不可多食致令悶憒料理有法節而食之百沸餺飪蒸餅及羔索餅起面等法在食經中白粳米白梁黃青梁米常須貯積支料一年炊飯煮粥亦各有法並在食經中緑豆紫蘇烏麻亦預宜貯俱能下氣其餘食醬等食之所要皆須貯蓄若肉食者必不得害物命但以錢買猶愈於殺第一戒慎勿殺若得肉必須新鮮似有氣息則不宜食爛藏損氣切須慎之戒之一三道人曰常讀養生書稱肉補人莫過乳酪牸牛當多畜之然富貴始能至有謂雞毒在心宜食肝而去心者知道者常行之固日用要事也彼謂萬物之死皆毒於肝者未必然矣吾祖好肝而八十無病肝豈能害哉菜以蔓菁作齏至妙又春韭四時薤俱助腎氣不可常食面養人而益氣然胃氣弱者難消緑豆紫蘇芝麻皆能下氣薄荷解熱俱當多蓄以備日用抱朴子曰凡飲食宜節食欲數而少不欲頓而多常欲令飽中飢飢中飽耳蓋飽則傷肺飢則傷氣咸則傷筋酸則傷骨故每學淡食食當熟嚼使米脂入腹當食須去煩惱暴數為煩侵觸為惱如食五味必不得暴嗔多令人神驚夜夢飛揚每食不用重肉喜生百病常須少食肉多食飯及少菹菜並勿食生菜生米小豆陳臭物勿飲濁酒食麵使塞氣孔勿食生肉傷胃一切肉惟須煮爛停冷食之食畢當漱口數過令人牙齒不敗口香熱食訖以冷酢漿漱口令人口氣常臭作齒病又諸熱食鹹物後不得飲冷酢漿水喜失聲成尸咽凡熱食汗出勿當風發痙頭痛令人目澀多睡每食訖以手摩面及腹令津液通流食畢當行步躊躇行畢使人以手摩腹上數百遍則食易消大益人令人能飲食無百病然後有所修為快也飽食即臥乃生百病成積聚飽食仰臥成氣痞作頭風觸寒來者寒未解食熱食成刺風人不得夜食又云夜勿過醉飽食勿精思為勞苦事有損余虛損人常須日在已時食食訖則不須飲酒終身無干嘔勿食父母本命所屬肉令人命不長勿食自己本命所屬肉令人魂魄飛揚勿食一切腦大損人茅屋漏水墮諸脯肉上食之成瘕約暴肉作脯不肯幹者害人祭神肉無故自動食之害人飲食上蜂行住食之必有毒害人腹內有宿病勿食鯪鯉魚肉害人濕食及酒漿臨上看視不見人物影者勿食之成疰若已食腹脹者急以藥下之每十日一食葵葵滑所以通五臟壅氣又是菜之主不用合心食之又飲酒不欲使多多則速吐之為佳勿令至醉即終身百病不除久飲酒者腐爛腸胃漬髓蒸筋傷神損壽醉不可以當風向陽令人發狂又不可當風臥不可令人扇涼皆即得病也醉不可露臥及臥黍穰中發癩瘡醉不可強食或發癰疽或發喑或生瘡醉飽不可以走車馬及跳躑醉不可以接房醉飽交接小者面皯咳嗽大者傷絶臟脈損命凡人飢則坐小便若飽則立小便慎之無病又忍尿不便膝冷成痹忍大便不出成氣痔小便勿努令兩足膝冷大便不用呼氣及強努令人腰疼目澀宜任之佳如虛子曰夫飲食所以養生過則傷脾若過極則亦所以戕生者也何則痰火之病始於水涸火炎金傷金既受傷則木寡於畏其不凌脾者鮮矣以脾受木賊則運化之機自遲而復不能節其飲食以致傷而復傷輕則噯腐吞酸重則痞滿疼痛病體復加有此則亦難乎其為治也蓋欲攻積則妨正欲溫中則動火過消導則反損脾三者之法豈其宜乎況人藉水穀之氣以為養土受木賊則不能運化精微上歸於肺輸布五臟以養百骸自是形容日減肌肉日消其人即能飲食無乃食易而已更何益耶此調攝之一關也可不謹哉一三道人曰太餓傷脾太飽傷氣蓋脾藉於谷飢則水穀自運而虛脾氣轉於脾飽則脾以食充而塞氣故學道之士先飢而食所以給脾食不充脾所以養氣物理論曰穀氣勝元氣肥而不壽元氣勝穀氣瘦而多壽養生家使常穀氣少則百病不生而壽永矣又曰五味不欲偏多酸多傷脾苦多傷肺辛多傷肝咸多傷腎凡傷久即損壽道人蒯京年一百七十八而甚丁壯言人當朝朝服食玉泉琢齒使人有顏色去三蟲而堅齒玉泉者口中唾也朝旦未起早漱津令滿口乃吞之琢齒二七遍名曰練精稽康云穰歲多病飢年少疾信哉不虛是以關中土俗好儉嗇廚膳肴羞不過菹醬而已其人少病而壽江南嶺表其處饒足海陸鮭鮪無所不備土俗多疾而人早夭北方仕子遊宦至彼遇其豐贍恣口食噉夜長醉飽四體熱悶赤露眠臥宿食不消未逾期月大小皆病或霍亂腳氣脹滿或寒熱瘧痢惡核丁奚或癰疽痔漏或偏風狠退不知醫療以至於死凡如此者比肩皆是惟云不習水土都不知病之所由靜言思之可為太息凡遇山水塢中出泉者不可久居飲食作癭病又深陰地冷水不可飲必作痎瘧如虛子曰夫四氣以酒為先者蓋以味甘適口性悍壯志賓朋無此不可申其敬爾然聖人以酒為人合歡又曰惟酒無量不及亂若此觀之古人制酒惟歡情適況而已可恣飲而劇乎今之貪者以酒為漿以劇為常必至酩酊而後己凡一醉之間百事迥異肆志顛狂或助欲而色膽如天或逞威而雄心若虎或以新搜故罵詈不避親疏或認假作真鬥毆無畏生死或傷其天性或敗壞人倫乖名喪德無所不為甚而忘形仆地促其天年者藉藉酒之酷厲奚啻鴆蝮也哉況人既病水則火已萌其焰矣杯酒下咽即猶貯燼點以硝黃涸海燎原其可量乎蓋酒之為性懦悍升浮氣必隨之痰鬱於上溺澀於下渴必恣飲寒涼其熱內郁肺氣太傷輕則咳嗽齁喘重則肺痿癆瘵觀其大寒凝海惟酒不冰明其性熱獨冠群物藥家用之惟藉以行其勢爾人飲多則體弊神昏其毒可知矣且曲中以諸毒藥助其勢豈不傷中和損榮衛耗精神竭天癸而夭夫人壽也實實子日凡平旦點心飯訖即自以熱手摩腹出門庭行五六十步消息之中食後還以熱手摩腹行一二百步緩緩行勿令氣急行訖還床偃臥四展手足勿睡頃之氣定便起正坐吃五六顆蘇煎棗啜半斤以下人參茯苓甘草等飲覺似少熱即吃麥門冬竹葉茅根等飲量性將理食飽不得急行及飢不得大語遠喚人嗔喜臥睡覺食散後隨其事業不得勞心勞力覺肚空即須索食不得忍飢必不得食生硬黏滑等物多致霍亂秋冬間緩裹腹腹中微似不安即服厚朴生薑等飲如此將息必無橫疾調攝彭祖曰道不在煩惟能不思衣食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形無極而兼之以導引行氣不已亦可得長年千歲不死凡人不能無思當以漸遣除之彭祖曰和神導氣當得密室閉戶安床暖席高枕正身偃臥瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人也每旦夕旦夕者是陰陽轉換之時凡旦五更初暖氣至頻頻眼閉是上生氣至名曰陽息而陰消暮日入後冷氣至凜凜然時乃至床坐睡倒足下生氣至名曰陽消而陰息旦五更初暖氣至暮日入後冷氣至常出入天地日月山川河海人畜草木一切萬物體中代謝往來無時休息進退如晝夜之更迭如覆水之潮汐是天地消息之道也面向午展兩手於腳膝上徐徐按擦肢節口吐濁氣鼻引清氣凡吐者去故氣亦名死氣納者取新氣亦名生氣故老子經云玄牝之門天地之根綿綿若存用之不勤言口鼻天地之間可以出納陰陽死生之氣也良久徐以手左托右托上托下托前托後托瞑目張口叩齒摩眼押頭拔耳挽發放腰咳嗽發揚振動也雙作只作反手為之用意掣足仰振數八十九十而止仰而徐徐定主作禪觀之法閉目存思想見空中太和元氣如紫雲成蓋五色分明下入毛際漸漸入頂如雨初晴云入山透皮入肉至骨至腦漸漸入下腹中四肢五臟皆受其潤如水滲地若徹則覺腹中有聲汩汩然後專思存不得外緣斯須即覺元氣達於氣海須臾則自達於湧泉則覺身體振動兩腳踡曲亦令床坐有聲拉拉然則名一通二通乃至日得三通五通則身體悅譯面色光輝鬢毛潤澤耳目精明令人食美氣力強健百病皆去五年十年長存不忘得滿十萬通則去仙不遠矣人身虛無但有遊氣氣息得理即百病不生若消息失宜即諸疴竟起善攝養者須知調氣調氣方療病大患百日生眉須自余者不足言也凡調氣法夜半後日中前氣生得調日中後夜半前氣死不得調調氣之時則仰臥床鋪厚軟枕高下其身平舒手展腳兩握大拇指節去身四五寸兩腳相去四五寸數數叩齒飲玉漿引氣從鼻入腹足則停止有力更取久住氣悶從口細細吐出盡遠從鼻細細引入出氣一如前法閉口以心中數數令耳不聞恐有誤亂兼以手下籌能至千則去仙不遠矣若夫陰霧惡風猛寒勿取氣也但閉之若患寒熱及卒患癰疽不問日中疾患未發前一食問即調知其不得好瘥明日依式更調之按摩天竺國按摩此是沙羅門法兩手相捉扭捩如洗手法兩手淺相叉反覆向胸兩手相捉其按䏶左右同以手如挽五石力弓左右同兩手相重按䏶徐徐捩身左右同作拳向前築左右同作拳卻頓此是開胸左右同如拓石法左右同以手反捶背上左右同兩手據地縮身曲脊向上三舉兩手抱頭宛轉䏶上此是抽肩大坐斜身偏欹如排山左右同大坐伸兩腳即以一腳向前虛掣左右同兩手拒地回顧此虎視法左右同立地反拗身三舉兩手急相叉以腳踏手中左右同起立以腳前後虛踏左右同大坐伸兩腳相當手勾所伸腳著膝中以手按之左右同上十八勢但是老人日別能依此三遍者一月後百病除及奔馬補益延年能食眼明輕健不復疲乏老子按摩法兩手捺䏶左右捩身二七遍兩手捻䏶左右紐肩二七遍兩手抱頭左右紐腰二七遍左右掉頭二七遍兩手托頭三舉之一手抱頭一手托膝三折左右同一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相叉托心前推卻挽三遍兩手相叉著心三遍曲腕築肋挽時左右亦三遍左右挽前後拔各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍兩手相叉反覆攪各七遍外振手三遍內振手三遍覆手振亦三遍摩紐指三遍兩手反搖三遍兩手相叉上下紐肘無數單用十呼兩手相聳三遍兩手下頓三遍兩手相叉頭上過左右伸肋十遍兩手拳反背上掘脊上下亦三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌前聳三遍覆掌兩手相叉交橫三遍覆掌橫直即聳三遍若有手患冷從上打至下得熱便休舒左腳右手承之左右捺腳從上至下直腳二遍右手捺腳亦爾前後捩足三遍左捩足右捩足各三遍前後卻挾足三遍直腳三遍紐䏶三遍內外振腳三遍若有腳患冷者打熱便休紐䏶以意多少頓足三遍卻直腳三遍虎據左右紐肩三遍推天托地左右三遍左右排山負山板木各三遍舒手直前頓伸手三遍舒兩手兩膝亦各三遍舒腳直反頓伸手三遍捩內脊外脊各三遍嗇神老子曰人生大限百年節護者可至千歲如膏小炷之與大炷衆人大言而我小語衆人多煩而我小記衆人悖暴而我不怒不以俗事纍意不臨時俗之儀淡然無為神氣自滿以此為不死之道天下莫我知也勿謂暗昧神見我形勿謂小語鬼聞我聲犯禁滿千地收其形人為陽善人自報之人為陰善鬼神報之人為陽惡人自治之人為陰惡鬼神治之故天不欺人示之以影地不欺人示之以響人生天地氣中動作喘息皆應於天為善為惡天皆鑑之人有修善積德而遭凶禍者先世之餘殃也為惡犯禁而遇祥福者先世之餘福也故善人行不擇日至凶中得凶中這吉入惡中得惡中之善惡人行動擇時至吉中反得吉中之凶入善中反得善中之惡此皆自然之符也中正子曰既屏外緣須守五神心肝脾肺腎從四正言行坐立最不得浮思忘念心想欲事惡邪火起故孔子曰思無邪也常當習黃帝內視法存想思念令見五臟如懸罄五色了了分明勿輟仍於每旦初起面向午展兩手膝上心眼觀氣上入頂下達湧泉旦旦如此名曰迎氣常以鼻引氣口吐氣小微吐之不得開口復欲得出氣少入氣多每欲食迸氣入腹每食以氣為主也凡心有所愛不用深愛心有所憎不用深憎並皆損性傷神亦不用深贊不用深毀常須運心於物平等如覺偏頗尋改正之居貧勿謂常貧居富勿謂常富居貧富之中常須守道勿以貧富易志改性識達道理似不能言有大功德勿自矜伐美藥勿離手善言勿離口常以深心至誠恭敬於物慎勿詐善以悅於人終身為善為人所嫌勿得起恨事君盡禮人以為謅當以道自平其心道之所在其德不孤勿言行善不得善報以自怨仇居處勿令心有不足若有不足則自抑之勿令得起人知止足天遺其祿所至之處勿得多求多求則心疲而志苦若夫人之所以多病當由不能養性平康之日謂言常然縱情恣欲心所欲得則便為之不拘禁忌欺罔幽明無所不作自言適性不知過後一一皆為病本及兩手摸空白汗流出口唱皇天無所逮及皆以生平粗心不能自察一至於此但能內省身心則自知見行之中皆畏諸疴將知四百四病身手自造本非由天及一朝病發和緩不救方且誹謗醫藥無效神仙無靈故有智之人愛惜性命者當自思念深生恥愧時誡身心常修善事也黃帝問曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異邪將人失之耶歧伯曰上古之人其知道者法於陰陽和於術數飲食有常節起居有常度不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也謂之虛邪賊風避之有時恬淡虛無真氣從之精神守內病安從來抱朴子曰房中之要上士知之可以延年除病其次不以自伐不得其術者古人方之於凌杯以盛酒羽苞之蓄火又才所不逮而強思之傷也力所不勝而強舉之傷也深憂重恚傷也悲哀惟悴傷也喜樂過度傷也汲汲所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沉醉嘔吐傷也飽食即臥傷也跳走喘乏傷也歡笑器泣傷也積傷至盡盡則早亡是以養性之士唾不至遠行不疾步耳不極聽目不極視坐不久處立不至疲先寒而衣先熱而解不欲極飢而食食不過飽不欲極渴而飲飲不過多飢食過多則成積聚渴飲過多則成痰澼不欲甚勞不欲甚佚不欲流汗不欲多唾不欲奔走車馬不欲極目遠望不欲多啖生冷不欲飲酒當風不欲數數沐浴廣志遠願不欲規造異巧冬不欲極溫夏不欲極涼不欲露臥星月不欲眠中用扇大寒大熱大風大霧皆不欲冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝咸多則傷心甘多則傷腎此五味克五臟五行自然之理也凡言傷者亦不即覺也謂久則損壽耳是以善攝生者臥起有四時之早晚興居有平和之常制調劑筋骨有偃仰之方祛疾閉邪有吐納之術流行營衛有補瀉之法節宣勞佚有豫奪之要忍怒以全陰抑喜以養陽然後先服草木以救虧缺後服金丹以定無窮養性之理盡於此矣夫欲快意任懷自謂達識知命不泥異端極性肆力不勞持久者聞此言也雖風之過耳電之極目不足喻也雖身枯於留連之中氣絶於綺紈之際而甘心焉亦安可告之以養性之事哉匪惟不納乃謂妖訛也而望彼信之所謂以明鑑急朦瞽以絲竹娛聾夫者也虛虛子曰善攝生者常少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者養性之都契也多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脈不定多好則專迷不理多惡則憔悴無歡此十二多不除則營衛失度血氣妄行喪生之本也惟有少無多者幾於道矣是知勿外緣者真人初學道之法也若能如此可居瘟疫之中無憂疑矣愛氣如虛子曰春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩行以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜臥早起毋厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平毋外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬三月此謂閉藏水冰地拆無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫毋泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少廣惠子曰一體之盈虛消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫陰陽俱壯則夢生殺甚飽則夢與甚飢則夢取是以浮虛為疾者則夢揚沉實為疾者則夢溺藉帶而寢者則夢蛇鳥雀銜發者則夢飛心躁夢火將病夢飲酒歌舞將衰夢哭是以和之為始治之為終靜神滅想此養生之道也實實子曰善攝生者無犯日月之忌無失歲時之和一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無遠行終身之忌暮無燃燭行房暮常護氣也凡氣冬至起於湧泉十一月至膝十二月至股五月至腰名三陽成二月至膊三月至項四月至頂純陽用事陰亦仿此故四月十月不得入房避陰陽純用事之月也每冬至日於北壁下厚鋪草而臥云受元氣每八月一日已後即微火暖足勿令下冷無生意常欲使氣在下不欲泄於上春凍未泮衣欲下厚上薄養陽收陰斷世長生養陰收陽禍則滅門故云冬時天地氣閉血氣伏藏人不可作勞出汗發泄陽氣有損於人也又云冬日凍腦春秋腦足俱凍此聖人之常法也春欲晏臥早起夏秋欲侵夜乃臥早起冬欲早臥而晏起皆益人雖云早起莫在雞鳴前雖言晏起莫在日出後凡冬月忽有大熱之時夏月忽有大涼之時皆勿受之人有患天行時氣者皆由犯此也即須調氣息使寒熱平和即免患也每當臘月勿歌舞犯者必凶常於正月寅日燒白髮吉凡寅日剪手甲午日剪足甲火燒白髮吉如虛子曰夫氣貴順而不貴逆順時百脈暢利逆則四體愆和若以火病而復增一怒則猶敝艦而橫之波濤鮮有不覆者乎何也以虛其虛則陰陽乖戾臟腑隔絶其不危者鮮矣且今之昧者但知怒能害人殊不知賊人真氣者有九曰怒則氣上喜則氣緩悲則氣消思則氣結恐則氣下驚則氣亂勞則氣耗寒則氣收熱則氣泄若此諸氣實人所自致者也況痰火之病始於真氣勞傷腎陰虧損而邪熱乘虛協之故丹溪曰氣有餘便是火然所謂有餘者非真氣之有餘謂真氣病而邪火相協或行而迅速或住而壅滯氣火俱陽以陽從陽故陽愈亢而陰愈消所謂陰虛生內熱者以此即如勞傷神志心血方耗腎水枯竭君火失令相火司權熏爍肺金之意耳況七情之氣惟怒最甚故經曰怒則血啘於上以其情動於中氣逆於上動極生火火載血上錯經妄行越出上竅故鑽燧改火撫掌成聲沃火生沸皆自無而有實動極之所致也意以一星之火而致燎原之禍氣可逆乎如虛子曰夫氣貴舒而不貴郁舒則周身暢利鬱則有脈愆和故曰喜則氣緩然緩者固有徐緩暢利之義但不及太過皆能致息愆期而況憂思鬱結寧不滯其氣乎氣既壅滯則鬱而為火是益為爍金涸水之貽人既病火則身猶敝器矣須著意護持心當渾然無物庶可登之佳境倘以世務營心終日快快是欲蹈萬古之長夜寧非昧而不覺者乎哀哉保形彭祖曰每施瀉論導引以補其虛不爾血脈髓腦日損致生疾病飲酒吐逆勞作汗出以當風臥濕飽食大呼疾走舉重走馬引強語笑無度思慮太深皆損年青是以為道者務思和理焉口耳亂心聖人所以閉之名利敗身聖人所以去之天老曰丈夫處其厚不處其薄當去禮去聖守愚以自養斯乃德之源也彭祖曰上士別床中士異被服藥百裹不如獨臥色使目盲聲使耳聾味使口爽苟能節宣其宜適抑揚其通塞者可以增壽一日之忌暮無飽食一月之忌暮無大醉一歲之忌暮須遠內終身之忌暮常護氣夜飽損一日之壽夜醉損一月之壽一接損一歲之壽慎之清旦初左右手摩交耳從頭上挽兩耳又引發則面氣通流如此者令人頭不白耳不聾又摩掌令熱以摩面從上向下二七遍去皮乾氣令人面有光又令人騰風寒時氣寒熱頭育百病皆除老子曰入欲求道勿起五逆六不祥四凶大小便向西一逆向北二逆向日三逆向月四逆仰視日月星辰五逆夜半裸體一不祥旦起嗔心二不祥向灶罵詈三不祥以足內火四不祥夫妻晝合五不祥盜師父物六不祥旦起常言善事天與之福勿言奈何及禍事名請禍臥伏地大凶以匙筋擊盤大凶大勞行房露臥發癲病醉勿食熱食食畢摩腹能除百病熱食傷骨冷食傷肺熱無灼唇冷無冰齒食畢行步躊躇則長生食勿大言大飽血脈閉臥欲得數轉側冬溫夏涼慎勿冒之大醉神散越大樂氣飛揚大愁氣不通久坐傷筋久立傷骨凡欲坐先解脫右靴履大吉用精令人氣乏少睡令人目盲多睡令人心煩貪美食令人泄痢沐浴令常不吉沐與浴不同日同日沐浴凶説夢者凶凡日月蝕救之吉活千人除殃活萬人與天地同功日月薄蝕大風大雨虹霓地動雷電霹靂大寒大霧四時節變不可交合陰陽慎之凡夏至後丙丁日冬至後庚辛日皆不可陰陽合大凶老子曰凡人生疾病者是風日之子生而早死是晦日之子在胎而傷者是朔日之子母子俱死者是雷霆霹靂日之子能行步有知而死者是下旬之子兵血死者是月水盡之子又是月蝕之子雖胎不成者是弦望之子命不長者是大醉之子不癡必狂者是大勞之子生而不成者是平旦之子意多恐悸者是日出之子好為盜賊貪欲者是禺中之子性行不良者是日中之子好詐及妄者是晡時之子不喑必聾者是人定之子天地閉氣不通其子多死夜半合陰陽生子上壽賢明夜半後合會生子中壽聰明智慧雞鳴合會生子下壽克父母此乃天地之常理也中正子日凡居家不欲數沐浴若沐浴須密室不得大熱亦不得大冷皆生百病冬浴不必汗出霖霖沐浴後不得觸風冷新沐發訖勿當風勿濕縈髻勿濕頭臥使人頭風眩悶發禿面黑齒痛耳聾頭生白屑飢忌浴飽忌沐浴訖須進少許食飲乃出夜沐發不食即臥令人心虛饒汗多夢又夫妻不用同日沐浴常以晦日浴朔日沐吉凡炊湯經宿用洗體成癬洗面無光洗腳即疼痛作瓿畦瘡熱泔洗頭冷水濯之作頭風飲水沐頭亦作頭風時行病新汗解勿冷水洗浴損心包附發汗愈病五形圖此禽獸形圖乃漢神醫華陀所授凡人身體不安作此五形圖之戲汗出疾即愈矣閉氣低頭拈拳戰如虎威勢兩手如提千金輕輕起來莫放氣平身吞氣入腹使神氣上而復下覺腹內如雷鳴或七次如此運動一身氣脈調和百病不生見圖如熊側身起左右擺腳要後立定使氣兩旁脅骨節皆響亦能動腰力除腫或三五次止能舒筋骨而安此乃養血之術也見圖閉氣低頭捻拳如鹿轉頭顧尾平身縮肩立腳尖跳跌跟連天柱通身皆振動或三次每日一次也可如下床做作一次更妙見圖閉氣如猿爬樹一隻手如捻果一隻腳如上抬起一隻腳跟轉身更運神氣吞入腹內覺有汗出方可罷見圖閉氣如鳥飛頭起吸尾閭氣朝頂虛隻手躬前頭要仰起迎神破頂見圖節欲如虛子曰人均稟五常而尊卑貴賤不等皆由父母合會受氣異也得合八星陰陽又得其時者上也得合八星陰陽不得其時者中也不合八星陰陽得其時者下也不合此宿不得其時則為凡人矣合宿交會者非惟生子大貴亦利身大吉八星者室參井鬼柳張房心也是宿所在可以合陰陽凡大月十七日小月十六日不可交會犯之傷血脈凡月二十三日五日九日草日此生日也交會令人無疾病凡新浴遠行及疲飽食醉大喜大悲男女熱病未差女子月血新産者皆不可合陰陽熱病新交者死人有所怒血氣未定因與女合令人發癰疽不可忍小便交合使人淋莖中痛面夫血色及運行疲乏來入房五勞虛損少子且婦人月事未絶而與交合令人成病得白駁也水銀不可近服令人消縮鹿獵二脂不可近陰令陰痿也如虛子曰夫四欲之中惟色最甚雖聖賢不能無此孔氏曰吾未見好德如好色者也孟子曰養心莫善於寡欲又曰血氣未定戒之在色若此觀之則色亦人所難制者今之膏梁逸士晝夜荒淫以此為樂若悅芻豢嗜而無厭必待精竭髓枯氣匱力乏而已昧而覺者豈其是乎逮夫真水既虧則火炎痰聚而癆瘵之症成矣當此之際法宜存精以覆水奈火伏水沸心神浮越虛陽妄動竟不能制而復泄其精則猶源將涸而流將息而復導之寧不竭乎噫病至於此非醫者之神手疑神定慮以治病者之鐵心割情絶愛以調安能免於死哉悲夫養老如虛子曰人之在生多遘諸難兼少年之時樂遊馳騁情志放逸不致於道倏然白首方悟虛生終無所益年至六十將欲頤性莫測衣據若如此二箭中求之庶幾於道足以延齡矣語云人年老有疾者不療斯言失矣緬想聖人之意本為老人設方何則年少則陽氣猛盛食肯皆甘不假醫藥悉得肥壯至於年邁氣力稍微非藥不效譬之新宅之與故舍斷可知矣如虛子曰人年五十以上陽氣日衰心力漸退忘前失後興居怠惰視聽不穩多退少進日月不等萬事零落心無聊賴健忘瞋怒情性變異食物無味寢處不安子孫不能識其性惟云大人老來惡性不可咨諫是以為孝之道常須慎護其事每起速稱其須不得令其意負不快故曰為人子者不植見落之木淮南子曰木葉落長年悲夫栽植卉木尚有避忌況俯仰之間得輕脫乎清介子曰人年六十以去皆大便不利或常苦下痢有斯二疾常須預防若閉澀則宜數食葵菜等冷滑之物如其下痢宜與薑韭溫熱之菜所以老人於四時之中常宜溫食不得輕之老人之性必恃其老無有藉在率多驕恣不循軌度忽有所好即須稱情既曉此術宜常預慎之故養老之要耳無妄聽口無妄言身無妄動心無妄念此皆有益老耳人又當愛精每有誦念無令耳聞此為要妙耳又老人之道常念善不念惡常念生不念殺常念信無念欺養老之道無於情戲強用氣力無舉重無疾行無喜怒無極視無極聽無大用意無大思慮無嗟吁無叫喚無吟歎無歌笑無啼泣無悲愁無哀慟無慶弔無接對賓客無預局席無飲興能如此者可無病長壽不必惑也又當避大風大雨大寒大暑大露霜霰雪旋風惡氣能不觸冒者是大吉祥凡所居這室必須周密無致風隙也夫善養者非其書勿讀非其聲勿聽非其務勿行非其食勿食非其食者所謂豬豚雞魚蒜繪生肉生菜白酒大酢大咸也常學淡食至如黃米豆此等非老人所宜食故必忌之常宜輕清甜淡之物大小麥面粳米等為佳又忌強用力咬齧堅硬脯肉及致折齒破斷之弊常不飢不飽不寒不熱善行住坐臥言談語笑寢食造次之間能不妄失者則可延年益壽矣如虛子曰衛汛稱扁鵲云安身之本必須於食救疾之道惟在於藥不知食宜者不可以全生不明藥性者不能以除病故食能排邪而安臟腑藥能恬神養性以資血氣故為人子者不可不知此二事是故君父有疾期先命食以療之食療不愈然後命藥故孝子必深知食藥二性清介子曰人養老之道雖有水陸百品珍饈每食必忌於雜雜則五味相撓食之不已為人作患是以食啖鮭肴務令簡少飲食當令節儉若貪味傷多老人腸胃皮簿多則不消膨哼短氣必致霍亂夏至已後秋分以前勿進濃羹臛酥油酪等則無他矣夫老人所以多疾者皆由少時春夏取涼多飲食大冷故其魚膾生菜生肉腥冷物多損於人宜常斷之惟乳酪酥蜜常宜溫而食之此大利益老年雖然卒多食之亦令人腹脹泄痢漸漸食之乃佳中正子曰非但須知服食將息節度更須知調身按摩搖動肢節導引行氣行氣之道禮拜一日勿住不得安於其處以致壅滯故流水不腐戶樞不蠹義在斯矣能知此者可得一二百故曰安者非安能安在於慮亡樂者非樂能樂在於慮殃所以老人不得殺生取肉以自養也戒忌黃帝雜忌曰旦起勿開目洗面令人目澀失明饒淚清旦勿惡言聞惡事即向所來方三唾之吉又勿慎怒勿叱吒嗟呼勿咄嘆勿立膝坐而支臂膝上勿令發覆面皆不祥勿舉足向火勿對灶罵詈凡行立坐勿背日吉勿面北坐久思不祥凡欲行來常存魁罡在頭上所向皆吉若欲征戰存斗柄在前以指敵吉勿面北冠帶凶勿向西北唾犯魁光神凶勿咳唾唾不用遠成肺病令人手足重及背痛咳嗽亦勿向西北大小便勿殺龜蛇勿怒目視日月令人失明行及乘馬不用回顧則神去人不用鬼行躇粟凡過神廟慎勿輒人人必恭敬不得舉目恣意顧瞻當如對嚴君焉乃享其福不爾速禍亦不得返首顧視神廟見龍蛇勿興心驚怪亦勿注意瞻視忽見鬼怪變異之物即強抑之勿怪咒曰見怪不怪其怪自壞又路行及衆中見殊妙美女慎勿熟視而愛之比當魑魅之物無問空山曠野稠人廣衆之中皆亦如之凡山水有沙風處勿在中浴害人欲渡者隨驢馬後急渡不傷人有水駑處射人影即死欲渡者以物打水其弩即散急渡不傷凡諸山有孔穴人採寶者惟三月九日余月山閉氣交犯死凡人空腹不用見尸臭氣入鼻舌上白起口常臭欲見尸者皆須飲酒見之能避毒凶行觸熱途中逢河勿洗面生烏皯如虛子曰凡在家及外行卒逢大飄風暴雨震電昏暗大霧此皆是諸龍鬼神行動經過所致宜入室閉戶燒香靜坐安心以避之待過後乃出不爾損人或當時雖未覺於後不佳矣又陰霧中不可遠行華光子曰濕衣及汗衣皆不可久著令人發瘡及風瘙大汗能易衣佳不易者急洗之不爾令人小便不利凡大汗偏脫衣恐中風半身不遂春天不可簿衣令人傷寒霍亂食不消頭痛真人曰欲求長生服諸神藥必須先斷房室肅齋沐浴薰香不得往喪孝家及産乳處慎之慎之仲長統曰王侯之宮美女兼千卿士之家侍妾數百晝則醇酒淋其骨髓夜則房室輸其血氣耳聽淫聲目樂邪色宴內不出遊外不返王公得之才上豪傑馳之於下及至生産不時孕育太早或童孺而擅氣或疾病而構精精氣簿惡血脈不充既出胞藏養護無法又蒸之以五味胎傷孩病而脆未得堅復縱情欲重重相生病病相孕國無良醫醫無審術好佐其間過謬常有會有一疾莫能自免當今百歲之人者豈非所習不純正也廣惠子曰修心既平又須慎言語凡言語誦讀常想聲在氣海中臍下也每日初勿言語誦讀寧待平旦旦起欲專言善事不欲先計較錢財又食不得語語而食者常患胸背痛寢臥勿多言笑寢不得語言者言五臟如鍾磐不懸則不可發聲行不得語若語須住腳乃語行語則令人失氣冬至日止可語不可言自言曰言答人曰語有人來問不可不答自不可發言也仍勿觸冷開口大語為佳如虛子日夫諸欲之內惟財利益人多蓋人非財則無以治其生故諺云財與命相連然財固人所必用但以輕重較之財則又輕於命也何則人既病火則危如纍卵善調則生失調則死豈常病可例視乎必靜心寡欲凝神定慮毋以纖物煩擾心君庶火息水恬病或可瘳於此而孜孜汲汲終日營營致天君失泰而相火擅權勢必燎原矣利可趨乎利可不戒乎虛虛子曰凡人臥春夏向東秋冬向西頭勿北臥牆北亦勿安床凡欲睡勿歌詠不祥起上床坐先脫左足臥勿當舍脊下臥訖勿留燈燭令魂魄及六神不安多愁怨人頭邊勿安火爐日久引火氣頭重目赤鼻乾夜臥當耳勿有孔吹人即耳聾夏不用露面臥令人面皮厚喜成癬或作面風冬夜勿覆頭得長壽人每見十步直牆勿順牆臥風利吹人發癲及體重人臥勿跂床懸腳久成血痹兩足重腰疼又不得晝眠令人失氣臥勿大語損人氣力暮臥當習閉口口開即失氣且邪惡從口入久而成消渴及失血色屈膝側臥益人氣力按孔子不尸臥故日睡不厭踧覺不厭舒凡人舒睡則有鬼痛魔邪凡眠先臥心後臥眼人臥一夜當作五度反覆常逐更轉凡人夜魔勿燃燈喚之定死無疑暗喚之吉亦不得近前急喚夜夢惡不須説旦以水面東方噀之咒曰惡夢著草木好夢成珠玉即無咎矣又夢之善惡並勿説為吉隱身子曰居家常戒約內外長幼有不快即須早道勿使隱忍以為無苦過時不知便為重病遂成不效小有不好即按摩挼捺令百節通利泄其邪氣凡人無問有事無事常須日別踏脊背四肢一度頭項苦令熱氣踏即風時行不能侵入此大要妙不可具論抱朴子曰至於居處不得綺靡華麗令人貪婪無厭乃患害之源但令雅素淨潔無風雨寒濕為佳衣服器械勿令珍玉金寶增長過失使人煩惱根深廚膳勿脯肉豐盈常令儉約為佳然後行作鵝王步語作含鐘聲眠作獅子臥每日自詠歌云美食徐熟嚼生食不粗吞問我居止處大宅總林村胎息守五臟氣至仙骨成又歌曰日食三個毒不嚼而自消錦繡為五臟身著糞掃袍老子曰謝天地父母常以辰已日黃昏時天晴日淨掃宅中甲壬丙寅之地燒香北向稽首三過口勿語但心中始耳舉家皆利默云曾孫某乙數負皇天之氣象上帝之始顧閣家男女大小前後所犯罪過請為消除凶惡在後進善令某家大小身神安生氣還常行此道大吉大利除災殃老子曰正月朔日曉亦可於庭中向寅地再拜咒曰洪華洪華受大道之恩太清玄門顧還某去歲之年男女皆三過自咒常行此道可以延年呂真人安樂歌曰雙關一度理三焦左肝右肺如射雕東脾西胃須單托五勞七傷四顧搖鱣魚擺尾驅心病手拔腳挺理腎腰大小朝天安五臟漱津咽納指雙挑一時如此作三度方才把火遍身燒有人十二時中用管取延年百病消行則措擔於遠途往則凝時於太虛坐則調鼻息之氣臥則守臍下之珠身自有鼎心田自有丹鼎立而後可以煉丹凡人遊山探藥別求置鼎安爐是自棄其基也至人存無守有人只是一個氣只是一個息無時息機深深若存有時息機綿綿弗脫自無而有自有還無隨調隨養自息定而丹成凡入夜氣存之旦晝亡之是半途而廢也其於道延齡篇引夫延齡者必先卻病如前篇所論日用自養何病之至亦何用卻之之方惟是淫於嗜者終不能節以至於病惑於逞者終不能遏以至於病貪於得者終不能解以至於病敝於困窮厄於謀獲者終不能安以至於病而萬病生矣貧賤不修以待富貴乃富貴未得而身以貧賤病貧賤終且奈何少不修以待壯有未壯而以少病以少終者矣壯不修以待老有未老而以壯病以壯終者矣且奈何終者勿論不終者固自若也少之必壯而壯之必老也固也少即不病壯必病矣壯即不病老必病矣能逃之天地外乎至富貴病貧賤亦病迄無分矣且奈何既不能防之未病之先又不思卻之已病之後齡從何延耶豈欲以其吾生之命之造化鬥狠耶抑吾自與吾命為鬥狠耶且夫至於既病而延齡也為難矣必也將然而急用乎猶庶幾艾