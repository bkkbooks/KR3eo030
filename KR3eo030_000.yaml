通兼止夢遺臍上未呵之先將庸香三釐乳香一錢孩兒茶沒藥黃檀香各一錢共為細末將蜜調作餅一餅貼臍上用生薑一片切如藥餅大半個銅錢厚用蘄艾丸如豆子大不論丸數燒得薑熱覺得臍內微熱即去藥就呵之先一次用此藥以後不必用入圖入在病人馬口內進二分治流精晝夜不止初開馬口竅先用黃蠟務如快頭透開見圖三樣圖器總論如虛子曰每呵論病者歲次為呵數每歲一呵要足三百六十下數如病者十歲每轉十呵要三百六十呵有零寧可多呵幾呵更好不可缺數凡去呵的氣男女俱要未呵之先五七日用好酒肉白米飯與食補起他的氣方才氣完病者得效更速若男子病用女童女人病用童男壯盛無病者呵之若丈夫病用女人呵女人病用男子呵亦可神仙接命祕訣一陰一陽道之體也二絃之氣道之用也一家之氣交感於神之中而成丹也萬卷丹經俱言三家相會盡矣三五合一之妙概世學仙者皆不知下手之處神室黃道中央戊巳之門比喻中午即我也真龍真虎真鉛真汞金木水火此四象皆喻陰陽玄牝二物也煉已築基得藥溫養沐浴脫胎神化盡在此二物運用與己一毫不相干即與天地運行日月無二也悟真云先把乾坤為鼎器次將烏兔藥來烹此一詩言盡三家矣千言萬語皆備三姓會合雖語句不同其理則一而已矣但周天度數分在六十四卦之內以為筌蹄朝進陽火暮退陰符其數內暗合天機也訣曰此乃仙師口口相傳之祕旨也寶之寶之一三二五與三七四九行來五十一六十三兮七十五八十七兮九返七若人知此陰陽數便是神仙上天梯河圖數二五一都三個字古今明者實然稀東三南二同成五北一西方四共之戊已自居生數五三家相見結嬰兒嬰兒是一含真氣十月胎完人聖機溫養火先天度數朝屯暮蒙暮退陰符戌時居右自十六起至四止煉已之度數東升西降詩云河車周旋幾千遭正謂此工夫也朝陽進火行時居左自三至十七止每圈一次吹噓道盡之矣塞兌垂簾默默窺待先天氣至自十六起至四至止就換於左起三至十七止即換爐用鼎左右自二四六八十吹噓不用上藥右邊數盡即換於左從一三五七九十一行盡工夫吐水而睡其藥周身無處不到自然而然也即沐浴也經云採藥為野戰罷功為沐浴此之謂也自此得藥之後卻行溫養火候之功十月共六百卦終身外有身矣卻行演神仙出殼之功一日十飯不覺飽百日不食不顯飢盡矣祕之祕之此二節工夫待人道周全方可行之凡行之時先令病人仰面平枕口噙熱水或乳香酒一口然後令童女照前數吹之吹法先取紅鉛用破身童女所行經脈以夏布揉洗令淨或淨花亦可掃下曬乾如用時將熱童便洗下曬乾收起臨用時以童便化開滴於囊籥小頭口邊入鼻內將大頭令童口使力吹之如上法病人候吹氣即吸入童女氣忌蔥蒜薑酸辣之物久久行之能接補天年行後如覺內熱可服人乳即能解之附調氣治諸病法一水潮除後患法平時睡醒時即端坐凝神息慮舌抵上齶閉目調息津液自生分作三次以意送下此水潮之功也津既咽下在心化血在肝明目在脾養神在肺助氣在腎生精自然百骸調暢諸病不生此除患之功也逍遙子長生訣曰法水潮在關逍遙日夜還於中凝結生諸病才決通流便駐顏一起火得長安法子午二時內外視應閉息升身則腎中之火生矣火為水中之金烹而煉之立可成丹且百脈通融五臟無恙四肢康健而三花聚也孫真人曰火陽得地在六爻俱靜之時真氣通行必在三陽交會之際此為文火煉形外邪不感壽算無窮一夢失封金匱法欲動則火熾火熾則神疲神疲則精滑而致夢失也每寤寐之時必要凝息定氣以左手搓臍二七右手亦然復以兩年搓脅腹五七左右搖扇三四回次咽氣訥于丹田握固良久乃正屈足側臥永無走泄矣鄭思遠真人曰事多忘者神昏汗多出者神脫此是夢失神弱脫漏真精乃修身之士大忌也當勵前功一形衰守玉關法形衰枯稿切須守爐爐者丹田丹田者腎前臍後也若行住坐臥一意不散固守勿怠而又運用周天之火自然生精生氣生神豈止變衰顏如童子體力神仙若壯健行之收功甚速一鼓呵消積滯法凡有因食而積者久加脾胃受傷醫藥難治孰若節飲食戒真怒不使有積聚為妙凡有此等便當升身閉息往來鼓腹候其氣滿緩緩呵出怡然運五七次即時通快王穆真人曰未得通時多痞塞隔氣若胸膈滿塞常用此法不止除病散氣須無病行之自然真元增益壽域可躋一兜禮治傷寒法元氣虧弱調理不密則風寒傷感患者須端坐閉息兜起外腎頭如禮拜屈折至地運用真氣得勝滌時不六七次汗出自愈劉鮑一真人未仙之日曾感傷寒熱行此而安此法非止能治傷寒即無病行之頭日清利容顏潤澤一叩齒牙無病法齒之有疾乃脾胃之火熏蒸每日清晨或不拘時叩齒三十六通則氣自固蟲蛀不生風邪消散設或以病齒難叩著但以舌隱餂於牙根之間用柔制剛真氣透骨其蟲自除王真人曰欲修大道先去牙症叩齒不絶堅牢無病此須近易亦修養中至要也一觀升鬢不斑法思慮太過則神耗氣虛血散兩鬢斑以子午二時握固端坐凝神絶念兩眼含光中黃內顧追攝二氣自尾閭夾脊升上泥丸降下重樓返還元海憩息少時自然神形俱妙與道合真張真人曰夫何慮鬢斑久久行之可以積黍米而為金丹脫樊籠而遊三島其功局可云諭一運睛除眼害法虛靜跌坐凝息升身雙目輪轉十二數緊閉即開大睜逐氣每夜行五七次瘴翳自散光明倍常謝翼真人未得仙時曾患目疾絶去房事得此法而行之即愈故傳以惠於後人蓋為虛邪氣熱損犯肝經致生瘴翳運睛之法不止除昏久則可觀細收極目遠視時見金花乃道氣之運也一掩耳治頭眩法邪風入腦虛火上攻則頭目昏旋偏正作痛或中風不語半身不遂亦由此致治之須靜坐身升閉息以兩手掩耳搖頭五七次存想元神送上泥丸以逐其邪自然風散邪去張元素真人未得道時頭目昏旋偏正頭痛用還丹之法不十功即痊此法不止是治須無病行之添補髓海精潔神宮久視長生之漸一托踏應無病法雙手上托如舉大石兩腳前踏如履實地以意內顧神氣身生筋骨康健飲食消融華子元二十二勢取禽獸行之狀陶急居二十八道引水火曲升之理知神氣之走五臟自然傳送於四肢根本元固營衛強盛其功甚在不止輕身能皮膚結實足耐寒暑一搓塗自駐顏法顏色憔悴良由心思過度勞碌不謹每清晨靜坐神氣衝溢自內而外兩手搓面五七次復漱津塗面搓拂數次行之半月則皮膚光潤容貌悅澤大過尋常太虛真人晚年修道恥於衰弱得此法而返老還童若咽氣通心搓熱塗面亦多有益一閉摩通滯氣法氣滯則痛血凝加腫治須閉息以左右手摩滯處四十九處復左右多以津塗之不過五七次氣自消散趙乙真人未仙之時曾患此病行之而愈此法不止散氣消腫無病行之上下閉息左右四肢五七次經絡通暢氣血流行肌膚光瑩名曰干沐浴尤延生之道也一凝抱固丹田法定息抱臍子午無間勤徹浮沉湛然進退旬日之間下進五穀之精真氣自生百日之功上盡九重之蠢暗滌垢膩肌渴不患寒暑不侵駐顏還壽董自然真人道西華天尊守真或居天上或居人間一炷紫檀手披雲霧坐禪關一淡食能多補法五味之於五臟各有損益若一味過食須安一臟還虧一臟要在相均謹節謹圖爽口反見傷脾食淡自然有補耳玄珠先生得此法而成化古云斷鹽不是道孰謂補腎茹增福田卻非養神之道淡食中自有真氣可以保命安神一無心得大還法對鏡無好惡之心亦不可落空心而識執之心盡無也知識之心又生分別執著之心不可有也志公和尚無心有心此心乃合天地夫無心之法有事無事常要無心盡處喧處其念無二又曰莫謂無心即是道無心即隔一重關如明鏡照一切物也元不染著是謂太還也一運識五臟升降法上心腎之下肝西肺在東非腸非胃腑一氣自流通動功六字延壽訣春噓明目本扶肝夏至呵心火自間秋呬定知金肺潤冬吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切忌出聲聞口耳其功尤甚保神丹又訣肝若噓時目睜睛肺知咽氣手雙擎心呵頂上連叉手腎吹抱取膝頭平脾病呼時須撮口三焦客熱臥嘻嘻心呵頂上連叉手舉手則呵反手則吸呵則通於心去心家一切熱氣或上攻眼目或面色紅舌上瘡或口瘡故心為一身五官之主發號施令之時能使五官不同故孟子曰收其放心者為浩然之主故心不動而動為之妄妄則神散而使浩然之氣不清也秋冬時常暖其湧泉不傷於心君素書云足傷寒心是也澄其心則神自清欲其心則火下降故心火降則心無不正心通舌為舌之官舌乃心之苗為神之舍又為血之海故血少則心神恍惚夢寐不寧也冬面紅受克故鹽多傷心血冬七十二日省鹼增苦以養其心氣也肝若噓時目睜睛噓則通肝去肝家一切熱聚之氣故膽生於肝而膽氣不清因肝之積熱故上攻眼目大噓三十籲一補一瀉則眼增光不生眼屎故目通肝肝乃魂之宅夜睡眼閉則魂歸宅肝為目之官秋面青受克辛多傷肝秋七十二日省辛增酸以養肝氣腎吹抱取膝頭平吹則通腎去腎中一切虛熱之氣或目昏耳聾常補瀉則腎氣自調矣故腎通耳為耳之官耳聽走精不可聽於淫聲或破腹者大吹三十吹熱擦腎堂立上四季十八面黑受克甘多傷腎故季月各十八日省甘增咸以養腎氣肺知呬氣手雙擎呬則通肺去肺家一切所積之氣或感風寒咳嗽或鼻流涕或鼻熱生瘡大呬幾呬一補一瀉則肺氣自然升降肺為心之華蓋最好清故肺清則不生疾也肺通鼻為鼻之官肺為魄之宅也夏面白則受克若屬火肺屬金夏七十二日省苦增辛以養肺氣脾病呼時須撮口肺則通脾去脾家一切濁氣或口臭四肢生瘡或面黃脾家有積或食冷物積聚不能化故脾為食廩之官又為血之用故飲食不調則不生血四肢不動則脾困故夜原少食睡時脾不動以致宿食則病生矣脾四季之官為意之宅故意不可以妄動動則浩氣不能清也春面黃則受克春七十二日省酸增甘以養脾氣三焦客熱臥嘻嘻嘻則通膽去膽中一切客熱之氣故臥時常嘻能去一身之客熱常補瀉者膽氣自清目不生屎膽怕熱四時飲食熱者少食於上膈以使膽氣清爽也修身祕旨每日不拘時候靜坐集神齒對唇黏踏實跌坐或垂足正坐如此行之數月待神氣聚定然後行到之間內無所想外無所形恍恍惚惚神水三降之後覺其不丹田中金光燦爛徐徐從尾閭上夾脊至玉枕入泥丸歷歷如有物上熱之如火上齶神水滴滴降下清甘滿口分作三咽之如前送下丹田循環不已則天地在我陰陽從我之造化邵子所謂天向日中分造化人從心上起經綸故此心與元始齊眉㶸㶸全全湛然常寂圓陀陀光灼灼虛靈不昧浩然之理全在於斯不染纖毫之事染則神散五官不靈浩然之氣不生矣第一篇行動指引每天晝夜二六時中少食寬衣入乾淨室先轉三年文次方移兩膝跏跌舌抵上齶津液自生手屈第三文足踵玉戶身堅正坐端然調鼻息以延綿一念規中萬緣放下注目內觀默相玄關竅內珠粟一粒正在中心寸心念不缺一性性自住沓冥昏默靜定多時是為攢行旋繞五行性情自相為也遂令鼻息漸聞穀道輕提專氣致柔存無守有如雞抱卵如龍養珠了得性情歸化神氣混合坐至一時能奪百日之功以轉小河車數轉擦生門子九摩密戶而教同搓面有多解項三八轉睛四六叩齒四九回凡行此功皆須閉氣緊撮穀道每功一次俱要嗽津一口分津作三口咽之或令青女使入氣海之中此行持晝夜無間百日之內即見其功自然腎水上升心火下降西風混合陰陽消長而造化無窮矣而遇身中一陽生時仍要豎脊端坐反手擦揪於氣海一念存於尾閭鼻息漸封穀道輕撮上下相應內外分明存在此尾閭脊間左右有赤白二氣齊齊升上輕度三關運至泥丸一口咽下令青女送歸氣海如共升運三次即合採藥配合之功依前再運六遭以為水火咽煉之訣共存九轉同就一功所裁接靈丹煉精化氣以次可凝神入竅絶念忘情靜定多時是為沐浴故云修丹必尋冬至身中自有一陽生此乃話中之子時也則此以後之功晝夜精煉不問百五日功效難知自然神氣混融陰陽反覆雷轟海底大復丹田甘露灑於須彌瓊漿降於神室氣結神凝歸根覆命遂得三花聚頂五氣朝元靜聽天籟之音默飲長生之酒二百日後功倍於前恍然虛室靜坐工夫生光夜明如晝此無根鐵樹開花也勿執認愈進其功忽見一時金蟾上下飛舞更加猛力進煉功程復至人法兩忘工夫乃入佳境又增苦志頃刻無停忽見金花一輪方圓一丈此乃天然真火候卻猛開口一吸咽入中宮以接身之神氣再加精進逼迫其功至萬里無雲清朗之境天地山河皆沒影此與太虛同體身外有身功已將成仙道近矣當此之際則氣足而神全三室充精乃魂安魄暢逼出常世五七餘寸有此功應急求口訣而收之若不能收歸臍內反遭風疾身耗散前功希仙遠矣到此地位已結胎矣三十日足嬰兒出現宜加謹慎勿放縱遊即煉移爐換鼎之功超凡入道之妙道也修養之法先要正己修德修業若定己三正則無所不正一切形名非正不名一切事故非正不成日月平常設施酬酢未有不始於己者一切事理頭物亦未有不由於己出者是故進修之要道以修己為上必以正己為先反身正己接人人亦歸正正己處事事亦歸正正己應物物亦歸正惟天下之一正惟長道天下之大變是知正己者進修之大用也入聖階梯也第二篇靜坐功夫精心釋纍絶慮忘情少思寡欲見素於朴易道之功夫也心清纍釋足以盡瑕慮絶情忘足以靜世思欲俱泯足以造道素朴純一足以知天下安樂之法日逐少食寬衣於二六時中遇間暇則入室蟠膝靜坐心無雜想一念規中丹書云人心若與天地合顛倒陰陽只片時以心觀道道即心也以道觀心心即道也若能清心寡欲久久行之百病不生此惟秋及冬至以後行之尤妙如春夏行時春乃發生之時夏乃陽氣茂盛儒云歌詠所以養性情舞蹈所以養血脈又不必靜坐宜夜眠早起廣步於庭披髮援行以使長生食後宜動作舞蹈亦宜節欲古人冬至閉關以養微陽齋戒掩身以待陰陽之所定是故起以待日光此陽氣閉藏之時不可擾動筋骨惟安定靜養身體則春夏諸病不生情不動精固則水朝元心不動氣固火朝元性寂則魂藏木朝元情忘則魄伏金朝元四大安和則意定土朝元此謂人有五氣朝元又經云人能常清靜天地悉皆歸附葛仙周天火候訣法自子至已為六陽之數即進陽火也口訣云陽九數也坤陰數也乾九之陽起於坤之初六乾之策三十有六總計六爻得二百一十有六其訣始者用意久則自然天關在手統十二支也地軸由心以神馭氣數其息也子上以左手掐子位復卦主事鼻微吸天之精氣入於玄關而至尾閭為一吸又呼氣從尾閭穿夾脊而上泥丸為一呼一呼一吸為一息如循環十八文十八武三十六息足得玉露神水一口吞送下玄宮灌澆靈根得藥一兩醜上又移指掐醜位臨卦主事再行十八文十八武呼吸三十六息送玉露一口入玄宮得藥二兩寅上又移掐寅位泰卦主事行文火三十六息足送玉露一口入玄宮得藥三兩卯上又移指掐卯位大壯卦主事呼吸文火十八息送玉露一口入玄宮得藥四兩木液旺在卯洗心滌慮注意規中名曰沐浴令人以兩手摩身而沐浴者非也又行文火十八息送玉露一口入玄宮得藥五兩辰上又移指掐辰位夫卦主事行十八文十八武三十六息送玉露一口得藥六兩巳上又移指掐巳位乾卦主事行武呼吸十二息送玉露一口入玄宮得藥七兩再行文呼吸十二息送玉露一口入中宮得陽鉛八兩又行武呼吸十二息名首尾武中間文至此是進陽火三十六也自午至亥六陰之數退陰符也口訣云復卦之初六起於乾之初九坤之策二十有四總計六爻得一百四十四也午上移指掐午位姤卦主事行十二武火十二文火共呼吸二十四息送玉露一口入玄宮得藥一兩未上又移指掐未位遁卦主事行十二武十二文二十四息送玉露一口入玄宮得藥二兩申上又移指掐申位否卦主事乃西南之鄉行文火八息武火八息送玉露一口入玄宮得藥三兩酉上又移指掐酉位觀卦主事行文火十二息送玉露一口入玄宮得藥四兩金精旺在西宜當沐浴防危慮險洗心滌慮一意規中又文火十二息送玉露一口入玄宮得藥五兩戌上又移指掐戌位剝卦主事十二文十二武二十四息送玉露一口入玄宮得藥六兩亥上又移指掐亥位坤卦主事行文火八息送玉露一口入玄宮得藥七兩中行武火八息送玉露一口入玄宮得陰汞半斤又行文火八息一意規中名曰兩頭文中間武武者呼吸聊緊文者呼吸微緩自然連前進陽火遏陰符吞玉露十六口鉛汞拌勻合為一斤之數前後升降共得周天三百六十度火侯外徐五息以合五行周天五度奪盡天地日月陰陽卻運之數奪盡萬物生殺四時之數奪盡卦爻珠兩之數名曰月之員存乎口訣時之子妙在心傳周天息數微微數玉露寒泉滴滴符此真人口口相傳密旨也號曰四候卻有妙用大抵真息從氣穴中升即龍之玄氣即火也汞也橐籥也常人口中華池神水送舌下二竅若至人甘露玉液從腎輕升夾脊上泥丸住明堂而降下舌端即虎之玄氣即水也鉛也人之一身二氣存則生二氣竭則死乃一身真水火是也以上口訣遇身中子時癸生得藥入於玄宮以神會氣行之一度攢簇陰陽煅煉成丹須是數息有作若不行此難奪周天造化得藥無此難結黍米之珠近有一等煉已末純造化未得每日執此常行以為大功燒結元氣返為害之大者是以聖人傳藥不傳火從來火候少人知正謂此也乃指聖人不傳不形竹帛名曰天符行之者永外天仙失之者永為下鬼每年二八月每月初八二十三每日卯酉二時已上不行於火候附葛仙金液還丹訣凡修煉貴乎忘言守一忘言氣不散守一神不出一者太極也西南鄉也其要妙在乎坤復之交循環無窮神潛於坤則知白守里神明自來坤者六爻也即六日也守靜之篤陰極陽生六爻之下復生一陽即天地七日而來復何則鉛汞從一所生一乃陰陽五行之始大衍之數五十有五數內除五以象五行又除一數以象太極即一也其餘四十有九兩儀四象以生八卦聖仙知一為鉛汞故抱一而修行用四十九日而原氣復乎一陰之下一陽萌動即地逢雷處見天根也蓋地支玄盡也至子初生復卦復其見天地之心乎易云雷在地中復先王以冬至日閉關商旅不行後不省方何謂蓋雷乃剛陽地乃柔順陽在柔陰之下復曰先天一氣得太極靜而生陰先王至此日而行道則閉關而不省方得專心致志商旅者雜泛也不行者絶其雜泛之事專行其道以求先天一氣必須歸於虛無蓋虛元氣之所生處故曰先天一氣自虛無中來要得此氣必委曲志慮以求之也虛無者非虛空全無也守靜極於虛無身居恍惚杳冥之中六脈俱停真息自住混沌大定則神明自來矣訣云若問先天一也無後天下手有工夫奈何世人染習七情業纍牽纏成後天之神非先天之妙也後天一萌則先天之心蔽矣乃修真之士垂簾塞兌窒韻調息簾者目也兌者口也閉目光緘口舌窒耳韻調鼻息閉穀道四象和合歸於虛無使心身意不動收後天之神歸於造化窟中觀之勿失與氣交合時時覺照刻刻規中念止純熟神歸金鼎玄牝立基能生真氣化生真鉛精氣神全其功方應小靜一百日中靜二百日大靜三百日先試小靜神光透於簾幃一鉤新月而卦於西南之鄉如初三日月出庚而金光初現也坎中一點熱氣上衝心以意順下貫尾閭由黃道過玉枕上泥丸遊九宮自上齶而下初則溫氣而降瀝瀝然淋水之狀香似醍醐味如甘露似目送之以意迎之入鼎暢於四肢此乃小坎離交姤方驗靜中靜照有功愈加決烈靜之又靜以至入於無何有之鄉日月停影璇璣不行杳冥混沌天根機動坤宮如震雷之聲腹中如裂帛之響膀胱如火熱兩腎似湯煎以神息沉歸海底輕輕然運沖透三關其勢如雷烈火默默然舉周流六虛滃滃然升上泥丸月窟風生眉中湧出圓光化生玉液如冰片之美如薄荷之涼降下重樓送歸土釜即二候得藥默運周天如子行陽火二百一十六得鉛八兩午退陰符一百四十四鍊汞半斤周天數足即四候別有妙用當此之時精神如夫婦歡合魂魄如子母留戀以一意守之名曰情來歸性初乃得稱還丹為大坎離交姤之妙為玉液還丹之訣循環無端周而復始運行不息今時玉液入鼎來日玉液依時復生運用如初前工不間美哉斯景也不可闡述自然而然吾莫知其所以然也功夫至此九竅如法周流愈加精進六根大定奪盡天地劫運大數方得天地七日來復靜至於恍惚沓冥之中但見月出庚方漸漸生圓懸於中天須臾捧出太陽紅光升入月中與月交會成一圓明亮紅光即真鉛真汞日月合壁之妙即使神潛虛危穴鼓動巽風方得二氣交於黃道三華混一元宮金木自然交併龍虎自然降伏忽時天地清朗四無雲翳惟見規中現一黍米這珠懸於北海之中光明烜赫運用天符火數足金液流酥形如黍米狀若水珠忽然一點落於黃庭之中乃乾刊交姤之妙衆機由此而定幻化由此而安千百萬倍之洪劫咸由一黍之萌生斯黍也厥星漸大厥色漸赫惟定之以機機由我立化由機生一機萬化信平罔象之黍珠而變有象之真質也契云金砂入五內露散若風雨蒸蒸達四肢顏色悅懌好得此金液附體十月火光不缺息息歸根綿綿不絶如雞抱卵如龍養珠念茲在茲念不可起念起則火炎意不可散意散則火冷俱使無過不及操捨得中日行二卦朝屯暮蒙故曰火候六百篇篇篇皆相似若遇有丹火發熱在眉中有一黑球真水收入鼎中其熱自退十月滿足嬰兒顯相移神出殼次第行之聖胎顯化其妙無窮矣附張三丰祖師玄要篇摘錦下手知時下手先要知時夫時者一陽時也非冬夏二至非上下兩弦非子午非朔望但有刻有時者皆非也若云無時者亦非也乃身中生藥之時便是也鉛遇癸生是也安爐立鼎安爐立鼎其旨有三一名偃月爐一名太乙爐一名玉爐又一名硃砂鼎一名懸胎鼎一名金鼎以上皆異名也我今直指身一端正便是安爐立鼎也採藥入爐採藥入爐者採自己元精元氣元神也謂之上藥入自己神室所謂採者不採之採謂之採欲有旋為非自然也聖經云收拾者是也行工進火藥歸入爐審加工進火而煉之以剛健之心而敵魔以柔和之心而守中又當審其老嫩或有五分藥合用五分火十分藥合用十分火也持盈固濟行工之時要知止足不知止足則工俱廢故曰持盈既識持盈當知固濟鉛好飛汞好走可不防之聖人云舍光默默為之固濟丹成溫養工深力到丹體圓成便住火而養火經云藥熱不須行火候若行火候必傷丹端坐定息為養火也調神去殼氣凝神備藥就胎圓結成嬰兒到此地住須要把捉而調神只待純熟方可自如經云解養嬰兒須籍母是也脫胎神化嬰兒漸長成如子離母縱橫天地遨遊八極出有入無逍遙云標尚有危險正要腳根踏著實地真與虛空粉碎方為了當也坐工口訣學仙之人但得身心間暇求於靜處間目端坐盤膝不盤膝皆可夫坐之時外忘其形而不著物內忘其心而不著事惟存於守中似存不存似守不守久久純熟自然念定則陽氣生陽氣生則有升有降其氣生者自腰至尾閭直上夾脊以藉巽風鼓而上於天谷穴二氣交合下降舌端如蜜之甜款款咽納人中宮經曰初時須著力次後卻如無總知升降不明火候之數日用工夫三關妙用沐浴玄機空延歲月到老無成古云神仙不肯分明説誤殺閻浮多少人這些道理人還識陸地神仙亂似麻所謂天機蜜訣未敢漏泄故欲口傳心授也全真活法全真道人當行全真之道所謂全真者全其本真也全真全氣全神方謂全真若有欠缺便不全也若有點汙便不真也全精可以保身欲全其精先要安定安定則無欲故精全也全氣可以養心欲全其氣先要心清淨清淨則無念故氣全也全神可以返虛欲全其神先要意誠則身心合一而返虛是故精氣神為三元之藥物身心意為三元之至要學神仙法不必多為但煉精氣神三寶為丹頭三寶會於中宮金丹成矣豈不易知豈為難行難知難行者為邪忘眩惑爾煉精之法在身身不動則虎哨而風生玄龜潛伏而元精凝矣煉氣之要在心心不動則龍起而云從朱雀斂翼而元氣息矣生神之要在乎意意不動則二物交三元混一而聖胎全矣附穴名要覽內外三寶外三寶耳目口內三寶精氣神三關上玉枕關中夾脊關下尾閭關其名有數儒名九曲明珠釋名九重鐵鼓道名九曲黃河此乃化氣上鼎之正路三丹田上泥丸宮中黃庭下水晶宮若臍下一寸三分乃下丹田也一寸五分為氣海即混元海也頭頂為須彌天根眼為青女口為丹池溢候管氣為重樓為玄膺心竅為降宮臍孔為生門腰眼為密戶脊骨二十四節為銀河又為上鵲橋下鵲橋膻中在兩乳之中二寸一分中脘在鳩尾之下二寸神闕在臍內中央糞門為穀道前有玉爐穴我命為外腎腎柄為靈根三里在足之後廉湧泉穴在足心服食篇引昔人欲以服食為仙即有之猶可遇而不可為也即可為而第可於深山窮谷要荒殊絶之地始於不得已終於異獲者以為之而不可以居常日用嘗試遽為之也夫不有日用之道即有日用之為不離飲食之常而窮至道之妙盜大地之萃精發妙以衛吾之生去吾之患長吾之年如今昔高人所倫者哉郗倫有言欲服食當尋情理所宜審冷暖之適不可見彼得力我便服之初御草木次石流謂精粗相代階粗以至精者也夫人從少至長體習五穀卒不可一朝頓遺之凡服藥物為益遲微則無充飢之驗然積年不已方能骨髓填實五穀自斷今人望朝夕之效求目下之應腑臟未充便以絶粒穀氣始除藥未有用又將御女形神與俗無別以此致弊胡不怪哉故服餌皆有次第不知其術者非止有損卒不得力其大法必先去三蟲三蟲既去次服草藥好得藥力次服木藥好得力訖次服石藥依此次第乃得遂其藥性庶事安穩可以延齡矣斯言也庶幾匪幻與乃以愚聞廣其所集為服食之篇新鐫五福萬壽丹書服食篇三福服食去三蟲方生地黃汁三斗東向灶葦火煎三沸內清漆二升以荊匕攪之日移一尺內真丹三兩復移一尺內瓜子末三升復移一尺內大黃末三兩微火勿令焦候可丸如梧子大先食服一丸日三濁血下鼻中三十日諸蟲皆下五十日百病愈面色有光澤天門冬膏用天門冬揀去枯壤者十五斤以溫水潤透去皮心曬乾用淨肉十斤搗爛每斤用水五碗共五十碗入銅鍋慢火煮乾三分之二用布絞出汁其渣再搗爛用水三十碗再熬約減大半又以布絞汁令淨去渣不用將前後二汁合一處文武火熬至滴水不散似稀糊樣取起至冷水中出火毒三日以磁瓶收貯封固每日空心午間下晚挑膏半盞以滾白水調開服之冬月用酒煮有痰用淡薑湯調上焦熱而有痰食後多服一次下焦熱小便赤澀空心多服一次果妙能滋陰降火清肺補腎充旺元陽酒色之人最宜常服極好昔有王子單服此膏連生三十二子壽年百歲行步輕健耳目聰明服地黃生地黃五十斤熟搗絞取汁澄去滓微火上煎減過半內白蜜五斤棗脂一斤攪令相得可丸乃止每服如雞子一枚日三令人肥白又方地典十斤細切以醇酒二斗漬三宿出曝乾反覆內漬取酒盡止加甘草巴戟天厚朴乾漆覆盆子各一斤搗下篩食後酒服方寸匕日三加至二匕使人老者還少強力無病延年服黃精方凡採黃精須去苗下節以竹刀去皮服一節隔二日增一節十日服四節二十日服八節空腹服之服訖不得漱口忌食酒肉五辛酥油等最忌鹽咸物止粳米糜粥淡食服時仰臥勿坐坐食即入頭令人頭痛服訖經一食頃乃起即無所畏服黃精膏黃精一石去鬚毛洗令淨潔打碎蒸令熟壓得汁復煎去遊水得一斗內乾薑末三兩桂心末一兩微火煎看色鬱郁然欲黃便去火待冷盛不津器中酒五合和勻服二合食前日三服色變光華鬢髮更改欲長服者不須和酒內生大豆黃絶穀食之不飢渴長生不老服烏麻取黑皮真檀色者烏麻隨多少水拌令潤勿過濕蒸令氣偏即出曝乾如此九蒸九搗去上皮末食前和水若酒服二方寸匕日三漸漸不飢絶谷久服百病不生常服延年不老餌柏實柏子二三升搗令細淳酒四升漬攪如泥下白蜜二升棗膏三升搗令可丸入乾地黃末白木末各一升攪和丸如梧子每服三十丸日二服二十日萬病皆愈餌海松子七月七日採松子過時即落不可治服方寸匕日三四一云一服三合百日身輕二百日行五百里絶谷服成仙渴飲水亦可和脂服之若丸如梧桐子大服十丸彭祖服松脂方松脂灰汁煮三十遍漿水煮三十遍清水煮六十遍茯苓灰汁煮十遍漿水煮十遍清水煮十遍生天門冬各五斤去心皮暴乾搗作末牛酥蠟白蜜三斤煎令洙盡上六味各搗篩以銅器重湯上先內酥次蠟次蜜消訖內藥急攪勿住手務令火勻內瓷器中密封勿令泄氣先一日不食欲不食先須吃好美食令極飽然後絶食即服二兩二十日後服四兩又二十日後服八兩細丸之以咽中下為度第二度以四兩為初二十日後服八兩二十日四兩第三度服以八兩為初二十日二兩二十日四兩合一百八十日藥成自後服三丸將補不服亦得恆以酥蜜消息之美酒服一升為佳合藥須取四時王相日特忌刑殺厭及四激休廢等日凶服茯苓酥取山陽茯苓其味甘美山陰者味苦惡揀得之勿去皮去皮力簿切炮干令氣溜以湯淋之其色赤味苦淋之不已候汁味甜便止暴搗篩得茯苓三斗取好酒大斗一石蜜一斗和茯苓末相得內一石五斗甕熟攪之百遍密封之勿令泄氣冬月五十日夏月二十一月酥浮於酒上接取酥其味甘美如甘露可作餅大如手掌空屋中陰乾其色赤如棗飢食一餅終日不飢更愈萬病久服延年服杏仁法杏仁一斤去尖皮及兩仁者熬令色黃末之茯苓一斤末之人參五兩末之酥二斤蜜一斤半上五味內銅器中微炎煎先下蜜次下杏仁次下酥次下茯苓次下人參調令勻和又內於磁器中空肚服之一合稍稍加之以利為度日再服忌魚肉主損心吐血虛熱心風健忘不思食食則嘔吐身心戰掉痿黃瘦弱服補藥入腹嘔吐服余藥還吐至死得此方服一劑即差第二劑色即如初服杏仁酥取家杏仁其味甘香忌用山杏仁大毒害人也杏仁一石去尖皮兩仁者揀完全者若微有缺壞一顆不得用微火搗作細末取清酒兩石研杏仁取汁一石五斗以蜜一斗拌杏仁汁煎極令濃與乳相似內兩石甕中攪之密封泥勿令泄氣與上茯苓酥同法三十日看之酒上出酥接取酥內磁器中封之取酥下酒別封之團其藥如梨大置空房中作閣安之皆如飴鋪狀甚美服之令人斷谷更主萬病除諸風虛勞服蓮肉粥用蓮子肉三兩去皮心淨糖米三合和勻作二次煮粥空心常食能補脾胃養心腎服芡實子粥用雞頭實不拘多少取粉三合粳米三合照常煮粥空心常服能益精強腎聰耳明目服薏苡仁粥用薏苡仁四兩粳米三合照常煮粥不拘時食能補脾胃疏風濕壯筋骨服楂梨膏用鮮肥山楂十斤去核甜梨十斤去核共搗取自然汁入鍋煎熬如汁十斤入蜜四兩共熬成膏服桂花餅桂花一兩兒茶五錢訶子七個甘草五分上挫末桂花水為餅每嚼一丸滾水下清痰降火止嗽生津服梅酥餅南薄荷葉三兩紫蘇葉五錢白粉葛一兩白沙糖八兩烏梅肉一兩五錢另研末上為細末入片腦一分半研細施入同研勻和煉蜜和成劑略帶硬些丸如櫻桃大每一丸噙化能清上焦潤咽膈生津液化痰降火止咳嗽服法制人參膏人參清河大而堅者四兩白檀香二錢白豆蔻末一錢半片腦三分研上甘草膏同煎為衣能補元氣生津液輕身延年服菖蒲酒用五月五日六月六日七月七日取菖蒲不拘多少搗爛絞取清汁五斗糯米五斗蒸熟入細酒麴五斤南方只用三斤搗碎攔勻如造酒法下缸密蓋三七日榨起新壇盛泥封固每次溫服二三杯極妙老人常服通血脈調榮衛聰耳明目壯旺氣力益壽延年服枸杞酒枸杞根一百二十斤切以東流水四石煮一日一夜取清汁一石清曲一如家醞法孰取清貯不津器中內乾地黃末二升半桂心乾薑澤瀉蜀椒末各一升商陸末二升以絹袋貯內酒底緊塞口埋入地三尺堅覆土三七日沐浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半升十日萬病皆愈惡疾人以水一升和酒半升分五服愈服法制枸杞子方甘枸杞子紅者兩半檀香末五錢白豆蔻四錢片腦一錢另研上用甘草膏甘枸杞三味末為衣任意取用能補諸虛滋腎水延年益壽服五加皮酒好酒一金華壇煮滾入五加皮一斤不時飲微醺最勝濕益人其葉三花是雄五葉花是雌陰人使陰陰人使陽按五加之名據義甚大蓋天有五車星之精也青精人莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之飴黃煙入皮則有戊巳之靈五神鎮主相轉育成服一年者貌如童稚三年者可作神仙服菊花酒方家菊花五斤淮生地黃五斤地骨皮五斤三味搗碎一處用水一石煮取淨汁五斗炊飯細面曲五斤拌令勻入甕內密封三七日候熟澄清去渣另用小瓶盛貯不拘時服常飲二三杯能令老人心清目明疏風養血又服菊丸三月上寅日採苗六月上寅日採葉九月上寅日採花十二月上寅日採根並蔭干各等分稱勻擇成日製之搗千杵為末用蜜煉熟豆大丸成酒服七丸一日三服百日身輕潤澤一年發白變烏二年齒落更生三年貌如童子至賤之草而有至大之功服紫蘇子酒方用紫蘇子三升炒香研細清酒三斗壇貯將蘇子納入酒中密封浸一七濾去渣每日隨飲三五杯調中益臟下氣補虛潤心肺利痰氣服固本酒人參一兩甘州枸杞子一兩天門冬去心一兩上好燒酒十二斤浸春秋半月夏七冬二十一日密封固瓶口待浸日完取出絞去渣每日空心飯遠各飲二盞其渣再用白酒十斤煮熟去渣每日隨意用之神仙大補酒人參天門冬去心白茯苓大茴香白朮當歸麥門冬生地黃熟地黃川芎黃耆地骨皮五加皮肉蓯蓉甘草官桂川椒去目蒼朮米泔水浸去皮川烏火炮去皮各二兩上為粗末再取肉棗二斤煮去皮核胡桃仁二斤麩炒去皮蜂蜜六斤煉過用糯米好酒三十大壺以大磁壇一個俱裝在內用筍殼封固重湯鍋內以桑柴文武火一晝夜取出冷定用酒袋壓之以小磁瓶收貯每日空心臨臥飲一二酒杯能治男婦五勞七傷諸虛百損左癱右瘓遍身疼痛麻痹不仁口眼歪斜語言蹇澀咳嗽喘急身瘦如柴口吐膿血命將危困服至一月覺身輕體健壯陽明目久服百病消除牙齒堅牢纍有寄效合藥勿令婦人雞犬見取天月德日為之三仙延壽酒好上等堆花燒酒一罈入龍眼去殼一斤桂花四兩白糖八兩封固經年愈久愈佳其味清美香甜每隨量飲不可過醉能安神定智寧心悅顏香口卻疾延年延齡聚寶酒何首烏四兩去皮赤白淨為雌雄生地黃八兩酒洗用鮮肥嫩者佳甘草一兩如粉者炙去皮天門冬二兩去心蓮花蕊四兩麥門冬二兩去心石菖蒲二兩一寸九節者佳槐角子四兩炒黃色十月十一日採天麻二兩如牛角尖者佳干菊花頭花四兩桑格子四兩取紫者方熟蒼耳子二兩炒搗去刺五加皮真者三兩當歸二兩鮮嫩者或切去頭尾肉蓯蓉二兩黃酒洗去鱗鹽炙甘枸杞二兩去蒂蒼朮茅山者佳米汁浸不犯鐵去皮二兩防風去蘆二兩白朮二兩極白者可用汕黃細小者不用北細辛二兩洗淨沙苑蒺藜川牛膝各二兩用肥者去蘆人參去蘆杜仲薑汁浸一宿炒斷絲黃精各二兩鮮者白茯苓四兩鮮嫩者去黑皮熟地鮮肥者用八兩酒蒸上二十七味味味照方擇淨稱定分兩務要真正藥材切為咀片裝入生絹袋內用無灰好酒潔淨磁壇約盛九斗酒者將藥裝入壇內春浸十日夏秋七日冬浸十四日取內藥袋控干聽用將藥酒每日五更服三小鐘還臥片時午間服三鍾晚睡服三鍾但覺腹空再服一鍾尤妙酒後忌生冷蔥韭蒜魚腥之物少食帷有白蘿蔔當忌凡無益之事少行常要誠心致意服者自有功效若服一日歇兩三日不依法者效之鮮矣坐夜間還服一二次自三十九歲服起今經六十四歲矣身中鬚髮耳目並齒精神俱備比常自然不同生敬此方如愛珍寶不可傳與愚者或不信也服豬肚羹肥豬肚一具洗如食法人參五兩椒一兩乾薑一兩半粳米半升煮蔥白七兩細切上六味下篩合和相得內豬肚中縫合勿泄氣以水一斗半微火煎令爛熟空腹食之兼少與飯一頓令盡可服四五劑極良能補虛乏氣力脾胃不足一方單用童便煮豬肚常吃勝似服藥服豬腰粥豬腰子二對約八兩蔥白四莖去須切碎人參五分防風五分粳米八合薤白少許和米煮粥入鹽空心食之能補耳聾及補腎臟氣憊服牛乳方牛乳三升蓽撥半兩末之綿裹二味銅器中取三升水和乳合煎取三升空腹頓服之日一二匕補虛除一切氣慎面豬魚雞蒜生冷張淡云波斯國及大秦其重此法取牛乳方用乾地黃黃耆杜仲各三兩甘草茯苓各五兩人參二兩蓯蓉薯蕷各六兩麥門冬四兩去心石斜二兩十味搗篩為散以水五升先煮粟七升為粥內散攪令勻和少冷水牛渴飲之令足不足更飲水日一余時悉渴可飲清水平旦取牛乳服之生熟任意牛須三歲以上七歲以下純黃色者為上余色者為下其乳常令犢子飲者其乳動氣不堪服之其乳牛淨潔養之洗刷飲飼須如法用心看之慎蒜豬肉魚生冷陳臭等物本草論曰牛乳性平補血脈益心長肌肉令人身體康強潤澤面目光悅志氣不衰故為人子者須供之以為常食一日勿闕常使恣意充足為度也此物勝肉遠矣服牛髓方用熟牛胻骨內髓四兩核桃仁去皮二兩和擂成膏少入鹽空心食能補腎消痰常服牛髓方人參二兩淨當歸四兩淨山藥四兩淨核桃肉四兩淨北杏仁去皮尖四兩水牛脊髓四兩去紅筋膜家蜜一斤四兩先將杏仁搗三四百下入核桃肉又搗三四百下將參歸山藥三味入內又搗三四百下然後以牛髓入藥內又搗三四百下方以手擦試無渣然後將蜜煉滾數次至清時傾入前藥內共搗三四百下將藥入新瓦罐內以綿紙竹葉封固入鍋內注水半鍋以物四圍置之恐傾倒也罐口上以糯米放竹葉上待米成飯然後取出放罐在高處三日後每早茶匙挑二三匙調酒服甚妙服羊頭蹄方白羊頭蹄一具以草火燒令黃赤以淨綿急塞鼻胡椒蓽撥乾薑各一兩蔥白切一升香豉二升六味先以水煮羊頭蹄骨半熟內藥更煮令大爛去骨空腹適性食之日食一具滿七具止補五勞七傷虛損服豬肪羊肝取不中水豬肪一大升內蔥白一莖煎令蔥黃止候冷暖如人體大虛贏困平旦服之令盡暖蓋覆臥至日晡後乃食白粥稠糜過三日後用羊肝一具細切羊脊骨𦟘肉一條細切曲末半升枸杞根十斤切以水三大斗煮取一大斗去滓四味合和下蔥白豉汁調如羹法煎之如稠糖空腹飽食之三服慎食如上服羊肉粥羊肉二斤人參一兩黃耆一兩白茯苓一兩大棗肉五枚糯米三合先將羊肉去脂皮取精肉四兩細切豆大餘一斤十一兩並藥四味用水五大碗煎取汁三碗絞去渣入米煮粥再下前切細生羊肉同煮熟入五味調和空心食之能補虛損贏瘦助元陽壯筋骨服羊脊髓粥用大羊脊髓一條透肥者搗碎用青梁米四合淘淨以水五升煮取汁二升下米煮作粥入五味和勻空心食之常用極有補益老人常食能補脾胃氣弱勞損不下食者服羊五臟方羊肝肚腎心肺一具以熱湯洗肚余細切之犁牛酥胡椒蓽撥各一兩豉心半升蔥白二握去心切六味合和以水六升緩火煎取三升去滓和羊肝等並汁皆內羊肚中以繩系肚口更別用一絹袋稍小於羊肚盛肚煮之若熟乘熱出以刀子並絹袋刺作孔瀝取汁空腹頓服令盡余任意分食若無羊五臟羊骨亦可用之善補虛勞又以水一大石微火煎取三斗依食任意作羹粥麵食之服班體此方不拘初生但馴養牡者一二隻按日煎人參一兩湯飲渣和草料飼之按用預夜乙食次早空心以布縛鹿於床首低尾昂用三稜針刺眼大眥前毛孔名天池穴銀管三寸許插向鼻梁吮其血和以藥酒任意或八珍散加沉香木香煮食儘量月可以度鹿無恙若有屠家刺鹿血乘熱和酒一醉亦妙服耆婆湯方酥煉白蜜煉各一斤生薑切椒汗各一合酒二升薤白三握炙令黃油胡麻仁豉糖各一斤橙葉一握炙令黃十一味先以酒內糖蜜油酥於銅鍋中煮令勻沸次內薤薑煮令熟次下椒橙葉胡麻煮沸下二升豉汁又一沸出內瓷器中密封空腹吞一合如人行下里更一服冷者加椒能補大虛冷風贏弱無顏色服密餌方白蜜二升臘月豬肪脂一斤胡麻油半斤乾地黃末一升四味合和以銅器重釜煎令可丸服如梧子三九日服三稍加以知為度久服肥充益壽補虛贏乏氣力服油柑方生胡麻油浙粳米泔清各一升二味以微火煎盡泔清乃止出貯之取三合鹽汁七合先以鹽汁和油令相得溲麵一升如常法作餺托煮五六沸出置冷水中更漉盤上冷乃更一葉擲沸湯中煮取如常法十度煮之面熱乃盡以油作臛澆之任飽食大補虛勞不食肉油麵之人用之甚妙服烏麻脂方烏麻油一升薤白三升二味微火煎薤白令黃去滓酒服一合百日充肥二百日老者更少三百日諸病悉愈且冬服耐寒夏服耐暑不食暈用妙餌雲母水方上白雲母二十斤薄擘以露水八斗作湯分半洮洗雲母如此再過又取二斗作湯內芒哨十斤以雲母木器中漬之二十日出絹袋盛懸屋上勿使見風日令燥以水漬鹿皮為囊揉挺之從旦至日中乃以細絹下篩滓復揉挺令得好粉五斗余棄之取粉一斗內崖蜜二斤攪令如粥內生筒中薄削之漆固口埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當如漆為成若洞洞不消者更埋三十日出之先取水一合內藥一合攪和盡服之日三水寒溫儘自在服十日小便當變黃此先療勞氣風疹也二十日腹中寒澼消三十日齲齒除更新生四十日不畏風寒五十日諸病皆愈顏色日少吾已驗之所以述録辟穀四仙方大豆五升洗淨蒸三遍去皮為細末大麻子五升湯浸一宿漉出蒸三遍令口開去皮為細末用糯米五升淘淨白茯苓五兩去皮同上糯米一處蒸熟為用將麻仁末一處搗爛如泥漸入豆黃末同和勻使用如拳大再入甑蒸從初更著火至半後夜住火至寅時出甑午時曝乾搗為末服之以飽為度不得吃一切物用麻子汁下頭頓一月飢第二頓四十日不飢第三頓一千日不飢第四頓永不飢顏睬日增氣力加倍如渴飲麻仁汁轉更不渴滋潤五臟若待吃食時分用葵菜子三合為末煎湯放冷服之取其藥如後初間吃三五日白米稀粥湯少少吃之三日後諸般食飲無避忌此藥欲事辟穀茯苓餅白茯苓四兩為末頭白麵一二兩同調水煎餅面稀調以黃臘代油餺成煎餅臘可用三兩飽食一頓便絶食至三日覺難受三日後氣力漸生熟果芝麻湯米飲涼水微用些少潤腸胃無令涸竭開食時用葵菜湯並米飲稀粥少少服之防儉餅栗子紅棗胡桃柿餅四果去核皮於碓內一處搗爛揉勻捻作厚餅曬乾服之以防荒儉之用余見一僧化緣但有所得即置此四果搗爛印於磚瑰紙包曬乾收疊匱內一兩月曬一次積久至多砌作一牆人莫能知後遇飢荒人皆逃竄而僧獨留於寺中食此豫嘗勸一富翁制此成牆以防飢饉行以賑濟飢人此莫大之陰功也觀音辟穀丹嫩松香一斤要擇嫩乳軟黏手者佳野菊花蕊方收萼未開名金彈子曬乾為末以菊花拌松香不黏手為度如黏手再加菊花末同杵千餘下為丸如彈子大每服一丸吃涼水三口可一日不飢如要解吃胡桃二個即解大黃耆丸黃耆柏子仁白朮天門冬遠志去心薯蕷乾地黃澤瀉麥門冬人參甘草炙薏苡仁石斛五味子牛膝防風肉蓯蓉茯苓枸杞子茯神乾薑車前子丹參山茱萸阿膠炙狗脊兔絲子蓽撥覆盆子杜仲巴戟天上三十一味各一兩搗篩煉蜜丸酒服十丸日二稍加至四十丸性冷者加乾薑桂心細辛各二兩去車前子麥門冬澤瀉多忘者加遠志菖蒲各二兩患風者加獨活防風芎勞各二兩老人加牛膝杜仲蓽撥狗脊石斛鹿茸白馬莖各二兩無問長幼常服勿絶百日以內慎生冷酢滑豬雞魚蒜油膩陳宿郁浥百日後惟慎豬魚蒜生菜冷食五十以上雖暑月三伏時亦忌飲水依此法可終身常得藥力藥有三十一味合時或少一兩味亦得宜服之能治虛勞百病屢試得效太極丸凡人五臟配天五行一有不和則為疾藥有五味各主五臟可使調和故曰太極胡桃仁屬木主潤血氣凡血屬陰陰惡濕故油以潤之佐故紙有水火相生之妙方書去黃柏無知母破故紙無胡桃仁如水母之無蝦也去黃皮三兩二錢研如漿無渣入諸藥內用廣砂仁屬土主醒脾開胃引諸藥歸宿丹田味香而能竄如五臟沖和之氣如天地以土為沖氣也去殼先將五錢花椒一兩拌炒香去椒不用又用五錢不炒共為淨末一兩肥知母屬金主清潤肺金若以降火佐黃柏為金水相生之理酒浸去皮焙乾二兩四錢川黃柏屬水主滋腎水苦以堅精將皮剝去用鹽酒浸之三日焙如褐色三兩六錢破故紙屬火主收斂神氣能使心胞絡之火與命門相通助元陽堅骨髓充實澀以治脫也酒洗新瓦焙香為淨末二兩八錢上五味各制如法足數和勻煉蜜丸如桐子大每朝夕用自湯或茶酒任意送下八制茯苓丸白茯苓用雲母結實者佳去皮二斤半打碎如棗大分作八分聽後製法箭黃耆蜜炙六兩切片用水六鍾煎至三鍾去渣同茯苓一分煮乾為度甘枸杞去蒂用水六鍾煎至三種去渣同煮茯以干為度破故低用鹽酒炒香研細六錢以水八鍾煎至三鍾同煮茯苓一分以干為度何道烏半斤切片黑豆一升煮水五碗浸首烏三日將汁同煮茯苓一分以干為度好人參六錢用水五鍾將參切片煎至三鍾去渣同煮茯苓一分以干為度真秋石四兩用水三鍾化開同煮茯苓一分以干為度人乳半斤同煮茯苓一分以干為度肉蓯蓉酒洗去鱗甲四兩切片用水六鍾去渣同茯苓一分煮乾為度上將制過茯苓總入石臼內搗為細粉上甑蒸熟衆手為丸如桐子大每服四十丸種子者空心淡鹽湯下烏須明目者白滾湯下忌燒酒犬肉凡修合須用平定開成生氣續世黃道吉日先一日午時將諸藥煎制煮茯苓搗末待次日子時完成微火烘乾不見風日忌孝服婦人雞犬並四廢六不成日慎之慎之能治虛損生心血烏髮須明目固精女人滋顏色暖子宮調經益氣長春廣嗣丹人參去蘆赤石脂另研天門冬去心白茯苓去皮石菖蒲九節者佳車前子當歸酒洗覆盆子去梗柏子仁炒澤瀉去毛五味子巴戟天去心木香各一兩山茱萸去核地骨皮山藥薑炒川椒炒去目淮生地淮熟地川牛膝去蘆酒洗曬乾杜仲薑汁炒各二兩遠志去蘆甘草湯泡去心肉蓯蓉酒洗去鱗甲曬乾枸杞子各二兩菟絲子酒洗蒸透搗餅四兩上二十五味各為細末煉蜜為丸如梧桐子大每服五十丸漸加至七八十丸空心鹽湯或酒送下服十日後小便雜色是舊疾出也又十日鼻酸聲雄胸中痛咳嗽吐痰是肺病出也一月後一應七情滯氣沉痼冷積皆出百日容顏光彩鬚髮變黑齒頰重固既老而康目視數里精神百倍壽命延長種子之功百發百中偶得此方最有奇念專治男子勞損贏瘦中年陽事不舉精神短少未至五旬鬚髮早白步履艱難婦人下元虛冷久不孕者補腎種子黑髮烏須奇方淮熟地八兩山茱萸酒浸去核淨巨勝子韭子微炒存性冬青子旱蓮膏熬法在後菟絲子去沙土淨酒侵煮三日夜令透熱搗為薄片曬乾沙苑蒺藜如羊腎樣者覆盆子去蒂東流水浸一宿淨干各四兩白茯苓去皮枸杞子甘州者去蒂柏子仁五加皮當歸各三兩人參一兩楮實子淨去皮好酒浸浮者不用止三兩肉桂用一兩何首烏六兩如干者米泔水浸竹刀削去皮黑豆拌蒸鮮者止用六兩一個升麻五錢續斷蓮蕊各二兩上藥俱忌鐵器共為末煉蜜為丸如梧桐子大每服六七十丸或百丸空心鹽湯或溫酒送下能體肥身健固精旺氣熬旱蓮膏法取旱蓮草不拘多少或百十斤搗汁用砂鍋熬成沙糖樣磁碟盛曬乾二仙十八宿延年益壽神丹大何首烏用紅白種忌銅鐵器用米泔浸之二宿竹刀刮去粗皮切成顆粒取五斤淨用黑豆一斗揀淨以水泡漲同首烏入甑內層鋪層間砂鍋內蒸二炷香取起日曬夜露又曬又蒸共七次去黑豆不用又用黑牛頭蹄一付搗碎同首烏入甑蒸三炷香取出去牛頭蹄不用俟牛膝巨勝子同蒸即與仙茅白龍鬚牛膝巨勝子曬乾入石臼內搗作細末聽用仙茅川中俱有惟成州者佳敘州群即古戎州也又以翠屏山者尤佳八月採之採時忌聲易得去蘆葉及附根淨洗忌銅鐵器用竹刀削去粗皮槐木砧上切成顆粒用糯米汁水浸一宿將棍子攪動去涎毒又換豆湯浸一宿撈起曬乾用好酒拌濕入甑中用砂鍋內蒸從已至亥以香熟味如地黃方妙取起曬乾又用酒拌蒸如此十次用三斤白龍鬚洗淨曬乾一斤川牛膝去蘆洗淨取二斤半淨同首烏入甑蒸三炷香取出日曬夜露擇出牛膝另取巨勝子三斤去灰土同首烏入甑蒸三炷香取出日曬夜露擇出巨勝子另收聽用白茯苓去皮為末用長流水浸三日去筋膜及浮水面者取沉底白粉三斤曬乾用粳米二斤泡一宿同入甑蒸三炷香取出曬乾去米不用甘枸杞去梗取斤半淨者入人乳浸一宿撈出曬乾聽用生地黃一斤四兩淨用酒浸一宿曬乾聽用熟地黃一斤四兩自己取生地黃用好酒浸拌濕九蒸九曬者方佳勿犯鐵器秦當歸一斤半淨用酒浸一宿曬乾聽用破故紙六兩酒洗炒香聽用人參用上好者一斤水浸一宿曬乾用五加皮去骨一斤酒洗曬乾聽用杜仲去粗皮半斤淨用薑汁炒去絲聽用虎骨十兩淨用酥炙脆聽用瑣陽洗淨用酥炙脆聽用鹿茸四兩去毛用酥炙聽用天門冬去心取一斤四兩淨蜜水浸一宿撈起曬乾聽用菟絲子去土半斤淨用酒煮如膏搗爛焙乾取淨肉四面兩聽用肉蓯蓉用酒洗去鱗刮開去內白膜曬乾取淨肉四兩聽用以上諸藥各為極細末同前何首烏等末合而為一和勻煉蜜和成膏每日清晨用百沸湯調醇酒調二匙磁碗內蓋定少頃啓開面東服之能治急慢驚風口禁全不能言口眼喎斜手足癱瘓筋脈拘攣頭目眩暈半身不遂遍體麻木胸膈煩悶神思恍惚三十六種風補元陽壯元氣發白返黑齒落更生益壽延年種子保娠返老帶童服之三年效不可言服之終身乃成地仙煉蜜法上好白蜜二十斤入砂鍋內或銀鍋內炭火熬滴水成珠方入於藥內以松柏枝不住手攪俟勻待微冷用磁壇內收貯封口勿令泄氣延年益壽不老丹何首烏赤白各一斤竹刀刮去粗皮米泔水浸一宿用黑豆三升水泡漲每豆一層重重鋪畢用砂鍋竹甑蒸以豆熟取首烏曬乾又如法蒸曬九次聽用赤茯苓一斤用竹刀刮去粗皮為末用盤盛水將末傾入水內其筋膜浮在水面者不用沉水底者留用濕團為塊用黑牛乳五碗放砂鍋內慢火煮之候乳盡茯苓為度仍碾為末聽用白茯苓一斤製法同赤茯苓亦濕團為塊用人乳五碗放砂鍋內照前赤茯苓仍碾為末用淮山藥薑汁炒為末淨四兩川牛膝去蘆酒浸一宿曬乾為末淨八兩聽用菟絲子去沙土淨酒浸生芽搗為餅曬乾為末淨八兩甘枸杞去梗曬乾為末淨八兩杜仲去皮薑汁炒斷絲為末淨八兩破故紙用黑芝麻同炒熟去麻不用將破故紙碾為末淨四兩上藥稱足和勻煉蜜為丸梧桐子大每服七十丸空心鹽湯或酒下忌黃白蘿蔔牛肉鐵器能烏須黑髮延年益壽填精補髓陰虛陽弱無子者服至半年即有子神效任太史祕傳延壽方鹿角霜一斤覆盆子日乾半斤菟絲子半斤余甘子去核淨肉日乾二兩此味出建昌山谷中七八月熟俱為末取鹿角膠半斤用無灰好酒化開入前藥攪勻和為丸如梧桐子大每早空心酒下五十丸取鹿角膠法用鹿角不拘多少截做一二寸長於長流水內泡洗七日夜盡去塵垢取一大磁壇用豬毛泥固外曬乾將角入內以桑白皮鋪底蓋面每十斤用黃蠟四兩好酒四大壺同裝壇內仍用水淹口以桑柴文武火煮三晝夜徐徐添熱水第三日取出角曬乾為末即霜也將煮角之水慢火熬成稀膠收磁器內陰乾即膠也益壽延年不老丹生地黃三兩熟地黃三兩俱淨用酒浸一宿曬乾天門冬三兩麥門冬三兩俱用酒浸三時取出去心曬乾白茯苓五兩去粗皮切作片酒洗曬乾地骨皮三兩洗淨曬乾好人參五兩何首烏半斤鮮者用竹刀刮去皮切片乾者用米泔水浸軟刮去皮切片砂鍋內下用烏羊肉一斤黑豆三合量著水用上加篦放此藥復覆蓋蒸兩個時辰取出曬乾上共為細末煉蜜為丸如梧子大每服三五十丸用酒送下清晨服之此藥千益百補服半月一月自覺健旺不同常服功效不可勝言得此方者不可以藥易而輕忽實呂祖之仙梯也少陽丹又名四味龍芽虛名一百三味一名烏嘉龍芽凡有四採春苗夏花秋子冬皮是枸杞合用一斤為末一名天瑣龍芽是蒼木揀淨用一斤米泔換浸一宿為末一名錦繡龍芽是桑椹用紫熟的一斤製為汁合前藥一名百花龍芽是蜂蜜一斤乃一百三味也上前藥石臼內搗為細末用新磁盆將椹子汁同藥末一處調勻用細絹蒙蓋盆口放在月臺淨處積受日精月華之氣煎乾復為末煉蜜為丸如梧子大每服三十丸漸漸至五十丸空心用鹽湯或酒送下日進一服服一年返老還童耳目聰明頭白返黑服二年冬暖夏涼諸病不生服三年齒落更生健步輕身祕之祕之昔日一人雙目不見服此一年即明又海州二木匠患瘋疾得此即愈老龍丸即固精還元丹老薑半斤膠棗半斤去皮核陳皮二兩去白大甘草二兩去皮公丁香沉香俱要好者白鹽各二錢五分七味為末均搗飯甑上蒸七次用瓦器收陸續為丸大者三分一粒小者一分一粒日夜可含每日止用三分四季可服服久三日一蒸可也黑髮烏須方黑豆五升揀去扁破用一大砂鍋將烏骨老母雞一隻煮湯二大碗無灰老酒二大碗何首烏四兩鮮者用竹刀削碎陳者用木槌打碎陳米四兩旱蓮草四兩桑椹三兩生地黃四兩歸身四兩破故紙二兩俱為咬咀拌豆以酒湯為水砂鍋大作一料砂鍋小作二料用文火煮豆以干為度去藥存豆取出晾去熱氣以磁罐盛之空心用淡鹽湯食豆一小合以其曾用雞湯煮過早晚宜慎於蓋藏以防蜈蚣也食完再製但自此永不可食蘿蔔服至半載鬚髮從內黑出目明如少且又能鏖戰極妙神妙烏須方用麻油煙五錢核桃脯一兩麝香一分共為末大小竹筒盛埋冬青樹下七日化成水將水拈鬚上即黑烏須固齒散白茯苓大當歸北細辛青鹽各四兩何首烏五兩小川芎甘枸杞沒石子荊芥穗各二兩半上俱研為細末再用極陳老米一升久煮待成濃飲取起將前藥末盡皆入內和勻作一餅團以新瓦罐盛鹽泥固封口外用濕泥復封投火煅煉煙盡為度隨入缸內悶息取出貯在潮地上片時取出研成極細嫩末以鉛盒盛藏每日清晨及臨睡以百沸湯待溫擦淨牙齒再蘸藥末擦牙上下其藥水不可漱去少停一二刻吞下更隨隨吐出些抹須鬢上日久須黑齒固妙不可言但要忌三白亦不可間斷烏須黑髮神仙梳用黑鉛半斤打一匣如腰子樣又用黑鉛造成梳子一個磨刮乾淨又用櫸柳葉二兩旱蓮草五兩何首烏一兩五倍子一兩明礬一錢烏豆半升干蝌蚪一兩用新砂鍋一口將前藥入內以六七碗水煮三炷香為度如三炷香之前若干則再加水煮以水熬成膏子入鉛匣內再加水銀一錢制過五倍子末一錢制過桐末一錢以鉛梳入內藏浸六七日後用梳梳其發須三七可管一年換須妨白方旱蓮花沒石子活豬鬃頭上者佳各等分先將沒石子入銅銚內炒黑次將余藥逐樣炒黑存性勿至成炭然後以柳枝汁生薑汁磨母丁香者勻訖研為細末將絹篩一起又將粗者研細再篩極要嫩用時以薑汁磨前藥先以白鬚者將藥水點記在何處一點下即以藥點其孔眼覺有藥入孔眼內方好須摘一根即點一根恐遲孔眼復閉藥不能入用點藥者須眼光人藥果入則後生出須必黑屢驗奇方長髮方凡男婦小兒頭上有疤或不生髮者用驢油生薑汁二味先搽薑汁復搽熱驢油次第搽之其發自生又方用大附子一個一兩重者為末再用烏骨黑肥雞一隻煉取其油攪藥末搽上即生生眉方用芥菜子半夏二味為末以生薑自然汁調搽數日生眉黑色打陽起石法揀選真正好陽起石打碎用好燒酒浸一宿撈起每兩樟腦二錢同研一處入固濟陽城罐內上用燈盞封口牢密八百眼爐上用水注盞先文後武打火二炷香冷定取開升盞上者可用沉重在底者勿用打靈砂法用青金或一斤或二斤入固濟罐中量有半罐上用鐵燈盞坐口存一孔如箸大出煙先用文火漸至武火盞內著水煉一日住火次日取開靈砂盡結燈盞之下一餅明如硃砂是為靈砂制真汞丹法陰水爐養白硃砂天下燒丹第一家惟有真鉛製真汞煉成白雪長黃芽五金八石皆非影萬草千霜卻是差誰知神仙真口訣無根樹下羡金花取潔淨婦人乳一二碗入小銀罐內赤石脂固封將錫壺盛水半壺以銀罐懸壺中用水一鍋頓錫壺在內煮五炷香為度鍋中水乾壺內亦干而乳已成丹隨出丹為末用九節石菖蒲二兩熟地黃二兩焙乾薑汁煮過研爛和前藥用蜜為丸如粟米大每服三十丸清湯送下採補篇引余弱時嘗戲為十狐傳以寓採補之功不知者以為誨淫也於是養圭食癸展縮收放一切泥水穢道當世尚之甚惟一三道人雅嫉之輒詆其書斥其人壞其言且曰身中上藥精與氣神煉而服之為道為仙安有求之外乎是雖然一三道人真儒也即言玄言道不離其經第如世人之不獲已何夫世人之不獲已者欲其至也而有心於道而必不能遽絶於所以為道害者欲其至也左師觸之説趙太后也欲太后之不愛其子而説以太后之無愛其子反説太后以甚愛其子夫説之以甚愛其子而後得太后於無愛其子矣引世人於道者何亦必不如是也夫世人之嗜色亦猶太后之愛子也使之恩所以長嗜夫色而後得其不徒然一嗜夫色而已則蓮池在火坑朽腐即神奇之意也特患世人之不知也而又以為誨淫也不惜祕文惟知者用之雲林虛虛子應圓題新鐫五福萬壽丹書採補篇四福呂祖禦敵既濟真經上將禦敵工挹吮吸遊心委形瞑目喪失上將喻真修之人也御行事也敵者女人也初入房時男子以手挹女陰戶舌吮女舌手挹女乳鼻吸女鼻中清氣以動彼心我宜強制而遊心清虛之上委形何有之鄉瞑目勿視自喪自失不動其心也欲擊不擊退兵避敵修我戈豫似戰復畏待彼之勞養我之逸欲擊彼欲動也修彼手來摩弄也似戰我似戰也彼欲我動矣我反不動而退身以避之彼必來摩弄我陽物我即示以似戰之狀而復詐為畏怯之形待彼之勞以養我之逸也盜興憑陵魔兵蝟臻吾方徐起旗旌出營交戈不鬥思入冥冥彼欲操刀破我堅城深溝高壘鬥固不驚時復挑戰敵兵來迎如不應者退兵緩行盜者彼也彼之情興已濃其勢似魔兵之蝟起我當徐徐應之但交而不鬥鬥謂動也思入冥冥者靜以待之心不為之動也致彼欲鬥而不得必自下動以撼吾上吾冥目閉氣如忍大小便吸縮不為驚動良久復一挑之挑亦動也彼必大發興而應我夫倘彼不應即當退卻止留寸許於內也敵勢縱橫逼我進兵吾入遂走僵仰其形如僵如僕敵必來凌吾謂敵人我今居下妝處居上上亦了了彼擾我專無不勝焉勝者我勝彼也敵興大發必逼我進兵吾不可不答遂入坤戶即退於外翻走仰臥如僵仆之形彼之欲心張狂復來擊我我遂居下令彼在上而誘之自動則我專而必勝也敵既居高以高臨下我兵戒嚴遂控我馬龜蟠龍翁蛇吞虎怕撼彼兩軍令彼勿罷覺我兵驚使之高住勿下勿鬥候其風雨須臾之間兵化為水敵方來降我善為理俾其心服翻為豫美豫亦戢兵退藏高壘此至要心訣重在龜蟠龍翕蛇吞虎怕八字瞑目閉口縮手踡足撮住穀道凝定心志龜之蟋也逆吸真水自尾閭上流連絡不已直入泥丸龍之翕也蛇之吞物微微銜噬候物之困復吞而入必不肯放虎之捕獸怕先知覺潛身默視必待必得用此四法則彼必疲乃以手撼彼兩軍撼拈也兩軍乳也使之興濃不殺又戒之騰身高起勿動勿下候彼真精降下則彼心怠我反善言挑戰彼既心服而我得其美則收斂而退藏於密矣再吮其食再挹其粒吮粒挹密知兵復人此第二次行事也食者舌也粒者乳也密者陰戶也短兵縮則短也復入復入慢戰以動之也敵兵再戰其氣必熾吾又僵仰候兵之至以吾兵挺闔彼風雨愈降愈下如無能者候者候風雨也闔吸也此至要之言愈降愈下心志灰然如無能者以闔之也敵人愈奮豫戒之止兩軍相對不離咫尺與敵通言勿戰勿棄坐延歲月待其氣至心愈如灰言溫如醴以緩自處緩以治彼愈奮者彼動不止也豫乃戒之止而不動彼上我下兩軍也不離咫尺者留一寸在內余在外也又待其精氣下降又必我心愈如灰死而言語須甜溫使彼興濃而我緩以待之也我緩彼急勢復大起兵刃既接入而復退又吮其食又挹其粒龜虎蛇龍蟠怕吞翕彼必棄兵我收風雨是日既濟延安一紀收戰罷兵空懸仰息還之武庫升之上極大起興濃也彼興既濃我當復入深淺如法間復少退又必吮其舌挹其乳依前行動則彼真精盡泄而我收翕之矣既濟者既得真陽也一紀十二年也一御而得真陽則能延壽一紀武庫髓海也上極泥丸也罷戰下馬也當仰身平息懸腰動搖使精氣散布上升泥丸以還本元則不生疾病而長生可得矣為山九仞功始一簣匪德匪傳全神悟入九仞為九天仙也一簣一採也一採延壽一紀百採百年可知也是長生始於一簣然非有德不傳若有德則神全而心靜故能悟之而可行也呂祖採補延年祕録呂祖曰心屬火火氣盛則陽事舉心氣弱則陽事蕤雖美女百態千嬌欲戰而無奈也總然入爐不久即泄反輸精於女子今此術可戰代十女猶然固閉難以筆舌盡陳侍中曰精者神氣之聚也散在四肢為氣為髓聚為氣海為精為神相氣運用使久而不泄此化精之妙也今人不知妙術妄用針灸藥敷熏洗淋泄苦楚百般皆不足取今受一術俱非此類而通仙道其世可得聞請試用之置鼎第一夫安置鼎器者乃中乘之法陰陽交濟之道也擇佳治十五六以上眉清目秀唇紅齒白面貌光潤皮膚細膩聲音清亮言語和暢者良器也若元氣虛北黃瘦粗肥經候不調赤白帶下四旬上下不可用矣凡與之交擇風雨暄和之候定息調停戰之以不泄之法先徐徐搖動令女情動昏蕩男子手扣其陰戶待滑水溢出方可刺入上則緊咂其舌以左手搠其右脅下令神驚精出吸其氣和液而咽之更玉莖亦吸其陰精入管如水逆流直上然後御劍則神妙矣鎖閉第二夫大鎖封閉者乃撒手過黃河之法也凡性急之人須半月方可閉住初下手時未便慣熟倘或精泄只是清水初交之際用三淺一深漸漸至九淺一深往來扇鼓三百餘次但覺欲泄急退玉莖按陰額以右手三指於穀道閘住把一口氣提上丹田咽氣一口澄心定慮不可動作少頃將玉莖復振依前扇鼓若情動蹲身抽出玉莖如忍大小便狀運氣上升自然不泄矣一法左手掩右鼻孔右手掩左鼻孔閉目正坐待少時引口中氣吹一口吸三口咽之以兩手緊捏拳抵腰腹將身掇三掇卻以手緊抱頭將身擺三擺依舊正坐以兩手擦腿三五十下覺身熱匝舌抵上齶少時用津液三咽氣覺到腰下地直立以臀夾定穀道又咽三口氣則止若便去行用只依常法到情濃時急以舌抵上齶咽津一口亦將臀夾定穀道其精不走如此行數次永不走泄若初學時只可一夜不走泄一日門路閉遏交感以手抵腰虛迭三次手抱崑崙擺三擺便了欲交感以左手中指抵龜根三下再入爐依舊咽津一口但要緊夾定一尾閭由他如何至三五日不泄亦不妨左手龜頭三下順氣一口即泄御女第三夫房中術行至一次身體不倦至三次扇鼓至一萬二千八百之數依前提身縮龜咽氣一口至丹田急縮下部不令走泄第一上峰始采女子口中津液咽之次中峰復採乳汁吞之三下峰閉氣蹲身如龜狀急縮下部採其紅鉛從尾閭運上崑崙頂散於四肢返老還少不生諸疾矣一法凡欲行時隔夜先將大縮砂七個白湯咽下次早不得吃湯水先用熏洗藥少時用綿帶子系稍緊候物微堅陰青翻然不可太過須是擇爐令婦人仰臥不用枕頭開兩股男子前手把磨後膝著席先定神默想漱津仰視眉尖先開其口似鼻管吸氣咽入丹田想其氣已到方垂頭刺入陰門復昂頭瞑目閉氣凝神徐徐動搖往來之間婦人美暢男子欲泄一緊以身凸向前盡送莖物以穀道吸七次其精自然運化不泄如此行持七次但氣弱者先用好酒入鹽調和吞鹿茸丸五十丸更加七次蓋欲伏少陰氣以助真陽養在爐一茶時不得泄自然脹滿作熱勿得解帶苟釋其縛則泄陽氣無功矣七日一次行滿七次其功久久則成飽鍵矣精氣第四凡人論成功止其不泄未足為奇要在還精采氣斯為大道凡扇鼓至千百之數女有陰交三穴一兩乳二兩脅三兩腎也往來扇鼓之際候其聲嬌色變眼慢口合手冷心煩彼時急縮下部蹲身如龜其牝中津液自我靈柯吸入合自己元陽從尾閭夾脊透上泥丸宮再降入丹田滋養真氣豈小補哉蓋女一身屬陰惟津液屬陽故曰水中鉛陽數也又名為紅娘子男子一身屬陽惟精氣屬陰故曰沙中汞陰數也又名為白頭翁紅乃為鉛白乃為汞真液相合撇上泥丸則齒髮不落面顏如童矣金丹第五凡採擇時先用緋線折回耳門比之鼻竅然後將緋線周圍頸項如不大一米未發也研乳香半錢調好酒一盞吞下煮羊肉四兩令女先服三五日一浴或半月一浴候天氣晴明行之於此誘合候其情動溫存抱定緩入陰戶向前進一寸三分其液自吾柯穴入腹內寶名曰返聖胎呼吸第六凡交戰先須端坐定氣凝神以鼻引清氣口呵濁氣一二口節次叩齒舌攪華池咽液行導引之法然後將玉莖款款攻刺候他情動掐取彼右手子紋咂住他舌取他津液一口仍吸其氣咽下把定神氣不走緩緩入爐若欲長大滿爐以聚氣為法次掐其第三中指文用九淺一深法行三十五次或百次再依前法掐手指紋取津液咽下再進百次又取之如此數次妙不可言如要不漏頻頻出爐縮脅提吸或七九次鼻內出氣或三五口再若緊急提吸不住用手於尾閭穴關截自然不泄則玉莖常堅不軟非但陽歡抑且女暢凡採取之際候女人情動陰門張開津液流溢男子以靜待動不可深入玉莖上則咂住舌尖華池津出急接吸咽之如此採戰自然兩情適矣如欲退罷即掐第三紋吸虛空清氣三口咽下然後出爐亦不可便睡起而端坐升身吐納二三十口氣用黃河水逆流法運歸四肢使安靜方睡如欲再戰復依前法若要女子精氣不損行事時還與他三五口氣令他接之每一口氣分作三口咽之為妙倘不還氣恐他黃瘦夭喪但行此法數日後看精神如何如不懷妊但以種子之法順而行之一戰成功矣種子法見後展龜第七夫欲展龜身長大者常於子時後午時前靜室中披衣端坐凝眸靜慮常令腹中飢空空則氣血流通仍集中乘導引法閉氣咽津送下丹田存想運至玉莖以兩手搓熱如火用一手兜托外囊並握玉莖一手于丹田臍下腹上左轉摩八十一數致至如前法右轉九九之數乃咽津液存至玉莖用手將玉莖如搓索不記其數如此行之久久自然長大也搬遠第八凡行事畢每日平旦直伸兩腳左右壓定閉目用兩手板兩足頭九次極力閉氣將身搖動止許鼻中微微出氣令勻凡行三五次面如火熱乃是真氣上升泥丸矣即以兩手搓摩面項耳目手時熱則放關矣一搬運畢仍平身仰臥直手舒腳以頭著枕上腳根著床上身體皆懸空極力搖動已身三五次則精自然升上泥丸矣噫精為養命之本悉宜知之流通第九凡器既具用黃河逆流之法而奈戰每與之交進退遲速具至行九淺一深之法先行子午流通一次使氣脈通入爐後縮起腰身閉氣不出捲舌拄齶以睛上視用手扳拿如鉤頻頻咽氣以候心定若氣極輕呵出之掩耳閉氣存想氣從夾脊上腦後入頂門散於四肢百脈子午流通歌曰面南正坐潛衣床呼吸調勻靜取漿吐納二句令四數咽精一口至三陽輕噓復攪華池水鼻引清氣入小腸晨起空心行九次七朝功滿達仙鄉六字第十昔黃帝暗垂密旨深達玄機恐後代學道之人急於色欲傷其性命則示陰丹之訣夫陰丹者御女採氣之術也陽丹者服之而升仙也知婦人之本意補泄損莖者當交接之時定其身心意不動則女情自來女若定其心意不興則男情自來也神者氣也神固則氣完氣盡則神去交接之氣心定則為一補氣泄則為一損故男子百補而一損此之謂也經曰保養靈柯不復枯閉卻命門守玉都靈柯者上舌下莖也玉都者上口下陰也玉漿上下俱流液故號玉泉彭祖曰以人補人真得其真老子曰強入弱出命當旱卒弱入強出長生之術是以夫妻有化生之道陰陽有補益之機且心為氣主意到即行故男情不動女意未來陰戶初開別有消息採其陰中之氣以助陽丹則可永保性命卻老延年法之要妙在於六字之訣此六字各有次第不得顛倒言存便縮既縮便吸既吸便抽既抽便閉既閉便展其序不亂而功莫大焉一曰存者交姤之時存心物外雖交合不可著意要在體交而神不交若著意乃是神交而精氣易泄矣惟不著意縱然走失亦不多矣但當停濁去清耳當此之時急用縮脅提吸此名曰存能久而行之不倦並無漏泄之事臞仙曰夾脊之骨前有二穴右命門左腎門即腰眼間也汞氣從此出採取之時覺汞欲出急定心意存想汞氣自尾閭上入泥丸良久用抽縮之法制之縱走無害能行此則氣汞自干自然成寶矣二曰縮者交接之時縮脅提吸運氣上行不令順下氣下則泄若泄之際如忍大小便狀靈柯漸退半步提吸口微吁氣咂定女舌取他津液咽之摟定又吸他氣一口送下丹田直入靈柯三五次漸漸龜形狀大不泄矣臞仙曰採取之時真汞欲來便用力縮下如急忍大便狀兼存想命門將靈柯移種淺土寸半良久汞乃止然後正坐豎膝抱玉山之頂急拍山腰口含山龍待山雲氣興作此是陰氣上升山氣發泄之候當此之際感之於中取之於外急取山上華池之水咽下丹田三五十度至百度後用抽吸之法三曰抽者交接之時緩緩進步不可深不可急常抽退步吸接津液一抽一吸以我鼻吸他鼻出氣候其氣喘急吸咽之不可以口吸口吸傷腦抽吸數多玉莖自堅神氣壯盛快然樂矣臞仙曰慢進徐退待氣至宜進退上下相應一退一吸惟多為益吸不可開口鼻引出氣人腦力妙行之龍氣風徑進則吹退則吸四曰吸吸他真氣精液想玉莖如受氣之管採取之時上以口鼻吸其津氣下以青龍吸其液水存想入我管中上下一齊俱吸勿令顛倒一抽一吸如管吸水之狀但能依此採取則顏色光澤精神自然清爽矣張仙曰當吸之時閉口咬牙努目上視吸氣一口重重盡力提至泥丸待時其精化氣反本歸元也臞仙曰想靈柯為受氣之門鼻為天門與之相應腎為命門亦與天門相合一時齊吸不得顛倒如吸得彼此腠理既和此陰陽感暢之候想其赤黃氣入靈柯約至精室入氣海腎堂與陽氣直透泥丸其時鼻與靈柯一齊吸但一退一吸使氣如筒吸水樣自下而上妙在數多如得彼赤黃氣便覺氣熱如火得其一度氣者可延一紀應天地一周之氣也如採取數多覺山色漸調即便易之五曰閉者交垢之時須當緊閉命門命門通天關天關通命門腎府若命門與天關不閉則腦氣下降至命門腎宮流入瓊臺則易泄也然後化為金精矣若閉固而不降於瓊臺則永無漏泄之患精既不泄自然堅硬可御十女不倦張仙曰動作時不可開口出氣口是天門下與命門相接若封固不牢則失神敗氣其精易泄且行功之時五字相連缺一不可若棄存縮而難以行其功舍抽吸而難以得其物四者雖備而不急於封固則又得而復失矣臞仙曰動作必閉口息氣封固華池以鼻引彼氣上升泥丸一潤元海存泥丸中有紅日一輪照耀光中有仙子素衣黃裳瞑目而坐以舌拄上齶存之使氣逆流歸元海六曰展者交之時緩緩入爐上採其津攪漱我津液吸他一口氣送下循至丹田運入玉莖三五次或七九次覺龜身森然長大築滿陰戶號曰展龜但覺陰戶緊窄乃其驗也既滿宜緩不可急躁交之久遠使情歡意暢美不可言若採之既久覺容顏銷減即換新鼎不可強行也張仙曰此操演法男女相交而兩將相敵女人自有不戰而勝靜以待動的手段男子一見的牝戶開張先神魂不定不待戰有幾分敗勢又目靈龜發作的頭上如鏡一般一入爐不數合便輸了蓋曾經傳受操演過若有傳受龜自然堅硬粗燥有何懼哉碧霞採補長生祕要碧霞真人曰夫金銀損壞以金銀補之人之損壞以人補之今撮要之言乃一生之受用久而行之卻病延年漸入仙家矣祕訣仙傳非人勿示修真養氣第一凡修真養氣者省言語養內真寡色欲養精氣薄滋味養血氣咽津液養肺氣慎嗔怒養肝氣節飲食養胃氣少思慮養心氣若學道之士依此行之可使氣壯神完矣房中補益第二經曰以人補人真得其真老子曰若欲長生當須自生房中之事能生人能殺人故知而能用者可以養命況兼服藥者乎男不可無女女不可無男不可強而閉之若強而閉之則意不能不動意動則神勞神勞則損壽若夢與鬼交其精自泄則一泄當十也擇爐煉丹第三夫鼎者烹煉神丹之器溫養真氣之爐也須要不曾生産美婦擇取眉清目秀面白唇紅發黑鼻正肥無餘肉瘦不露骨肌體細膩語言清爽無口氣體氣崩帶白濁者為妙若鼎肥者氣脈不通瘦者骨乳精少勞者津液不足病者陰毒傷莖切忌垢面蛇形雄聲雀步馬口黃髮陰毛粗多而逆生者交之則損矣戲弄女精第四夫仙人玉女陰陽配合何曾漏泄今人不務女情感動其真氣只求一時自己之快樂玉莖才入陰戶中女情未動男精先泄自取衰敗終自不省可不惜哉凡與婦人交合先須溫存懷抱咬咂唇舌玩弄兩乳將玉莖與女戲弄男以手指深入婦人金爐候有淫水流出此乃婦人陰情動矣方可對爐交感依法行功此乃陰家先輸之驗慢慢功之使氣不喘而神自定矣豈不美哉男察四至第五夫玉莖不強血氣未至強而不振振而不硬者骨氣未至硬而不熱神氣未至心欲而興不美者意氣未至凡男子與婦人交合必待強而振振而硬硬而熱察其四氣至行之若一氣未至即不可交女審九到第六夫女子未合之際默咽津液者意氣到也將身抱人者骨氣到也強力動人者筋氣到也兩目尖頻視者肝氣到也握弄玉莖者血氣到也摸男兩脅者肉氣到也兩鼻氣蒸者肺氣到也身不動搖者腎氣到也滑津出者脾氣到也凡九到全方可交感交合取勝第七凡遇美色者心雖愛戀當自逆於心情則與不愛者相似必須按定心神用玉莖插入爐內慢慢淺深往來行五七十次以至百次當可歇住須要定心再依前行五七十次至二三十次覺婦難禁溫存必先泄也此時正好用功採取須再依前法行之若自己微覺情動將玉莖抽出如龜藏體六物皆縮閉口吸氣一把提起自然不泄還精補髓乃陰輸陽勝也慎勿進之太深若急速太深則顛倒五臟強忍情欲則精流入腎胞令人外腎冷痛陰汗浸潤更生小腸奔豚氣膀光氣疝氣是也訣曰凡行功時鼻內微微吸氣漸漸出氣但覺喘息便宜歇住俟氣調勻可再依前法行戰然戰不厭緩採不厭速如此有益慎而行之不可忽也採煉太和第八夫採煉太和者只可以調馬牧牛若婦人先泄目瞑身顫面赤頰紅舌尖漸冷鼻孔開張口閉氣粗肢體不收神思恍惚陰穴脈動滑津流溢此其先泄之驗也男子當此之際心定意靜上採舌津中採蟠桃下采月華採而得之行提運動自尾閭穴兩道運氣貫上夾脊透至雙關上入泥丸宮流轉入口化作瓊漿咽下重樓入丹田起火煅煉此謂黃河水逆流也老子曰玄牝之門為天地根又曰採得歸來爐里煉煉成溫養作烹鮮陽衰陰養樹衰土培此法仙人口口相授慎勿輕泄惜氣養精第九夫惜氣養精者人之大要也天有三奇日月星地有三奇乙丙丁人有三奇神氣精若人人存神固氣保精則百病不生須要保惜不可輕泄若輕泄其精如以珠玉投於深淵豈能再得可不慎乎經曰精養靈根氣養神此真之外更無真丹田一粒菩提子誰肯輕輕泄於人蓋男子以泄精為樂不知精泄之後玉莖衰怯身體困倦不能再舉有何樂也若固濟根蒂閉而不泄日夜交合數婦採取其精情暢神爽愛慕之情不能休息又能補益朱顏身輕骨健延年益壽以此觀之孰為樂乎問罷玉蟾子曰房中有法煉陰丹陽得陰兮大壯顏補得腦實骨輕健百年如此轉輪環蓋人之一身本無儲精之所但腦氣下降即為精矣洗心全神第十夫心者神之舍也心靜則神安心動則神疲神者四肢之主能少思慮省嗜欲掃除雜念湛然不侵則神自全神全則身安身安則壽永是乃修身之大要矣三峰採戰祕訣上峰名曰蓮花峰未交感時以兩手擦熱抱婦人腰以口就婦人口輕輕咂婦人舌尖四十九咂覺口中津液咽之以左右手揉自己胸三兩下仰臥令婦人身在上抱婦人腰背以口咂婦人舌尖如冷盡力咂之其婦人覺無意思卻令婦人仰臥以莖物入爐徐徐徹徹卻用舌抵上齶目視天關但用其功只是不泄下峰名曰玄門峰此則巨富相敵婦人情欲淫水蕩漾或遇陰候正來交感時覺婦女情興正濃卻以手抵婦人腰眼一二抵覺情尤正卻徐徹之看莖物上有血絲帶名金丹藥當用金銀篦子刮下安在器中或罐中空心用溫酒送下又一法淫水多者用干蒸餅挹其陰戶丸如梧桐子大硃砂為衣空心酒下三十丸貴人多不用不知此方大有功效卻高如蓮花峰法蓋陰極陽生大補精髓令人肺肝常清精神不雜久而行之可以通神入仙人多用玉乳峰亦可延年不老臞仙曰凡採戰之法採一女益一人十女者延年百女長生不老遇交接玉莖欲泄不可令婦抱腰乃頻接女人津液咽之不可令其手觸液下則令人氣散皆是採陰之法每交接以三五十六者則止令女呵濁氣七口出之次將口壓定女人口邊再令女呵清氣一口用舌入女人舌下接其氣咽海蟾云若要長生不老須定還精補腦彭祖曰數欲交接則數愈多功愈久皆以不泄又能御女十二不泄為閉則紅顏悅色凝神快意若御九十三女而不泄年躋百歲精少則疾精盡則死可不慎歟子都經曰旋泄之法切須忌弱出強入納玉莖於琴絃凌齒之間如紅大便止弱納強出長生之術強入弱出其命當卒此之謂也劉景道人云春月三旦一泄夏秋一日一泄冬則當閉蓋天地終藏一陽未復盤結蘊固冬月一泄其忽諸乎蒯道會云人年六十便當窒欲若得術而御之則可以自度不辨絶之為上服藥百種舍此而永生也戒忌十段錦大戒忍尿行房要作淋尿頭行房大損神水火行時須且待徐徐插入力須均防傷莫令玉女撫腰堂吞下田精忌女傷兩手脈經休被起拍郎雙腎切須防戒急女意未動休急歡四肢皆硬內門干更兼悲喜憂驚後犯者男傷女不安忌飢肚飢交感百神悲氣出神昏五臟衰此是仙家名百福一交勝似百交疲忌飽大醉大飽俱獨宿免教五臟背反覆喘嘔晨昏吐血涎未免瘡痍生手足忌交休依瘦病生新疾産後之爐損丈夫年少若教親老婦陽衰陰盛是危途交感十分只可入三分來往時時把乳吞出入往來將百步急須著力送連根兩傷女垂男仰兩相務大怕濃精入腎腸女病成勞難救治男傷漸漸覺痿黃指迷意懶莫強戰強戰生百損渴後食涼漿溫時切莫飲感華戰罷須當便養神就床端坐咽津頻瞑目看心耳聽腎自然神氣復調勻素女論語曰一女可敵十男一男難敵十女何也男情易動則易滅如渴得漿女情難動則難滅如熱得涼且如男子興來便上馬興闌精走泄矣豈知婦人情懷未暢其心似炎得涼風則力健意濃男子無力豈能遂其樂哉蓋男子以婦人之樂為樂婦人既不樂男子有何樂初交時切不可性急須抱摟著澄心把定如不經意一般待他情動方可用事此時婦人如涸魚得水戰力不乏往來不可速亦不可著體用力如欲泄出爐以易其心如莖弱再戰一般出爐數番婦人眼慢四大不舉方是戰力之功交接之際不可付舌尖津液斯時陽氣奔盈於上如與舌尖津液則元陽氣盜不久尪贏若婦人情急氣喘乏語言嬌細方可採求津液吮他舌尖於舌上下用力大吸陰氣一口咽之以補元陽臨美之際不可深深則津液太過必至癆瘵但遇交接暗數往來九淺一深下馬仰睡用手於胸肚上揉擦五臟還位及均勻於氣亦不可縮腳而臥免致下疾次早起來便以養神法助之望東方取氣三口咽之用手隨氣亦擦至丹田三存三跳伸縮提掇百骨插手過頭墜手合掌熱索臉出氣三口背手擦牙井花水半口灌漱以舌團攪作丸咽下乃名神水火能助陽然後洗面漱浣投好得人夫貪者贈以財淫者調以言濫者益之以偉物好俊曉之以聰明好麗娛之以聲色凡五者由基之楊葉也陰中八遂一寸琴絃二寸菱齒三寸嬰鼠四寸玄珠五寸谷實六寸愈鼠七寸昆戶八寸北極交合九勢第一龍飛勢女人仰睡男伏腹上據股含舌令女舉其陰物受男子玉莖刺其谷實和緩慢搖行八淺六深之法陰乃壯熱陽乃剛