front:
  text: 福壽丹書序一蓋聞福不可以苟得壽不可以幸致豈天之嗇於人哉實人之自嗇耳何也貧窮拂鬱者固無所得福即富貴榮顯者又以享用大過而不能得全福辛勤徵逐者固無由致壽而安居清逸者又以利欲櫻神而不能致壽此福壽之萃於人者不多見也其知惜福保壽者乎何謂惜在養德在寡取無害人之心即是養德無利己之念即是寡取而其要求於存心是窒欲不溺情於夭冶即是取其要先於養氣此福壽之丹所由作也豫友應圓龔君博極群書雅擅名物其以應圓為號蓋真有執園中以應無窮者茲集名家群玉類成一册名曰福壽丹書而分其類曰安養者所以示知生而知患之所由則生可長保而養斯安曰延齡者所以示頽齡之源而知延之之道則頽無由致而齡可延到若服食之方人皆習為日用之常而不之杯酒鴆毒枕席人皆以為糟粕蓋乃採補之人皆視為縱欲之符而不知生門死戶火龍水虎則採補為唾餘矣其曰玄修雖非衆好結慕道之士遍求弗得其要領而此篇獨窮其旨趣身鉛心汞定水慧火片響可以凝結觸目而自豁然矣清樂一篇尤為頂針蓋世人知鮮衣美食歌童舞女撞鐘擊鼓之為樂而不知色令目盲音令耳聾味令口爽孰與夫逍遙彝鼎圖史之間怡情風月山水之趣倦則一榻侶羲皇行則朗吟寬歲月自非應圓君特標其旨闡其玄而大同之世人何由知福之得壽之所由致哉録成後示豫屬豫辨豫愧道未甚得其真筌何敢肆焉侈談第交其人見其書不覺心曠神怡藹然而有得也且有拜應圓茅塞之開矣又何敢無説而處此聊書數語以贈庶域中有大觀當不以豫言為謬矣謹為序天啓甲子仲夏上浣銀臺文林郎筠陽伯受敖枯拜書序二豫亦吏隱者寓迹簿書棲心溟涬退食自公委蛇多暇輒闢靜室以居伏讀養生家言恍然而悟原與孟氏養氣篇互相發明其所云喉息踵息即孟氏旦氣夜息之説是也此理不分仙凡寧分宦隱嘗偶句云著意尋丹靜中欲動玄猶俗因時覓息忙裡偷間吏亦仙非敢妄意神仙幻化實欲證孟氏家法耳忽抽架上一編閲之為萬壽丹書所論精氣神三寶及內外鉛汞吐納調息之説甚備循其姓氏則龔生應圓且為同梓雲林人隨自詫云里有異人三十年而不遇果藏形滅影之徒歟而梓里不以名著時托迹漫遊於秣陵維揚間與諸名公相訂正動以歲月計多方綜迹終不可得邇來建南客有至自潭城者為豫道書林里一人頗崎似儒流亦似散人似大醫王又似玄宗主包涵無垠莫可名狀豫心知其為應圓也已物色之果然爰招至署中與賓泰曲星輩縱橫辨析娓娓如峽泉不竭始知應圓初習舉子業能屬文髫年善病因棄而學醫醫固儒術也儒者善養氣不諱言玄門於是究心丹訣漆葉青黏較黃庭內景等無有二大率其書多根抵於儒故識正大而説平易不為鑑空語怪荒謬難行之事以誑世愚俗且哀衆生夭扎汲汲欲引之長年意孔嘉矣而書復朗然開滌雅俗共曉不必問蜩與雞一見可決是非仁心而濟以仁術者乎夫二十三家各有一子訓同時併到為是形到為是神到乃知人人有仙骨人人有真丹自有而不自認不得不取諸方士以證之試按入門之法與究竟之方則應圓其最著矣豫既喜其發覆適諧夙好兼欲並躋一世於仁壽而無從必假此為津梁奚敢私諸蔡帳故為鑑定序行之崇禎庚午歲長至日賜進士中奉大夫福建布政使司右布政使前按察司按察使欽差整飭建南兵備奉敕督理通省糧飽道酉戌鄉會同考試官虞桂紹龍撰序三始皇入海求神仙之藥古今謬之雖然豈謬也哉帝亦聰明之主也豈智不若後人而固漫信方士也者蓋修仙實有三等有天仙有水仙有地仙天仙之道能變化飛升也惟上士能學之以身為鉛以心為汞以定為水以慧為火在片餉之間可以凝結十月成胎本無卦交亦無斤兩可以心傳之水仙之道能出入隱顯也在中士可學以氣為鉛以神為汞以午為火以子為水在百日之間可以混合三年成象雖有卦爻亦無斤兩可以口傳之地仙之道能留形住世也即庶士皆可以學以精為鉛以血為汞以腎為水以心為火在一年之間可以融結九年成功既有卦爻又有斤兩故以文字傳之善度人者取其皆可以學者言焉而後其説可以久存而不廢其道可以濟世而不誤凡此非關吏之臆言得之泥丸所論者如是迄今執萬壽丹書所論而證之實千載而一符然後知此道原不謬妄亦人所以求之者未得真實塗徑耳請以是書告之辛未季春閩關首吏里人郭之祥漫言於潭陽公署序四夫旗常竹帛都溫席厚緣身而有也身又緣生而有者也惟上古至人淡於一切聲色遊娛不妄作勞以故不諳黃白抽添之旨年法亦逾期頤乃今不然以酒為漿嗜欲如狂七情柴其內萬事梏其外醒之以飛揚幻妄俱屬無益之伎倆而懵懵也是奚異青蠅嗜汁以忘溺遊蜂餂蜜以喪命粉蝶戀花以斷魂哉又焉望其如熊之伸鳥之導以自引其壽考哉無他龍虎汞鉛卦爻斤兩之術不明雖欲誘進其奚從焉家應圓業儒攻醫於參同悟真諸奧義妙有契授桂驤云方伯嘗折節之既鐫所撰萬壽丹書行世復郵寄囑豫序之夫豫即序哉展轉宦途唯是國計民生夢寤攖寧即耳而提之曰此夫黃白抽添也熊伸鳥導也龍虎汞鉛卦爻斤兩也茫不省為何物毋論弗能言即言矣亦隔靴搔癢而已第此深信之而不疑者自謂序應圓書獨無愧何也嘗徵之於屠肆矣盛暑鑠金豬羊肉食懸已腐以醃之則經久可以不敗況於以宜身益命之大道吐納於己而有不令人長生久視耶請與尊厥生者共寶惜之鑑猩龔廷獻書
